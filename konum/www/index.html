<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Konum & Harita</title>
<link rel="stylesheet" href="lib/leaflet.css">
<style>
:root{--accent:#34d399;--bg0:#04130d;--txt:#e9fff5;--mut:#86b8a3;--glass:rgba(255,255,255,.07);--glass-bd:rgba(255,255,255,.14);--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",system-ui,sans-serif;background:var(--bg0);color:var(--txt);overflow:hidden;height:100vh}
#map{position:absolute;inset:0;top:calc(var(--safe-top) + 96px);bottom:0;background:#04130d}
.leaflet-tile{filter:brightness(0.85) saturate(1.1)}
header{position:absolute;top:0;left:0;right:0;z-index:1000;padding:var(--safe-top) 16px 10px;background:linear-gradient(180deg,rgba(4,19,13,.95),rgba(4,19,13,.7),transparent)}
.row1{display:flex;align-items:center;justify-content:space-between;padding-top:12px}
.brand{display:flex;align-items:center;gap:10px}
.brand .ic{width:38px;height:38px;border-radius:11px;display:grid;place-items:center;font-size:20px;background:linear-gradient(135deg,var(--accent),#22d3ee)}
.brand .nm{font-size:14px;font-weight:600}
.iconbtn{width:36px;height:36px;border-radius:50%;border:1px solid var(--glass-bd);background:var(--glass);backdrop-filter:blur(20px);color:var(--txt);font-size:15px;cursor:pointer}
h1{font-size:22px;font-weight:800;letter-spacing:-.5px;margin-top:6px}
.hint{color:var(--mut);font-size:12px}
.fab{position:absolute;z-index:1000;right:16px;bottom:calc(24px + var(--safe-bot));display:flex;flex-direction:column;gap:10px}
.fab button{width:54px;height:54px;border-radius:17px;border:none;font-size:22px;cursor:pointer;background:linear-gradient(135deg,var(--accent),#22d3ee);color:#04130d;box-shadow:0 8px 24px rgba(52,211,153,.4)}
.fab button.sec{background:rgba(20,35,28,.9);backdrop-filter:blur(20px);border:1px solid var(--glass-bd);color:var(--txt)}
.panel{position:absolute;z-index:1000;left:16px;bottom:calc(24px + var(--safe-bot));max-width:62%}
.chip{display:inline-block;background:rgba(20,35,28,.88);backdrop-filter:blur(20px);border:1px solid var(--glass-bd);border-radius:14px;padding:10px 14px;font-size:13px}
.sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:.25s;z-index:2000}
.sheet-bg.on{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:2001;transform:translateY(110%);transition:transform .3s cubic-bezier(.2,.9,.2,1);background:rgba(8,24,18,.95);backdrop-filter:blur(40px);border-top:1px solid var(--glass-bd);border-radius:28px 28px 0 0;padding:10px 16px calc(20px + var(--safe-bot));max-width:680px;margin:0 auto;max-height:70vh;overflow-y:auto}
.sheet.on{transform:translateY(0)}.grip{width:38px;height:5px;border-radius:3px;background:rgba(255,255,255,.25);margin:8px auto 14px}
.sheet h3{font-size:18px;font-weight:700;margin-bottom:12px}
.hist{background:var(--glass);border:1px solid var(--glass-bd);border-radius:14px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.hist .mid{flex:1}.hist .nm2{font-size:14px;font-weight:600}.hist .co{font-size:12px;color:var(--mut)}
.hist .x{color:#f87171;cursor:pointer;opacity:.6}
.langs{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.lang{padding:13px;border-radius:14px;background:var(--glass);border:1px solid var(--glass-bd);font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:9px}
.lang.sel{border-color:var(--accent);background:rgba(52,211,153,.2)}
.empty{text-align:center;color:var(--mut);font-size:14px;padding:20px}
</style>
</head>
<body>
<header>
  <div class="row1">
    <div class="brand"><div class="ic">📍</div><div class="nm">NickDegs</div></div>
    <div style="display:flex;gap:8px">
      <button class="iconbtn" onclick="openHist()">🗂</button>
      <button class="iconbtn" onclick="openLang()">🌐</button>
    </div>
  </div>
  <h1 id="h1"></h1>
  <div class="hint" id="hint"></div>
</header>
<div id="map"></div>
<div class="panel"><span class="chip" id="coord">—</span></div>
<div class="fab">
  <button class="sec" onclick="saveHere()" id="saveBtn">📌</button>
  <button onclick="locate()" id="locBtn">🎯</button>
</div>

<div class="sheet-bg" id="sheetBg" onclick="closeSheets()"></div>
<div class="sheet" id="histSheet"><div class="grip"></div><h3 id="histTitle"></h3><div id="histList"></div></div>
<div class="sheet" id="langSheet"><div class="grip"></div><h3 id="langTitle"></h3><div class="langs" id="langGrid"></div></div>

<script src="lib/leaflet.js"></script>
<script>
const T={
 tr:{title:["Neredesin gör","Konum & Harita"],hint:"Konumun cihazında kalır · kimseyle paylaşılmaz",locate:"Konumumu bul",save:"Buradaki yeri kaydet",hist:"Kayıtlı yerler",lang:"Dil seç",noperm:"Konum izni gerekli",empty:"Henüz kayıtlı yer yok",name:"Yer adı?"},
 en:{title:["See where you are","Location & Map"],hint:"Your location stays on device · never shared",locate:"Find my location",save:"Save this place",hist:"Saved places",lang:"Language",noperm:"Location permission needed",empty:"No saved places",name:"Place name?"},
 es:{title:["Mira dónde estás","Ubicación y Mapa"],hint:"Tu ubicación queda en el dispositivo",locate:"Mi ubicación",save:"Guardar lugar",hist:"Lugares guardados",lang:"Idioma",noperm:"Permiso de ubicación",empty:"Sin lugares",name:"¿Nombre?"},
 zh:{title:["查看你的位置","位置与地图"],hint:"位置保留在设备上",locate:"我的位置",save:"保存此地",hist:"已保存地点",lang:"语言",noperm:"需要位置权限",empty:"暂无地点",name:"地点名?"},
 ru:{title:["Где ты","Локация и карта"],hint:"Локация остаётся на устройстве",locate:"Моё местоположение",save:"Сохранить место",hist:"Сохранённые",lang:"Язык",noperm:"Нужно разрешение",empty:"Нет мест",name:"Название?"},
 de:{title:["Sieh wo du bist","Standort & Karte"],hint:"Standort bleibt am Gerät",locate:"Mein Standort",save:"Ort speichern",hist:"Gespeicherte Orte",lang:"Sprache",noperm:"Standortfreigabe nötig",empty:"Keine Orte",name:"Ortsname?"},
 fr:{title:["Vois où tu es","Localisation & Carte"],hint:"Ta position reste sur l'appareil",locate:"Ma position",save:"Enregistrer le lieu",hist:"Lieux enregistrés",lang:"Langue",noperm:"Autorisation requise",empty:"Aucun lieu",name:"Nom du lieu ?"},
 it:{title:["Vedi dove sei","Posizione e Mappa"],hint:"La posizione resta sul dispositivo",locate:"La mia posizione",save:"Salva luogo",hist:"Luoghi salvati",lang:"Lingua",noperm:"Serve permesso",empty:"Nessun luogo",name:"Nome?"}
};
const FLAGS={tr:"🇹🇷",en:"🇬🇧",es:"🇪🇸",zh:"🇨🇳",ru:"🇷🇺",de:"🇩🇪",fr:"🇫🇷",it:"🇮🇹"},NAMES={tr:"Türkçe",en:"English",es:"Español",zh:"中文",ru:"Русский",de:"Deutsch",fr:"Français",it:"Italiano"};
let LANG=localStorage.getItem("lang")||(navigator.language||"tr").slice(0,2); if(!T[LANG])LANG="en";
const t=k=>T[LANG][k];
let map, meMarker, places=JSON.parse(localStorage.getItem("places")||"[]"), markers=[], lastPos=null;

function initMap(){
  map=L.map('map',{zoomControl:false}).setView([39.0,35.0],5);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(map);
  L.control.zoom({position:'bottomleft'}).addTo(map);
  drawPlaces();
}
function applyLang(){
  document.documentElement.lang=LANG;
  const m=t("title");
  document.getElementById("h1").textContent=m[0];
  document.getElementById("hint").textContent=t("hint");
}
function locate(){
  if(!navigator.geolocation) return alert(t("noperm"));
  navigator.geolocation.getCurrentPosition(p=>{
    lastPos=[p.coords.latitude,p.coords.longitude];
    map.setView(lastPos,16);
    if(meMarker) meMarker.setLatLng(lastPos); else meMarker=L.circleMarker(lastPos,{radius:9,color:'#34d399',fillColor:'#34d399',fillOpacity:.9}).addTo(map);
    document.getElementById("coord").textContent=lastPos[0].toFixed(5)+", "+lastPos[1].toFixed(5);
  },()=>alert(t("noperm")),{enableHighAccuracy:true,timeout:10000});
}
function saveHere(){
  if(!lastPos) return locate();
  const nm=prompt(t("name"))||("📍 "+new Date().toLocaleString());
  places.unshift({name:nm,lat:lastPos[0],lng:lastPos[1],ts:Date.now()});
  localStorage.setItem("places",JSON.stringify(places));
  drawPlaces();
}
function drawPlaces(){
  markers.forEach(m=>map.removeLayer(m)); markers=[];
  places.forEach(pl=>{const mk=L.marker([pl.lat,pl.lng]).addTo(map).bindPopup(pl.name);markers.push(mk);});
}
function openHist(){
  document.getElementById("histTitle").textContent=t("hist");
  const l=document.getElementById("histList");
  l.innerHTML=places.length? places.map((p,i)=>`<div class="hist"><span style="font-size:18px">📍</span><div class="mid" onclick="goTo(${i})"><div class="nm2">${(p.name||'').replace(/</g,'&lt;')}</div><div class="co">${p.lat.toFixed(4)}, ${p.lng.toFixed(4)}</div></div><span class="x" onclick="delPlace(${i})">✕</span></div>`).join("") : `<div class="empty">${t("empty")}</div>`;
  document.getElementById("sheetBg").classList.add("on");document.getElementById("histSheet").classList.add("on");
}
function goTo(i){closeSheets();map.setView([places[i].lat,places[i].lng],16);markers[i]&&markers[i].openPopup();}
function delPlace(i){places.splice(i,1);localStorage.setItem("places",JSON.stringify(places));drawPlaces();openHist();}
function openLang(){document.getElementById("langTitle").textContent=t("lang");document.getElementById("langGrid").innerHTML=Object.keys(NAMES).map(l=>`<div class="lang ${l===LANG?'sel':''}" onclick="setLang('${l}')"><span style="font-size:20px">${FLAGS[l]}</span><span>${NAMES[l]}</span></div>`).join("");document.getElementById("sheetBg").classList.add("on");document.getElementById("langSheet").classList.add("on");}
function closeSheets(){document.getElementById("sheetBg").classList.remove("on");document.getElementById("histSheet").classList.remove("on");document.getElementById("langSheet").classList.remove("on");}
function setLang(l){LANG=l;localStorage.setItem("lang",l);closeSheets();applyLang();}
initMap(); applyLang();
</script>
</body>
</html>
