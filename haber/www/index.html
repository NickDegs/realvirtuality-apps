<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Haber & Podcast</title>
<style>
:root{--accent:#f59e0b;--bg0:#120c04;--txt:#fff6e9;--mut:#bda588;--glass:rgba(255,255,255,.07);--glass-bd:rgba(255,255,255,.14);--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px)}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",system-ui,sans-serif;background:var(--bg0);color:var(--txt);min-height:100vh;overflow-x:hidden}
.bgfx{position:fixed;inset:0;z-index:-2;overflow:hidden}
.bgfx::before,.bgfx::after{content:"";position:absolute;width:70vw;height:70vw;border-radius:50%;filter:blur(85px);opacity:.3}
.bgfx::before{background:var(--accent);top:-22vw;left:-16vw}.bgfx::after{background:#ef4444;bottom:-26vw;right:-20vw}
.app{max-width:680px;margin:0 auto;padding:var(--safe-top) 16px calc(110px + var(--safe-bot))}
header{padding:14px 0 4px;display:flex;align-items:center;justify-content:space-between}
.brand{display:flex;align-items:center;gap:10px}.brand .ic{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;font-size:21px;background:linear-gradient(135deg,var(--accent),#ef4444)}.brand .nm{font-size:15px;font-weight:600}
.iconbtn{width:38px;height:38px;border-radius:50%;border:1px solid var(--glass-bd);background:var(--glass);color:var(--txt);font-size:16px;cursor:pointer}
h1{font-size:26px;font-weight:800;letter-spacing:-.8px;padding:6px 0 2px}
.hint{color:var(--mut);font-size:13px;margin-bottom:12px}
.tabs{display:flex;gap:8px;margin-bottom:14px}
.tab{flex:1;padding:10px;border-radius:13px;background:var(--glass);border:1px solid var(--glass-bd);text-align:center;font-size:14px;font-weight:600;cursor:pointer;color:var(--mut)}
.tab.on{color:var(--accent);border-color:var(--accent);background:rgba(245,158,11,.12)}
.feedbar{display:flex;gap:8px;margin-bottom:12px}
.feedbar input{flex:1;background:var(--glass);border:1px solid var(--glass-bd);border-radius:12px;color:var(--txt);font-size:14px;padding:11px}
.feedbar button{width:46px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--accent),#ef4444);color:#120c04;font-size:20px;font-weight:700;cursor:pointer}
.item{background:var(--glass);border:1px solid var(--glass-bd);border-radius:16px;padding:14px;margin-bottom:10px;cursor:pointer}
.item .src{font-size:12px;color:var(--accent);font-weight:600;margin-bottom:3px}
.item .tt{font-size:15px;font-weight:650;line-height:1.35}
.item .dt{font-size:12px;color:var(--mut);margin-top:5px}
.item.pod{display:flex;align-items:center;gap:12px}
.item.pod .play{width:44px;height:44px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--accent),#ef4444);color:#120c04;font-size:18px;flex:none;cursor:pointer}
.item.pod .mid{flex:1;min-width:0}.item.pod .tt{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.empty{text-align:center;color:var(--mut);font-size:14px;padding:30px}
.loading{text-align:center;color:var(--mut);padding:24px}
.player{position:fixed;left:0;right:0;bottom:0;z-index:30;background:rgba(25,18,8,.92);backdrop-filter:blur(30px);border-top:1px solid var(--glass-bd);padding:12px 16px calc(12px + var(--safe-bot));max-width:680px;margin:0 auto;display:none}
.player.on{display:block}
.player .row{display:flex;align-items:center;gap:12px}
.player .ti{flex:1;min-width:0}.player .nm3{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player audio{width:100%;margin-top:8px}
.player .pp{width:44px;height:44px;border-radius:50%;border:none;background:linear-gradient(135deg,var(--accent),#ef4444);color:#120c04;font-size:18px;cursor:pointer;flex:none}
.feedchip{display:inline-flex;align-items:center;gap:6px;background:var(--glass);border:1px solid var(--glass-bd);border-radius:20px;padding:6px 12px;font-size:13px;margin:0 6px 8px 0}
.feedchip .x{color:#f87171;cursor:pointer}
.sheet-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:.25s;z-index:40}.sheet-bg.on{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:41;transform:translateY(110%);transition:.3s;background:rgba(25,18,8,.96);backdrop-filter:blur(40px);border-top:1px solid var(--glass-bd);border-radius:28px 28px 0 0;padding:10px 16px calc(20px + var(--safe-bot));max-width:680px;margin:0 auto}.sheet.on{transform:translateY(0)}
.grip{width:38px;height:5px;border-radius:3px;background:rgba(255,255,255,.25);margin:8px auto 14px}
.langs{display:grid;grid-template-columns:1fr 1fr;gap:8px}.lng{padding:13px;border-radius:14px;background:var(--glass);border:1px solid var(--glass-bd);font-size:15px;font-weight:600;cursor:pointer;display:flex;gap:9px;color:var(--txt)}.lng.sel{border-color:var(--accent);background:rgba(245,158,11,.2)}
</style>
</head>
<body>
<div class="bgfx"></div>
<div class="app">
  <header><div class="brand"><div class="ic">📰</div><div class="nm">NickDegs</div></div>
  <button class="iconbtn" onclick="openLang()">🌐</button></header>
  <h1 id="h1"></h1>
  <div class="hint" id="hint"></div>
  <div class="tabs"><div class="tab on" id="tabNews" onclick="setTab('news')"></div><div class="tab" id="tabPod" onclick="setTab('pod')"></div></div>
  <div id="feedArea"></div>
  <div id="list"></div>
</div>

<div class="player" id="player">
  <div class="row"><button class="pp" id="pp" onclick="togglePlay()">▶</button>
    <div class="ti"><div class="nm3" id="nowTitle"></div></div>
    <button class="iconbtn" onclick="closePlayer()">✕</button></div>
  <audio id="audio" controls></audio>
</div>

<div class="sheet-bg" id="sheetBg" onclick="closeLang()"></div>
<div class="sheet" id="sheet"><div class="grip"></div><h3 id="langTitle" style="font-size:18px;font-weight:700;margin-bottom:12px"></h3><div class="langs" id="langGrid"></div></div>

<script>
const PODCAST_FEED="https://feeds.captivate.fm/229044b4-d4ff-4b69-8625/";
const T={
 tr:{title:["Haber & Podcast","Haber & Podcast"],hint:"Beslemeler + podcast · ekle, oku, dinle",news:"Haberler",pod:"Podcast",addFeed:"RSS adresi ekle…",empty:"Besleme ekle ya da yenile",loading:"Yükleniyor…",err:"Yüklenemedi (bağlantıyı kontrol et)",lang:"Dil seç"},
 en:{title:["News & Podcast","News & Podcast"],hint:"Feeds + podcast · add, read, listen",news:"News",pod:"Podcast",addFeed:"Add RSS URL…",empty:"Add a feed or refresh",loading:"Loading…",err:"Couldn't load (check connection)",lang:"Language"},
 es:{title:["Noticias & Podcast","Noticias & Podcast"],hint:"Feeds + podcast",news:"Noticias",pod:"Podcast",addFeed:"Añadir RSS…",empty:"Añade un feed",loading:"Cargando…",err:"No se pudo cargar",lang:"Idioma"},
 zh:{title:["新闻与播客","新闻与播客"],hint:"订阅源 + 播客",news:"新闻",pod:"播客",addFeed:"添加RSS…",empty:"添加订阅源",loading:"加载中…",err:"加载失败",lang:"语言"},
 ru:{title:["Новости и подкаст","Новости и подкаст"],hint:"Ленты + подкаст",news:"Новости",pod:"Подкаст",addFeed:"Добавить RSS…",empty:"Добавьте ленту",loading:"Загрузка…",err:"Не удалось",lang:"Язык"},
 de:{title:["News & Podcast","News & Podcast"],hint:"Feeds + Podcast",news:"News",pod:"Podcast",addFeed:"RSS hinzufügen…",empty:"Feed hinzufügen",loading:"Lädt…",err:"Fehler",lang:"Sprache"},
 fr:{title:["Actu & Podcast","Actu & Podcast"],hint:"Flux + podcast",news:"Actu",pod:"Podcast",addFeed:"Ajouter RSS…",empty:"Ajouter un flux",loading:"Chargement…",err:"Échec",lang:"Langue"},
 it:{title:["News & Podcast","News & Podcast"],hint:"Feed + podcast",news:"News",pod:"Podcast",addFeed:"Aggiungi RSS…",empty:"Aggiungi un feed",loading:"Caricamento…",err:"Errore",lang:"Lingua"}
};
const FLAGS={tr:"🇹🇷",en:"🇬🇧",es:"🇪🇸",zh:"🇨🇳",ru:"🇷🇺",de:"🇩🇪",fr:"🇫🇷",it:"🇮🇹"},NAMES={tr:"Türkçe",en:"English",es:"Español",zh:"中文",ru:"Русский",de:"Deutsch",fr:"Français",it:"Italiano"};
let LANG=localStorage.getItem("lang")||(navigator.language||"tr").slice(0,2); if(!T[LANG])LANG="en";
const t=k=>T[LANG][k];
let tab="news";
let feeds=JSON.parse(localStorage.getItem("feeds")||"[]");
const saveFeeds=()=>localStorage.setItem("feeds",JSON.stringify(feeds));

// CapacitorHttp varsa onu kullan (CORS yok), yoksa proxy ile fetch (tarayıcı önizleme)
async function fetchText(url){
  try{
    const Cap=window.Capacitor;
    if(Cap&&Cap.Plugins&&Cap.Plugins.CapacitorHttp){
      const r=await Cap.Plugins.CapacitorHttp.get({url}); return typeof r.data==="string"?r.data:JSON.stringify(r.data);
    }
  }catch(e){}
  // tarayıcı: CORS proxy
  const r=await fetch("https://api.allorigins.win/raw?url="+encodeURIComponent(url));
  return await r.text();
}
function parseFeed(xml){
  const doc=new DOMParser().parseFromString(xml,"text/xml");
  const src=(doc.querySelector("channel>title")||{}).textContent||"RSS";
  return [...doc.querySelectorAll("item")].map(it=>{
    const enc=it.querySelector("enclosure");
    return {src, title:(it.querySelector("title")||{}).textContent||"",
      link:(it.querySelector("link")||{}).textContent||"",
      date:(it.querySelector("pubDate")||{}).textContent||"",
      audio: enc&&/audio/.test(enc.getAttribute("type")||"")?enc.getAttribute("url"):null};
  });
}
async function loadList(){
  const L=document.getElementById("list");
  L.innerHTML=`<div class="loading">${t("loading")}</div>`;
  const urls = tab==="pod" ? [PODCAST_FEED] : feeds;
  if(tab==="news" && !feeds.length){ L.innerHTML=`<div class="empty">${t("empty")}</div>`; return; }
  let items=[];
  for(const u of urls){ try{ items=items.concat(parseFeed(await fetchText(u))); }catch(e){} }
  if(!items.length){ L.innerHTML=`<div class="empty">${t("err")}</div>`; return; }
  if(tab==="pod"){
    items=items.filter(i=>i.audio);
    L.innerHTML=items.map((i,idx)=>`<div class="item pod"><button class="play" onclick="play('${encodeURIComponent(i.audio)}','${encodeURIComponent(i.title)}')">▶</button><div class="mid"><div class="tt">${esc(i.title)}</div><div class="dt">${fmtDate(i.date)}</div></div></div>`).join("")||`<div class="empty">${t("empty")}</div>`;
  }else{
    L.innerHTML=items.map(i=>`<div class="item" onclick="openLink('${encodeURIComponent(i.link)}')"><div class="src">${esc(i.src)}</div><div class="tt">${esc(i.title)}</div><div class="dt">${fmtDate(i.date)}</div></div>`).join("");
  }
}
const esc=s=>(s||"").replace(/<[^>]*>/g,"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])).slice(0,200);
const fmtDate=d=>{try{return new Date(d).toLocaleDateString();}catch(e){return"";}};
function openLink(u){u=decodeURIComponent(u);try{if(window.Capacitor&&window.Capacitor.Plugins&&window.Capacitor.Plugins.Browser){window.Capacitor.Plugins.Browser.open({url:u});return;}}catch(e){}window.open(u,"_blank");}
function play(u,title){u=decodeURIComponent(u);const a=document.getElementById("audio");a.src=u;a.play();document.getElementById("nowTitle").textContent=decodeURIComponent(title);document.getElementById("player").classList.add("on");document.getElementById("pp").textContent="⏸";}
function togglePlay(){const a=document.getElementById("audio");if(a.paused){a.play();document.getElementById("pp").textContent="⏸";}else{a.pause();document.getElementById("pp").textContent="▶";}}
function closePlayer(){const a=document.getElementById("audio");a.pause();document.getElementById("player").classList.remove("on");}
function addFeed(){const v=document.getElementById("feedInput").value.trim();if(!v)return;let u=v.startsWith("http")?v:"https://"+v;feeds.unshift(u);saveFeeds();renderFeedArea();loadList();}
function delFeed(i){feeds.splice(i,1);saveFeeds();renderFeedArea();loadList();}
function renderFeedArea(){
  const a=document.getElementById("feedArea");
  if(tab==="pod"){a.innerHTML="";return;}
  a.innerHTML=`<div class="feedbar"><input id="feedInput" placeholder="${t('addFeed')}" onkeydown="if(event.key==='Enter')addFeed()"><button onclick="addFeed()">+</button></div>`+
    (feeds.length?`<div>`+feeds.map((f,i)=>`<span class="feedchip">${esc(f.replace(/^https?:\/\//,'').slice(0,24))}<span class="x" onclick="delFeed(${i})">✕</span></span>`).join("")+`</div>`:"");
}
function setTab(x){tab=x;document.getElementById("tabNews").classList.toggle("on",x==="news");document.getElementById("tabPod").classList.toggle("on",x==="pod");renderFeedArea();loadList();}
function apply(){document.documentElement.lang=LANG;document.getElementById("h1").textContent=t("title")[0];document.getElementById("hint").textContent=t("hint");document.getElementById("tabNews").textContent=t("news");document.getElementById("tabPod").textContent=t("pod");renderFeedArea();loadList();}
function openLang(){document.getElementById("langTitle").textContent=t("lang");document.getElementById("langGrid").innerHTML=Object.keys(NAMES).map(l=>`<div class="lng ${l===LANG?'sel':''}" onclick="setLang('${l}')"><span style="font-size:20px">${FLAGS[l]}</span><span>${NAMES[l]}</span></div>`).join("");document.getElementById("sheetBg").classList.add("on");document.getElementById("sheet").classList.add("on");}
function closeLang(){document.getElementById("sheetBg").classList.remove("on");document.getElementById("sheet").classList.remove("on");}
function setLang(l){LANG=l;localStorage.setItem("lang",l);closeLang();apply();}
apply();
</script>
</body>
</html>
