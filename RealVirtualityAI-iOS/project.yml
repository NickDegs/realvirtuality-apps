name: RealVirtualityAI
options:
  bundleIdPrefix: com.nickdegs
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_BUNDLE_IDENTIFIER: com.nickdegs.realvirtualityai
    TARGETED_DEVICE_FAMILY: "1"            # 1 = SADECE iPhone (iPad yok)
    CODE_SIGN_ENTITLEMENTS: RealVirtualityAI/RealVirtualityAI.entitlements
targets:
  RealVirtualityAI:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"
    sources: [RealVirtualityAI]
    dependencies:
      - target: RVWidgetExtension
        embed: true
      - target: RVShareExtension
        embed: true
    info:
      path: RealVirtualityAI/Info.plist
      properties:
        CFBundleDisplayName: RealVirtuality AI
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        ITSAppUsesNonExemptEncryption: false
        CFBundleURLTypes:
          - CFBundleURLSchemes: [rvai]
  RVWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources: [RVWidget]
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"
        PRODUCT_BUNDLE_IDENTIFIER: com.nickdegs.realvirtualityai.widget
        CODE_SIGN_ENTITLEMENTS: RVWidget/RVWidget.entitlements
    info:
      path: RVWidget/Info.plist
      properties:
        CFBundleDisplayName: RV Araçları
        CFBundleName: RV Araçları
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension

  RVShareExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources: [RVShare]
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"
        PRODUCT_BUNDLE_IDENTIFIER: com.nickdegs.realvirtualityai.share
        CODE_SIGN_ENTITLEMENTS: RVShare/RVShare.entitlements
    info:
      path: RVShare/Info.plist
      properties:
        CFBundleDisplayName: RealVirtuality AI
        CFBundleName: RVShare
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsImageWithMaxCount: 1

  RealVirtualityAIUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources: [RealVirtualityAIUITests]
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: app.realvirtuality.ai.uitests
        CODE_SIGNING_ALLOWED: NO
    dependencies:
      - target: RealVirtualityAI
