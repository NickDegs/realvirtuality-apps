name: Build NickDegs Business (iOS Native)
on:
  push:
    branches: [main]
    paths: ["NickDegsKurumsal-iOS/**", ".github/workflows/build_nickdegs-business-ios.yml"]
  workflow_dispatch:
  schedule:
    - cron: '0 6 1 * *'  # ayda 1 oto-rebuild → TestFlight süresi dolmasın

jobs:
  ios-native:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Xcode seç
        run: |
          BEST=$(ls /Applications/ | grep -E "^Xcode_[0-9]" | sort -V | tail -1)
          sudo xcode-select -s "/Applications/$BEST/Contents/Developer"
          echo "Xcode: $BEST"; xcodebuild -version
      - name: XcodeGen kur + proje üret
        working-directory: NickDegsKurumsal-iOS
        run: |
          brew install xcodegen
          xcodegen generate
          BN=$(date +%s)
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BN" NickDegsKurumsal/Info.plist 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string $BN" NickDegsKurumsal/Info.plist
          echo "CFBundleVersion (literal) → $BN"
      - name: Sertifika + ASC API anahtarını kur
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.APPLE_ASC_API_KEY }}" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_ASC_KEY_ID }}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_ASC_KEY_ID }}.p8
          echo "${{ secrets.APPLE_DIST_P12_BASE64 }}" | base64 -d > /tmp/dist.p12
          security create-keychain -p "ci-keychain" ci-build.keychain-db
          security default-keychain -s ci-build.keychain-db
          security unlock-keychain -p "ci-keychain" ci-build.keychain-db
          security import /tmp/dist.p12 -k ci-build.keychain-db -P "${{ secrets.APPLE_P12_PASSWORD }}" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "ci-keychain" ci-build.keychain-db
          security list-keychain -d user -s ci-build.keychain-db login.keychain-db
          rm /tmp/dist.p12
          security find-identity -v -p codesigning ci-build.keychain-db | head -5
      - name: Arşivle + TestFlight'a yükle
        working-directory: NickDegsKurumsal-iOS
        run: |
          cat > ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store</string>
            <key>destination</key><string>upload</string>
            <key>teamID</key><string>SZF4T3P583</string>
            <key>signingStyle</key><string>automatic</string>
            <key>uploadSymbols</key><true/>
          </dict></plist>
          PLIST
          xcodebuild -project NickDegsBusiness.xcodeproj -scheme NickDegsBusiness \
            -destination 'generic/platform=iOS' -configuration Release -archivePath ND.xcarchive \
            DEVELOPMENT_TEAM=SZF4T3P583 \
            CURRENT_PROJECT_VERSION=$(date +%s) \
            TARGETED_DEVICE_FAMILY=1 \
            CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" ONLY_ACTIVE_ARCH=NO \
            archive
          xcodebuild -exportArchive -archivePath ND.xcarchive \
            -exportOptionsPlist ExportOptions.plist -exportPath ./ipa-out \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_ASC_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.APPLE_ASC_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APPLE_ASC_ISSUER_ID }}
          echo "✅ TestFlight'a yüklendi"
      - name: Build'i beta gruplarına ata (TestFlight'ta görünsün)
        if: success()
        env:
          ASC_KEY_PATH: ${{ github.workspace }}/.asc_key.p8
          ASC_KEY_ID: ${{ secrets.APPLE_ASC_KEY_ID }}
          ASC_ISSUER: ${{ secrets.APPLE_ASC_ISSUER_ID }}
          ASC_APP_ID: "6782595925"
        run: |
          echo "${{ secrets.APPLE_ASC_API_KEY }}" > "$ASC_KEY_PATH"
          python3 scripts/assign_beta.py
          rm -f "$ASC_KEY_PATH"
      - name: App Store incelemeye gönder
        if: success()
        env:
          ASC_KEY_PATH: ${{ github.workspace }}/.asc_key.p8
          ASC_KEY_ID: ${{ secrets.APPLE_ASC_KEY_ID }}
          ASC_ISSUER: ${{ secrets.APPLE_ASC_ISSUER_ID }}
          ASC_APP_ID: "6782595925"
          WHATS_NEW: "New: Select your business type (restaurant, salon, clinic, law firm…) at checkout — your panel is set up automatically for your sector."
          REVIEW_NOTES: |
            New feature: sector selection at purchase time. Users now pick their business type (restaurant/cafe, salon/barber, clinic, law firm, gym, etc.) before completing the App Store purchase. The backend provisions the correct specialized system (order management for restaurants, appointment system for salons/clinics, case management for law firms) and links it to the buyer's phone number.

            After purchase the app returns a panel_token that deep-links directly into the NickDegs Dashboard app (nickdegs-panel:// scheme) with automatic login and sector-specific navigation.

            To test In-App Purchase:
            1. Open the app and tap any business plan.
            2. Enter a business name (e.g. "Test Cafe") and select a sector from the dropdown (e.g. "Kafe").
            3. Tap "App Store ile Satın Al" and complete the Apple payment sheet.
            4. The success screen shows panel credentials. Tap "Paneli Hemen Aç" to open NickDegs Dashboard with auto-login.
            5. The Dashboard should show sector-specific panels (e.g. for Kafe: Orders, Menu/Stock, QR Tables, Reports).

            Note: This app requires the NickDegs Business backend (nickdegs.com). The backend is live and accessible.
        run: |
          echo "${{ secrets.APPLE_ASC_API_KEY }}" > "$ASC_KEY_PATH"
          python3 scripts/submit_to_review.py
          rm -f "$ASC_KEY_PATH"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nickdegs-business-ios-ipa
          path: NickDegsKurumsal-iOS/ipa-out/*.ipa
          retention-days: 30
