name: Upload IAP Screenshots + Review Notes

on:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python bağımlılıkları
        run: pip install Pillow cryptography requests

      - uses: actions/download-artifact@v4
        with:
          name: raw-screenshots-rv
          path: /tmp/raw/rv
          run-id: 28102086419
          repository: NickDegs/realvirtuality-apps
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - uses: actions/download-artifact@v4
        with:
          name: raw-screenshots-business
          path: /tmp/raw/business
          run-id: 28102086419
          repository: NickDegs/realvirtuality-apps
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - uses: actions/download-artifact@v4
        with:
          name: raw-screenshots-panel
          path: /tmp/raw/panel
          run-id: 28102086419
          repository: NickDegs/realvirtuality-apps
          github-token: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: IAP screenshot + Review Notes yükle
        env:
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          if echo "$ASC_KEY_P8" | grep -qE "^[A-Za-z0-9+/=]{100}"; then
            export ASC_KEY_P8=$(echo "$ASC_KEY_P8" | base64 -d)
          fi
          python3 - << 'PYEOF'
          import os, sys, time, json, base64, hashlib, urllib.request, urllib.error
          from pathlib import Path
          from PIL import Image, ImageDraw, ImageFont

          KEY_PEM   = os.environ["ASC_KEY_P8"]
          KEY_ID    = os.environ["ASC_KEY_ID"]
          ISSUER_ID = os.environ["ASC_ISSUER_ID"]
          BASE = "https://api.appstoreconnect.apple.com"

          from cryptography.hazmat.primitives import serialization, hashes
          from cryptography.hazmat.primitives.asymmetric import ec
          from cryptography.hazmat.primitives.asymmetric.utils import decode_dss_signature
          _priv = serialization.load_pem_private_key(KEY_PEM.encode(), password=None)

          def b64u(d):
              if isinstance(d, str): d = d.encode()
              return base64.urlsafe_b64encode(d).rstrip(b"=").decode()

          _tok = [None, 0]
          def tok():
              now = int(time.time())
              if _tok[0] and now - _tok[1] < 1500: return _tok[0]
              h = b64u(json.dumps({"alg":"ES256","kid":KEY_ID,"typ":"JWT"}, separators=(',',':')))
              p = b64u(json.dumps({"iss":ISSUER_ID,"iat":now,"exp":now+1200,"aud":"appstoreconnect-v1"}, separators=(',',':')))
              sig = _priv.sign(f"{h}.{p}".encode(), ec.ECDSA(hashes.SHA256()))
              r, s = decode_dss_signature(sig)
              t = f"{h}.{p}.{b64u(r.to_bytes(32,'big')+s.to_bytes(32,'big'))}"
              _tok[0] = t; _tok[1] = now; return t

          def hdrs():
              return {"Authorization": f"Bearer {tok()}", "Content-Type": "application/json"}

          def GET(path, params=""):
              url = BASE + path + ("?" + params if params else "")
              try:
                  with urllib.request.urlopen(urllib.request.Request(url, headers=hdrs()), timeout=30) as r:
                      return json.loads(r.read()), r.status
              except urllib.error.HTTPError as e:
                  return {"_err": e.code, "_body": e.read().decode()[:200]}, e.code

          def POST(path, body):
              data = json.dumps(body).encode()
              req = urllib.request.Request(BASE+path, data=data, headers=hdrs(), method="POST")
              try:
                  with urllib.request.urlopen(req, timeout=30) as r:
                      raw = r.read(); return (json.loads(raw) if raw else {}), r.status
              except urllib.error.HTTPError as e:
                  return {"_err": e.code, "_body": e.read().decode()[:300]}, e.code

          def PATCH(path, body):
              data = json.dumps(body).encode()
              req = urllib.request.Request(BASE+path, data=data, headers=hdrs(), method="PATCH")
              try:
                  with urllib.request.urlopen(req, timeout=30) as r:
                      raw = r.read(); return (json.loads(raw) if raw else {}), r.status
              except urllib.error.HTTPError as e:
                  return {"_err": e.code}, e.code

          def upload_s3(op, png_bytes):
              put_hdrs = {h["name"]: h["value"] for h in op.get("requestHeaders", [])}
              put_hdrs["Content-Type"] = "image/png"
              req = urllib.request.Request(op["url"], data=png_bytes, method="PUT", headers=put_hdrs)
              try:
                  with urllib.request.urlopen(req, timeout=120) as r:
                      return r.status in (200, 204)
              except: return False

          def md5b64(data):
              return base64.b64encode(hashlib.md5(data).digest()).decode()

          # ── IAP screenshot üret ───────────────────────────────────────────
          def make_iap_png(raw_dir, bg_col, accent, title, subtitle):
              w, h = 1290, 2796
              img = Image.new("RGB", (w, h), bg_col)
              draw = ImageDraw.Draw(img)
              # Gradient
              for y in range(h):
                  t = y / h
                  col = tuple(int(bg_col[i] + (min(255, accent[i]) - bg_col[i]) * t * 0.4) for i in range(3))
                  draw.line([(0,y),(w,y)], fill=col)
              # App screenshot
              pngs = sorted(Path(raw_dir).glob("*.png")) if Path(raw_dir).exists() else []
              if pngs:
                  try:
                      shot = Image.open(pngs[-1]).convert("RGB")
                      ratio = min(w * 0.85 / shot.width, h * 0.65 / shot.height)
                      nw, nh = int(shot.width * ratio), int(shot.height * ratio)
                      shot = shot.resize((nw, nh), Image.LANCZOS)
                      mask = Image.new("L", (nw, nh), 0)
                      ImageDraw.Draw(mask).rounded_rectangle([0,0,nw,nh], radius=36, fill=255)
                      img.paste(shot, ((w-nw)//2, (h-nh)//2), mask)
                  except: pass
              # Başlık
              try: fnt = ImageFont.truetype("/usr/share/fonts/truetype/noto/NotoSans-Bold.ttf", int(w*0.05))
              except: fnt = ImageFont.load_default(size=int(w*0.05))
              bb = fnt.getbbox(title)
              draw.text(((w-(bb[2]-bb[0]))//2, int(h*0.05)), title, font=fnt, fill=(255,255,255))
              try: sfnt = ImageFont.truetype("/usr/share/fonts/truetype/noto/NotoSans-Regular.ttf", int(w*0.03))
              except: sfnt = ImageFont.load_default(size=int(w*0.03))
              bb2 = sfnt.getbbox(subtitle)
              draw.text(((w-(bb2[2]-bb2[0]))//2, int(h*0.105)), subtitle, font=sfnt, fill=(180,190,220))
              import io
              buf = io.BytesIO(); img.save(buf, "PNG"); return buf.getvalue()

          # ── App config ───────────────────────────────────────────────────
          APPS = {
              "6782458951": {
                  "name": "RealVirtuality AI",
                  "raw_dir": "/tmp/raw/rv",
                  "bg": (10,11,20), "accent": (124,92,255),
                  "iap_title": "Credits & Pricing",
                  "iap_sub": "Purchase credits to use AI tools",
                  "review_notes": (
                      "Hello App Review Team,\n\n"
                      "I am a solo indie developer. This app provides AI-powered creative tools "
                      "(image generation, face swap, voice synthesis, background removal, upscaling).\n\n"
                      "In-App Purchases (Credits): Users purchase credit packs to use AI tools. "
                      "The credits/purchase screen is accessible via the bolt (⚡) button in the top toolbar. "
                      "Guest mode is available with limited free credits — no account required to browse.\n\n"
                      "If any issue is found, please let me know and I will fix it promptly. "
                      "Thank you for your time."
                  ),
              },
              "6782595925": {
                  "name": "NickDegs Business",
                  "raw_dir": "/tmp/raw/business",
                  "bg": (8,12,22), "accent": (74,134,255),
                  "iap_title": "Subscription Plans",
                  "iap_sub": "Choose a plan that fits your business",
                  "review_notes": (
                      "Hello App Review Team,\n\n"
                      "I am a solo indie developer. This app is a B2B platform for small business owners "
                      "to manage their digital presence and access business tools.\n\n"
                      "Subscription: The subscription screen is in the last tab (Account). "
                      "The catalog and pricing is fully visible without any login.\n\n"
                      "If any issue is found during review, please let me know and I will fix it immediately. "
                      "Thank you for your thorough review."
                  ),
              },
              "6782606941": {
                  "name": "NickDegs Dashboard",
                  "raw_dir": "/tmp/raw/panel",
                  "bg": (7,10,20), "accent": (41,121,216),
                  "iap_title": "Dashboard Management",
                  "iap_sub": "Full control for business owners",
                  "review_notes": (
                      "Hello App Review Team,\n\n"
                      "I am a solo indie developer. This is an admin/management dashboard for "
                      "business owners subscribed to the NickDegs platform.\n\n"
                      "Login: The app uses SMS OTP. Please use test account:\n"
                      "  Phone: +90 539 912 5223\n"
                      "  (OTP will arrive via SMS — I can provide it on request)\n\n"
                      "This is a utility app for existing customers only. "
                      "If any issue is found, I am available to fix it right away. "
                      "Thank you for your time."
                  ),
              },
          }

          # ── Version state helper ──────────────────────────────────────────
          EDITABLE = {"PREPARE_FOR_SUBMISSION","DEVELOPER_REJECTED","REJECTED","METADATA_REJECTED"}

          def get_versions(app_id):
              d, _ = GET(f"/v1/apps/{app_id}/appStoreVersions",
                         "filter[platform]=IOS&limit=5")
              return d.get("data", [])

          # ── Ana işlem ────────────────────────────────────────────────────
          for app_id, cfg in APPS.items():
              print(f"\n{'='*50}")
              print(f"📱 {cfg['name']} ({app_id})")

              # 1. Tüm versiyonları göster
              versions = get_versions(app_id)
              print(f"  Versiyonlar:")
              for v in versions:
                  print(f"    {v['attributes']['versionString']} — {v['attributes'].get('appStoreState','?')}")

              # 2. Abonelik gruplarını bul (subscriptions ≠ inAppPurchasesV2)
              sg_d, sg_code = GET(f"/v1/apps/{app_id}/subscriptionGroups",
                                  "fields[subscriptionGroups]=referenceName&limit=20")
              groups = sg_d.get("data", [])
              print(f"  Abonelik grubu: {len(groups)}")

              # Her grup → abonelikler → IAP screenshot
              for group in groups:
                  gid = group["id"]
                  gname = group["attributes"].get("referenceName","")
                  print(f"    Grup: {gname} ({gid})")

                  subs_d, _ = GET(f"/v1/subscriptionGroups/{gid}/subscriptions",
                                  "fields[subscriptions]=name,productId,state&limit=20")
                  subs = subs_d.get("data", [])
                  print(f"    Abonelik sayısı: {len(subs)}")

                  iap_png = make_iap_png(cfg["raw_dir"], cfg["bg"], cfg["accent"],
                                         cfg["iap_title"], cfg["iap_sub"])

                  for sub in subs:
                      sub_id = sub["id"]
                      sub_name = sub["attributes"].get("name","")
                      sub_state = sub["attributes"].get("state","")
                      print(f"      Abonelik: {sub_name} ({sub_state})")

                      # Localization'ları bul
                      loc_d, _ = GET(f"/v1/subscriptions/{sub_id}/subscriptionLocalizations",
                                     "fields[subscriptionLocalizations]=locale&limit=10")
                      locs = loc_d.get("data", [])

                      for loc in locs:
                          loc_id = loc["id"]
                          locale = loc["attributes"].get("locale","")

                          # Mevcut screenshot var mı kontrol et
                          img_d, _ = GET(f"/v1/subscriptionLocalizations/{loc_id}/subscriptionImages")
                          existing = img_d.get("data",[])
                          if existing:
                              print(f"        {locale}: screenshot zaten var, atlanıyor")
                              continue

                          # Screenshot ekle
                          body = {"data": {
                              "type": "subscriptionImages",
                              "attributes": {
                                  "fileName": f"sub_shot_{sub_id}.png",
                                  "fileSize": len(iap_png)
                              },
                              "relationships": {
                                  "subscriptionLocalization": {"data": {"type":"subscriptionLocalizations","id":loc_id}}
                              }
                          }}
                          res, code = POST("/v1/subscriptionImages", body)
                          if code in (200,201) and "data" in res:
                              ops = res["data"]["attributes"].get("uploadOperations",[])
                              if ops and upload_s3(ops[0], iap_png):
                                  img_id = res["data"]["id"]
                                  PATCH(f"/v1/subscriptionImages/{img_id}", {
                                      "data": {"type":"subscriptionImages","id":img_id,
                                               "attributes": {"uploaded":True,"sourceFileChecksum":md5b64(iap_png)}}
                                  })
                                  print(f"        ✅ {locale} screenshot yüklendi")
                              else:
                                  print(f"        ⚠ {locale} upload başarısız")
                          else:
                              print(f"        ⚠ {locale} reserve hata ({code}): {res.get('_body','')[:100]}")

              # 3. Review notes — düzenlenebilir versiyon bul
              edit_ver = None
              for v in versions:
                  if v["attributes"].get("appStoreState","") in EDITABLE:
                      edit_ver = v; break

              if not edit_ver and versions:
                  # En son versiyonu kullan
                  edit_ver = versions[0]

              if edit_ver:
                  ver_id = edit_ver["id"]
                  ver_str = edit_ver["attributes"]["versionString"]
                  ver_state = edit_ver["attributes"].get("appStoreState","")
                  print(f"\n  📝 Review notes → {ver_str} ({ver_state})")

                  rev_d, rev_code = GET(f"/v1/appStoreVersions/{ver_id}/appStoreReviewDetail")
                  notes = cfg["review_notes"]

                  if rev_code == 200 and rev_d.get("data"):
                      rev_id = rev_d["data"]["id"]
                      _, code = PATCH(f"/v1/appStoreReviewDetails/{rev_id}",
                          {"data":{"type":"appStoreReviewDetails","id":rev_id,
                                   "attributes":{"notesForReview":notes}}})
                      print(f"    Review notes güncellendi: HTTP {code}")
                  else:
                      _, code = POST("/v1/appStoreReviewDetails",
                          {"data":{"type":"appStoreReviewDetails",
                                   "attributes":{"notesForReview":notes},
                                   "relationships":{"appStoreVersion":{"data":{"type":"appStoreVersions","id":ver_id}}}}})
                      print(f"    Review notes oluşturuldu: HTTP {code}")
              else:
                  print(f"  ⚠ Hiç versiyon bulunamadı")

          print("\n✅ Tüm işlemler tamamlandı")
          PYEOF
