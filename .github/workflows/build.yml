name: Build Apps
on:
  push: { branches: [main] }
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: { app: [kasa, araclar, metin, butce] }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Build Android (.apk)
        working-directory: ${{ matrix.app }}
        run: |
          npm install
          npx cap add android
          npx @capacitor/assets generate --android || true
          npx cap sync android
          cd android && chmod +x gradlew && ./gradlew assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-android-apk
          path: ${{ matrix.app }}/android/app/build/outputs/apk/debug/*.apk

  ios:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix: { app: [kasa, araclar, metin, butce] }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Build iOS (derleme, imzasız test)
        working-directory: ${{ matrix.app }}
        run: |
          npm install
          npx cap add ios
          npx @capacitor/assets generate --ios || true
          npx cap sync ios
          cd ios/App && pod install
          xcodebuild -workspace App.xcworkspace -scheme App -configuration Debug -sdk iphonesimulator -destination 'generic/platform=iOS Simulator' CODE_SIGNING_ALLOWED=NO build
