name: Build Apps
on:
  push: { branches: [main] }
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  android:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [tarifler]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Capacitor hazırla
        working-directory: ${{ matrix.app }}
        run: |
          npm install --legacy-peer-deps
          npx cap add android
          npx @capacitor/assets generate --android || true
          npx cap sync android
          # SDK 35 zorunlu (Google Play Agustos 2025+)
          find . -name "variables.gradle" | xargs sed -i 's/targetSdkVersion = 34/targetSdkVersion = 35/g' 2>/dev/null || true
          find . -name "variables.gradle" | xargs sed -i 's/compileSdkVersion = 34/compileSdkVersion = 35/g' 2>/dev/null || true
          # minSdkVersion 23+ (billing:8.x zorunluluğu)
          find . -name "variables.gradle" | xargs sed -i 's/minSdkVersion = 2[012]/minSdkVersion = 23/g' 2>/dev/null || true
          # Her build'de benzersiz versionCode
          find . -name "build.gradle" -path "*/app/build.gradle" | xargs sed -i "s/versionCode [0-9]*/versionCode ${{ github.run_number }}/g" 2>/dev/null || true
          # AdMob: AD_ID izni + App ID meta-data (Reklam Kurali)
          python3 - << 'PYEOF'
          import re
          manifest = 'android/app/src/main/AndroidManifest.xml'
          with open(manifest) as f: c = f.read()
          if 'AD_ID' not in c:
              c = c.replace('</manifest>', '    <uses-permission android:name="com.google.android.gms.permission.AD_ID"/>\n</manifest>')
          if 'APPLICATION_ID' not in c:
              admob = '        <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-3940256099942544~3347511713"/>'
              c = re.sub(r'(<application\b[^>]*>)', r'\1\n' + admob, c, count=1)
          with open(manifest, 'w') as f: f.write(c)
          print("AndroidManifest AdMob OK")
          PYEOF
      - name: İmzalı .aab üret
        working-directory: ${{ matrix.app }}/android
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > release.keystore
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$(pwd)/release.keystore \
            -Pandroid.injected.signing.store.password='${{ secrets.ANDROID_KEYSTORE_PASSWORD }}' \
            -Pandroid.injected.signing.key.alias='${{ secrets.ANDROID_KEY_ALIAS }}' \
            -Pandroid.injected.signing.key.password='${{ secrets.ANDROID_KEYSTORE_PASSWORD }}'
          rm -f release.keystore
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-aab
          path: ${{ matrix.app }}/android/app/build/outputs/bundle/release/*.aab
          retention-days: 30

  ios:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        app: [tarifler]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Xcode (en güncel — iOS 26 / iPhone 17 uyumlu)
        run: |
          # Önce Xcode 26+ ara (iOS 26 SDK = iPhone 17 Pro desteği)
          BEST=""
          for VER in 26 27 25 16 17; do
            MATCH=$(ls /Applications/ | grep -E "^Xcode_${VER}" | sort -V | tail -1)
            if [ -n "$MATCH" ]; then BEST="$MATCH"; break; fi
          done
          if [ -z "$BEST" ]; then
            BEST=$(ls /Applications/ | grep -E "^Xcode_[0-9]" | sort -V | tail -1)
          fi
          sudo xcode-select -s "/Applications/$BEST/Contents/Developer"
          echo "Xcode seçildi: $BEST"
          xcodebuild -version
          # Available SDKs
          xcodebuild -showsdks 2>/dev/null | grep -i iphone | tail -5 || true
      - name: Sertifika + ASC API anahtarını kur
        run: |
          # ASC API key
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.APPLE_ASC_API_KEY }}" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_ASC_KEY_ID }}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_ASC_KEY_ID }}.p8
          # Distribution sertifikasını geçici keychain'e aktar
          echo "${{ secrets.APPLE_DIST_P12_BASE64 }}" | base64 -d > /tmp/dist.p12
          security create-keychain -p "ci-keychain" ci-build.keychain-db
          security default-keychain -s ci-build.keychain-db
          security unlock-keychain -p "ci-keychain" ci-build.keychain-db
          security import /tmp/dist.p12 -k ci-build.keychain-db \
            -P "${{ secrets.APPLE_P12_PASSWORD }}" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "ci-keychain" ci-build.keychain-db
          security list-keychain -d user -s ci-build.keychain-db login.keychain-db
          rm /tmp/dist.p12
          # Doğrula
          security find-identity -v -p codesigning ci-build.keychain-db | head -5
      - name: Capacitor hazırla + Xcode ayarları
        working-directory: ${{ matrix.app }}
        run: |
          npm install --legacy-peer-deps
          npx cap add ios
          npx @capacitor/assets generate --ios || true
          npx cap sync ios
          # Şifreleme kullanılmıyor — TestFlight compliance zorunlu
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" ios/App/App/Info.plist 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" ios/App/App/Info.plist || true
          # AdMob App ID (Reklam Kurali — test ID)
          /usr/libexec/PlistBuddy -c "Add :GADApplicationIdentifier string ca-app-pub-3940256099942544~1458002511" ios/App/App/Info.plist 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :GADApplicationIdentifier ca-app-pub-3940256099942544~1458002511" ios/App/App/Info.plist
          # ATT — zorunlu (IDFA kullanımı)
          ATT_MSG="Personalized ads are shown based on your activity. You can change this in Settings."
          /usr/libexec/PlistBuddy -c "Add :NSUserTrackingUsageDescription string $ATT_MSG" ios/App/App/Info.plist 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :NSUserTrackingUsageDescription $ATT_MSG" ios/App/App/Info.plist
          # Verify GADApplicationIdentifier is set correctly (not as object)
          GAD_VAL=$(/usr/libexec/PlistBuddy -c "Print :GADApplicationIdentifier" ios/App/App/Info.plist 2>/dev/null || echo "")
          echo "GADApplicationIdentifier: $GAD_VAL"
          if [ -z "$GAD_VAL" ] || [ "$GAD_VAL" = "Dict" ] || [ "${#GAD_VAL}" -lt 10 ]; then
            /usr/libexec/PlistBuddy -c "Add :GADApplicationIdentifier string ca-app-pub-3940256099942544~1458002511" ios/App/App/Info.plist 2>/dev/null || \
            /usr/libexec/PlistBuddy -c "Set :GADApplicationIdentifier ca-app-pub-3940256099942544~1458002511" ios/App/App/Info.plist
            echo "GADApplicationIdentifier force-set to test ID"
          fi
          PBX=ios/App/App.xcodeproj/project.pbxproj
          sed -i '' -E 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]+;/IPHONEOS_DEPLOYMENT_TARGET = 16.4;/g' "$PBX" || true
          sed -i '' -E 's/TARGETED_DEVICE_FAMILY = "?[12,]+"?;/TARGETED_DEVICE_FAMILY = "1,2";/g' "$PBX" || true
          # Mevcut post_install bloğuna Pods imza devre dışı bırakma enjekte et
          python3 - << 'PYEOF'
          import sys
          with open('ios/App/Podfile', 'r') as f:
              content = f.read()
          injection = "\n  installer.pods_project.targets.each do |target|\n    target.build_configurations.each do |config|\n      config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'\n      config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'\n    end\n  end"
          if 'post_install do |installer|' in content:
              content = content.replace('post_install do |installer|', 'post_install do |installer|' + injection, 1)
          else:
              content += "\npost_install do |installer|" + injection + "\nend\n"
          with open('ios/App/Podfile', 'w') as f:
              f.write(content)
          print("Podfile patched OK")
          PYEOF
      - name: Sign in with Apple entitlement + Swift plugin
        working-directory: ${{ matrix.app }}
        run: |
          cp ios-assets/App.entitlements ios/App/App/App.entitlements
          cp ios-assets/SignInWithApplePlugin.swift ios/App/App/SignInWithApplePlugin.swift
          cp ios-assets/SignInWithApplePlugin.m ios/App/App/SignInWithApplePlugin.m
          python3 - << 'PYEOF'
          import hashlib, re, os

          def make_id(seed):
              return hashlib.sha1(seed.encode()).hexdigest()[:24].upper()

          pbx = "ios/App/App.xcodeproj/project.pbxproj"
          if not os.path.exists(pbx):
              print("pbxproj not found, skipping")
              exit(0)

          with open(pbx) as f:
              content = f.read()

          new_files = [
              ("SignInWithApplePlugin.swift", "sourcecode.swift"),
              ("SignInWithApplePlugin.m",     "sourcecode.c.objc"),
          ]

          changed = False
          for fname, ftype in new_files:
              if fname in content:
                  print(f"  {fname}: already in project")
                  continue
              ref_id   = make_id("ref_" + fname)
              build_id = make_id("build_" + fname)
              changed  = True

              # 1. PBXFileReference
              ref_line = (f'\t\t{ref_id} /* {fname} */ = '
                          f'{{isa = PBXFileReference; lastKnownFileType = {ftype}; '
                          f'path = {fname}; sourceTree = "<group>"; }};\n')
              content = content.replace(
                  '/* End PBXFileReference section */',
                  ref_line + '\t\t/* End PBXFileReference section */')

              # 2. PBXBuildFile
              build_line = (f'\t\t{build_id} /* {fname} in Sources */ = '
                            f'{{isa = PBXBuildFile; fileRef = {ref_id} /* {fname} */; }};\n')
              content = content.replace(
                  '/* End PBXBuildFile section */',
                  build_line + '\t\t/* End PBXBuildFile section */')

              # 3. PBXGroup – insert after AppDelegate.swift
              content = re.sub(
                  r'(/\* AppDelegate\.swift \*/,)',
                  rf'\1\n\t\t\t\t{ref_id} /* {fname} */,',
                  content, count=1)

              # 4. PBXSourcesBuildPhase – insert after AppDelegate in Sources
              content = re.sub(
                  r'(/\* AppDelegate\.swift in Sources \*/,)',
                  rf'\1\n\t\t\t\t{build_id} /* {fname} in Sources */,',
                  content, count=1)

              print(f"  Added {fname} to Xcode project")

          # 5. CODE_SIGN_ENTITLEMENTS
          if "CODE_SIGN_ENTITLEMENTS" not in content:
              content = content.replace(
                  "DEVELOPMENT_TEAM = ",
                  'CODE_SIGN_ENTITLEMENTS = "App/App.entitlements";\n\t\t\t\tDEVELOPMENT_TEAM = ')
              changed = True
              print("  Added CODE_SIGN_ENTITLEMENTS")

          if changed:
              with open(pbx, "w") as f:
                  f.write(content)
          print("Apple Sign-In plugin OK")
          PYEOF
      - name: AdMob Consent stub (Xcode 26 uyumluluğu)
        working-directory: ${{ matrix.app }}
        run: |
          CONSENT_FILE="node_modules/@capacitor-community/admob/ios/Sources/AdMobPlugin/Consent/ConsentExecutor.swift"
          if [ -f "$CONSENT_FILE" ]; then
            echo '' | base64 -d > "$CONSENT_FILE"
            echo "ConsentExecutor.swift patched OK"
          else
            echo "ConsentExecutor.swift not found, skipping"
          fi
      - name: ExportOptions.plist oluştur
        working-directory: ${{ matrix.app }}/ios/App
        run: |
          cat > ExportOptions.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
              <key>method</key><string>app-store</string>
              <key>teamID</key><string>${{ secrets.APPLE_ASC_TEAM_ID }}</string>
              <key>signingStyle</key><string>automatic</string>
              <key>uploadBitcode</key><false/>
              <key>uploadSymbols</key><true/>
              <!-- App Thinning: her iPhone/iPad modeli için ayrı slice üretir -->
              <!-- iPhone 17 Pro, 17, 16 Pro, 16, 15, 14, SE, iPad Pro hepsi ayrı ayrı optimize -->
              <key>thinning</key><string>&lt;thin-for-all-variants&gt;</string>
              <key>iCloudContainerEnvironment</key><string>Production</string>
              <key>stripSwiftSymbols</key><true/>
          </dict></plist>
          PLIST
      - name: iOS Release Archive + IPA
        working-directory: ${{ matrix.app }}/ios/App
        run: |
          pod install
          # Archive: imzalamayı atla (export adımı imzalayacak)
          xcodebuild \
            -workspace App.xcworkspace -scheme App \
            -destination 'generic/platform=iOS' -configuration Release -archivePath App.xcarchive \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_ASC_TEAM_ID }} \
            CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            ENABLE_BITCODE=NO \
            SWIFT_COMPILATION_MODE=wholemodule \
            GCC_OPTIMIZATION_LEVEL=s \
            DEPLOYMENT_POSTPROCESSING=YES \
            STRIP_INSTALLED_PRODUCT=YES \
            ONLY_ACTIVE_ARCH=NO \
            archive
          # Export: Distribution cert (keychain) + ASC API ile profil oluştur
          xcodebuild -exportArchive \
            -archivePath App.xcarchive -exportOptionsPlist ExportOptions.plist \
            -exportPath ./ipa-out -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_ASC_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.APPLE_ASC_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APPLE_ASC_ISSUER_ID }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ matrix.app }}-ipa
          path: ${{ matrix.app }}/ios/App/ipa-out/*.ipa
          retention-days: 30

# ─── PUBLISH (manuel tetikleme, ilk kurulumdan sonra) ──────────────────────
  publish-android:
    needs: android
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [tarifler]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.app }}-aab
          path: aab/
      - name: Google Play — Internal Track
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.nickdegs.${{ matrix.app }}
          releaseFiles: aab/*.aab
          tracks: internal
          status: completed

  publish-ios:
    needs: ios
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        app: [tarifler]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.app }}-ipa
          path: ipa/
      - name: ASC API anahtarını kur
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.APPLE_ASC_API_KEY }}" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_ASC_KEY_ID }}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_ASC_KEY_ID }}.p8
      - name: TestFlight'a yükle
        continue-on-error: true
        run: |
          IPA=$(ls ipa/*.ipa 2>/dev/null | head -1)
          if [ -z "$IPA" ]; then echo "IPA bulunamadı, atlanıyor"; exit 0; fi
          echo "Yükleniyor: $IPA"
          xcrun altool --upload-app \
            --file "$IPA" \
            --type ios \
            --apiKey ${{ secrets.APPLE_ASC_KEY_ID }} \
            --apiIssuer ${{ secrets.APPLE_ASC_ISSUER_ID }} \
            --output-format json 2>&1 || \
          xcrun altool --upload-app \
            --file "$IPA" \
            --type ios \
            --apiKey ${{ secrets.APPLE_ASC_KEY_ID }} \
            --apiIssuer ${{ secrets.APPLE_ASC_ISSUER_ID }} 2>&1 || true
