name: Build Apps
on:
  push:
    branches: [main]
    # Sadece tarifler dosyaları değişince derle — başka oturumların push'larında
    # boşuna build + Apple günlük yükleme limiti tüketme (2026-06-21)
    paths: ['tarifler/**', '.github/workflows/build.yml']
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  android:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [tarifler]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Capacitor hazırla
        working-directory: ${{ matrix.app }}
        run: |
          npm install --legacy-peer-deps
          npx cap add android
          cp google-services.json android/app/google-services.json 2>/dev/null || true
          npx @capacitor/assets generate --android || true
          npx cap sync android
          # SDK 35 zorunlu (Google Play Agustos 2025+)
          find . -name "variables.gradle" | xargs sed -i 's/targetSdkVersion = 34/targetSdkVersion = 35/g' 2>/dev/null || true
          find . -name "variables.gradle" | xargs sed -i 's/compileSdkVersion = 34/compileSdkVersion = 35/g' 2>/dev/null || true
          # minSdkVersion 23+
          find . -name "variables.gradle" | xargs sed -i 's/minSdkVersion = 2[012]/minSdkVersion = 23/g' 2>/dev/null || true
          # Her build'de benzersiz versionCode
          find . -name "build.gradle" -path "*/app/build.gradle" | xargs sed -i "s/versionCode [0-9]*/versionCode ${{ github.run_number }}/g" 2>/dev/null || true
          # AdMob: AD_ID izni + App ID meta-data
          python3 - << 'PYEOF'
          import re
          manifest = 'android/app/src/main/AndroidManifest.xml'
          with open(manifest) as f: c = f.read()
          if 'AD_ID' not in c:
              c = c.replace('</manifest>', '    <uses-permission android:name="com.google.android.gms.permission.AD_ID"/>\n</manifest>')
          if 'APPLICATION_ID' not in c:
              admob = '        <meta-data android:name="com.google.android.gms.ads.APPLICATION_ID" android:value="ca-app-pub-3940256099942544~3347511713"/>'
              c = re.sub(r'(<application\b[^>]*>)', r'\1\n' + admob, c, count=1)
          with open(manifest, 'w') as f: f.write(c)
          print("AndroidManifest AdMob OK")
          PYEOF
      - name: İmzalı .aab üret
        working-directory: ${{ matrix.app }}/android
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > release.keystore
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$(pwd)/release.keystore \
            -Pandroid.injected.signing.store.password='${{ secrets.ANDROID_KEYSTORE_PASSWORD }}' \
            -Pandroid.injected.signing.key.alias='${{ secrets.ANDROID_KEY_ALIAS }}' \
            -Pandroid.injected.signing.key.password='${{ secrets.ANDROID_KEYSTORE_PASSWORD }}'
          rm -f release.keystore
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.app }}-aab
          path: ${{ matrix.app }}/android/app/build/outputs/bundle/release/*.aab
          retention-days: 30

  ios:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        app: [tarifler]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Xcode (en güncel)
        run: |
          BEST=""
          for VER in 26 27 25 16 17; do
            MATCH=$(ls /Applications/ | grep -E "^Xcode_${VER}" | sort -V | tail -1)
            if [ -n "$MATCH" ]; then BEST="$MATCH"; break; fi
          done
          if [ -z "$BEST" ]; then
            BEST=$(ls /Applications/ | grep -E "^Xcode_[0-9]" | sort -V | tail -1)
          fi
          sudo xcode-select -s "/Applications/$BEST/Contents/Developer"
          echo "Xcode: $BEST"
          xcodebuild -version
      - name: Sertifika + ASC API anahtarını kur
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.APPLE_ASC_API_KEY }}" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_ASC_KEY_ID }}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_ASC_KEY_ID }}.p8
          echo "${{ secrets.APPLE_DIST_P12_BASE64 }}" | base64 -d > /tmp/dist.p12
          security create-keychain -p "ci-keychain" ci-build.keychain-db
          security default-keychain -s ci-build.keychain-db
          security unlock-keychain -p "ci-keychain" ci-build.keychain-db
          security import /tmp/dist.p12 -k ci-build.keychain-db \
            -P "${{ secrets.APPLE_P12_PASSWORD }}" \
            -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "ci-keychain" ci-build.keychain-db
          security list-keychain -d user -s ci-build.keychain-db login.keychain-db
          rm /tmp/dist.p12
          security find-identity -v -p codesigning ci-build.keychain-db | head -5
      - name: Capacitor hazırla + Xcode ayarları
        working-directory: ${{ matrix.app }}
        run: |
          npm install --legacy-peer-deps
          npx cap add ios
          npx @capacitor/assets generate --ios || true
          # GoogleService-Info.plist kopyala
          mkdir -p ios/App/App
          cp ios-assets/GoogleService-Info.plist ios/App/App/GoogleService-Info.plist || true
          npx cap sync ios
          # Cihaz adı = App Store adı ("Tarif Abi") — Guideline 2.3.8 eşleşme (mismatch red'i fix)
          /usr/libexec/PlistBuddy -c "Set :CFBundleDisplayName Tarif Abi" ios/App/App/Info.plist 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleDisplayName string Tarif Abi" ios/App/App/Info.plist || true
          /usr/libexec/PlistBuddy -c "Set :CFBundleName Tarif Abi" ios/App/App/Info.plist 2>/dev/null || true
          # Sürüm 1.0.1 (mağaza güncellemesi) + benzersiz/artan build numarası (run_id)
          BUILD_NO=${{ github.run_id }}
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.0.1" ios/App/App/Info.plist 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleShortVersionString string 1.0.1" ios/App/App/Info.plist || true
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NO" ios/App/App/Info.plist 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string $BUILD_NO" ios/App/App/Info.plist || true
          PBX2=ios/App/App.xcodeproj/project.pbxproj
          sed -i '' -E "s/MARKETING_VERSION = [^;]+;/MARKETING_VERSION = 1.0.1;/g" "$PBX2" 2>/dev/null || true
          sed -i '' -E "s/CURRENT_PROJECT_VERSION = [^;]+;/CURRENT_PROJECT_VERSION = $BUILD_NO;/g" "$PBX2" 2>/dev/null || true
          # Şifreleme yok
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" ios/App/App/Info.plist 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" ios/App/App/Info.plist || true
          # AdMob App ID
          /usr/libexec/PlistBuddy -c "Add :GADApplicationIdentifier string ca-app-pub-3940256099942544~1458002511" ios/App/App/Info.plist 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :GADApplicationIdentifier ca-app-pub-3940256099942544~1458002511" ios/App/App/Info.plist
          # ATT — App Privacy'de tracking beyanı var; uygulama ATT prompt'unu gösterir (Guideline 2.1)
          ATT_MSG="Your data is used to deliver personalized ads. You can change this in Settings."
          /usr/libexec/PlistBuddy -c "Add :NSUserTrackingUsageDescription string $ATT_MSG" ios/App/App/Info.plist 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :NSUserTrackingUsageDescription $ATT_MSG" ios/App/App/Info.plist
          # Google Sign-In: GIDClientID (iOS client id) — YOKSA GoogleAuth.signIn() native CRASH
          GID="442086254689-rr7dl320im2cg0g43u44r74atfo11tbe.apps.googleusercontent.com"
          /usr/libexec/PlistBuddy -c "Add :GIDClientID string $GID" ios/App/App/Info.plist 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :GIDClientID $GID" ios/App/App/Info.plist
          # Google Sign-In REVERSED_CLIENT_ID URL scheme
          REVERSED="com.googleusercontent.apps.442086254689-rr7dl320im2cg0g43u44r74atfo11tbe"
          python3 - << PYEOF
          import subprocess, os
          plist = "ios/App/App/Info.plist"
          reversed_id = os.environ.get('REVERSED', 'com.googleusercontent.apps.442086254689-rr7dl320im2cg0g43u44r74atfo11tbe')
          with open(plist) as f: c = f.read()
          if reversed_id not in c:
              scheme_block = f"""
              <key>CFBundleURLTypes</key>
              <array>
                <dict>
                  <key>CFBundleURLSchemes</key>
                  <array><string>{reversed_id}</string></array>
                </dict>
              </array>"""
              c = c.replace('</dict>\n</plist>', scheme_block + '\n</dict>\n</plist>')
              with open(plist, 'w') as f: f.write(c)
              print("REVERSED_CLIENT_ID URL scheme eklendi")
          else:
              print("REVERSED_CLIENT_ID zaten mevcut")
          PYEOF
          # Deployment target
          PBX=ios/App/App.xcodeproj/project.pbxproj
          sed -i '' -E 's/IPHONEOS_DEPLOYMENT_TARGET = [0-9.]+;/IPHONEOS_DEPLOYMENT_TARGET = 16.4;/g' "$PBX" || true
          # Sadece iPhone (1) — iPad desteği kapalı, iPad kaynaklı red riski yok
          sed -i '' -E 's/TARGETED_DEVICE_FAMILY = "?[12,]+"?;/TARGETED_DEVICE_FAMILY = "1";/g' "$PBX" || true
          # Pods imza devre dışı
          python3 - << 'PYEOF'
          with open('ios/App/Podfile', 'r') as f:
              content = f.read()
          injection = "\n  installer.pods_project.targets.each do |target|\n    target.build_configurations.each do |config|\n      config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'\n      config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'\n    end\n  end"
          if 'post_install do |installer|' in content:
              content = content.replace('post_install do |installer|', 'post_install do |installer|' + injection, 1)
          else:
              content += "\npost_install do |installer|" + injection + "\nend\n"
          with open('ios/App/Podfile', 'w') as f:
              f.write(content)
          print("Podfile patched OK")
          PYEOF
      - name: iCloud KVS entitlement + Swift plugin
        working-directory: ${{ matrix.app }}
        run: |
          cp ios-assets/App.entitlements ios/App/App/App.entitlements
          cp ios-assets/ICloudKVPlugin.swift ios/App/App/ICloudKVPlugin.swift
          cp ios-assets/ICloudKVPlugin.m ios/App/App/ICloudKVPlugin.m
          python3 - << 'PYEOF'
          import hashlib, re, os
          def make_id(seed):
              return hashlib.sha1(seed.encode()).hexdigest()[:24].upper()
          pbx = "ios/App/App.xcodeproj/project.pbxproj"
          if not os.path.exists(pbx):
              print("pbxproj not found, skipping"); exit(0)
          with open(pbx) as f:
              content = f.read()
          new_files = [
              ("ICloudKVPlugin.swift", "sourcecode.swift"),
              ("ICloudKVPlugin.m",     "sourcecode.c.objc"),
          ]
          changed = False
          for fname, ftype in new_files:
              if fname in content:
                  print(f"  {fname}: already in project"); continue
              ref_id   = make_id("ref_" + fname)
              build_id = make_id("build_" + fname)
              changed  = True
              ref_line = (f'\t\t{ref_id} /* {fname} */ = '
                          f'{{isa = PBXFileReference; lastKnownFileType = {ftype}; '
                          f'path = {fname}; sourceTree = "<group>"; }};\n')
              content = content.replace('/* End PBXFileReference section */',
                  ref_line + '\t\t/* End PBXFileReference section */')
              build_line = (f'\t\t{build_id} /* {fname} in Sources */ = '
                            f'{{isa = PBXBuildFile; fileRef = {ref_id} /* {fname} */; }};\n')
              content = content.replace('/* End PBXBuildFile section */',
                  build_line + '\t\t/* End PBXBuildFile section */')
              content = re.sub(r'(/\* AppDelegate\.swift \*/,)',
                  rf'\1\n\t\t\t\t{ref_id} /* {fname} */,', content, count=1)
              content = re.sub(r'(/\* AppDelegate\.swift in Sources \*/,)',
                  rf'\1\n\t\t\t\t{build_id} /* {fname} in Sources */,', content, count=1)
              print(f"  Added {fname} to Xcode project")
          if "CODE_SIGN_ENTITLEMENTS" not in content:
              content = content.replace("DEVELOPMENT_TEAM = ",
                  'CODE_SIGN_ENTITLEMENTS = "App/App.entitlements";\n\t\t\t\tDEVELOPMENT_TEAM = ')
              changed = True
              print("  Added CODE_SIGN_ENTITLEMENTS")
          if changed:
              with open(pbx, "w") as f: f.write(content)
          print("iCloud KVS plugin OK")
          PYEOF
      - name: AdMob Consent stub (Xcode 26)
        working-directory: ${{ matrix.app }}
        run: |
          F="node_modules/@capacitor-community/admob/ios/Sources/AdMobPlugin/Consent/ConsentExecutor.swift"
          [ -f "$F" ] && printf 'import Foundation; import Capacitor; import GoogleMobileAds\nclass ConsentExecutor: NSObject {\n    weak var plugin: AdMobPlugin?\n    func requestConsentInfo(_ call: CAPPluginCall, _ a: Int, _ b: [String], _ c: Bool) { call.resolve(["status":"NOT_REQUIRED","isConsentFormAvailable":false]) }\n    func showConsentForm(_ call: CAPPluginCall) { call.resolve(["status":"NOT_REQUIRED"]) }\n    func resetConsentInfo(_ call: CAPPluginCall) { call.resolve() }\n}' > "$F" && echo "ConsentExecutor.swift patched" || echo "ConsentExecutor.swift not found"
      - name: Build + TestFlight'a yükle
        working-directory: ${{ matrix.app }}/ios/App
        run: |
          pod install
          cat > ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
              <key>method</key><string>app-store-connect</string>
              <key>destination</key><string>upload</string>
              <key>teamID</key><string>SZF4T3P583</string>
              <key>signingStyle</key><string>automatic</string>
              <key>uploadSymbols</key><true/>
              <key>stripSwiftSymbols</key><true/>
          </dict></plist>
          PLIST
          xcodebuild \
            -workspace App.xcworkspace -scheme App \
            -destination 'generic/platform=iOS' -configuration Release -archivePath App.xcarchive \
            DEVELOPMENT_TEAM=SZF4T3P583 \
            CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            ENABLE_BITCODE=NO \
            SWIFT_COMPILATION_MODE=wholemodule \
            GCC_OPTIMIZATION_LEVEL=s \
            DEPLOYMENT_POSTPROCESSING=YES \
            STRIP_INSTALLED_PRODUCT=YES \
            ONLY_ACTIVE_ARCH=NO \
            archive
          xcodebuild -exportArchive \
            -archivePath App.xcarchive \
            -exportOptionsPlist ExportOptions.plist \
            -exportPath ./ipa-out \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_ASC_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.APPLE_ASC_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APPLE_ASC_ISSUER_ID }}
          echo "TestFlight yükleme tamamlandı (destination: upload)"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ matrix.app }}-ipa
          path: ${{ matrix.app }}/ios/App/ipa-out/*.ipa
          retention-days: 30

  publish-android:
    needs: android
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [tarifler]
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.app }}-aab
          path: aab/
      - name: Google Play — Internal Track
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.nickdegs.${{ matrix.app }}
          releaseFiles: aab/*.aab
          tracks: internal
          status: completed
