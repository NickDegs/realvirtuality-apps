name: Build RealVirtuality AI
on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 3 * *'  # ayda 1 oto-rebuild (3. gün 07:00) → TestFlight süresi dolmasın

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Build RealVirtuality AI Android
        working-directory: realvirtuality-ai
        run: |
          npm install
          npx cap add android 2>/dev/null || true
          npx cap sync android
      - name: İmzalı .aab
        working-directory: realvirtuality-ai/android
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > release.keystore
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$(pwd)/release.keystore \
            -Pandroid.injected.signing.store.password='${{ secrets.ANDROID_KEYSTORE_PASSWORD }}' \
            -Pandroid.injected.signing.key.alias='${{ secrets.ANDROID_KEY_ALIAS }}' \
            -Pandroid.injected.signing.key.password='${{ secrets.ANDROID_KEYSTORE_PASSWORD }}'
          rm -f release.keystore
      - uses: actions/upload-artifact@v4
        with:
          name: realvirtuality-ai-aab
          path: realvirtuality-ai/android/app/build/outputs/bundle/release/*.aab
          retention-days: 30
