name: Build Tarifler
on:
  workflow_dispatch:
#  schedule:  (2026-07-01 kapatıldı — sürpriz TestFlight build önleme, elle re-enable)
#    - cron: '0 8 5 * *'  # ayda 1 oto-rebuild (5. gün 08:00) → TestFlight süresi dolmasın

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '17' }
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Build tarifler Android
        working-directory: tarifler
        run: |
          npm install
          npx cap add android 2>/dev/null || true
          cp google-services.json android/app/google-services.json 2>/dev/null || true
          npx cap sync android
          # Play Billing 9.0.0 minSdk 23 istiyor (app 22 idi) → manifest çakışmasını gider
          sed -i -E 's/minSdkVersion = 2[0-2]/minSdkVersion = 23/' android/variables.gradle
          grep minSdkVersion android/variables.gradle || true
      - name: İmzalı .aab
        working-directory: tarifler/android
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > release.keystore
          chmod +x gradlew
          ./gradlew bundleRelease --no-daemon \
            -Pandroid.injected.signing.store.file=$(pwd)/release.keystore \
            -Pandroid.injected.signing.store.password='${{ secrets.ANDROID_KEYSTORE_PASSWORD }}' \
            -Pandroid.injected.signing.key.alias='${{ secrets.ANDROID_KEY_ALIAS }}' \
            -Pandroid.injected.signing.key.password='${{ secrets.ANDROID_KEYSTORE_PASSWORD }}'
          rm -f release.keystore
      - uses: actions/upload-artifact@v4
        with:
          name: tarifler-aab-new
          path: tarifler/android/app/build/outputs/bundle/release/*.aab
          retention-days: 30
