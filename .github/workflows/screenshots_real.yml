name: Real Screenshots — Simulator + FLUX + ASC

on:
  workflow_dispatch:
    inputs:
      apps:
        description: 'Uygulamalar (all/rv/business/panel)'
        default: 'all'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─── macOS: Simulator'da gerçek ekran görüntüleri ─────────────────────────
  simulator-screenshots:
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - app: rv
            dir: RealVirtualityAI-iOS
            target: RealVirtualityAI
            test_target: RealVirtualityAIUITests
          - app: business
            dir: NickDegsKurumsal-iOS
            target: NickDegsBusiness
            test_target: NickDegsBusinessUITests
          - app: panel
            dir: NickDegsPanel-iOS
            target: NickDegsPanel
            test_target: NickDegsPanelUITests
    steps:
      - uses: actions/checkout@v4

      - name: Xcode + runtime bilgisi
        run: |
          # En yeni Xcode'u seç
          BEST=$(ls /Applications/ | grep -E "^Xcode_[0-9]" | sort -V | tail -1)
          [ -n "$BEST" ] && sudo xcode-select -s "/Applications/$BEST/Contents/Developer"
          xcodebuild -version
          # Mevcut iOS runtime'larını göster
          xcrun simctl list runtimes available 2>/dev/null || true

      - name: Deployment target'ı runtime'a göre düşür
        working-directory: ${{ matrix.dir }}
        run: |
          # Mevcut en yüksek iOS runtime'ı bul (örn. 18.5)
          IOS_VER=$(xcrun simctl list runtimes available --json 2>/dev/null | python3 -c "
          import json,sys
          try:
              d=json.load(sys.stdin)
              vers=[r['version'] for r in d.get('runtimes',[]) if 'iOS' in r.get('name','') and r.get('isAvailable')]
              vers.sort(key=lambda v:[int(x) for x in v.split('.')])
              print(vers[-1]) if vers else print('18.0')
          except: print('18.0')
          ")
          echo "IOS_RUNTIME=$IOS_VER" >> $GITHUB_ENV
          echo "Runner'daki en yüksek iOS: $IOS_VER"
          # project.yml'deki 26.0'ı gerçek runtime ile değiştir
          sed -i '' "s/deploymentTarget: \"26.0\"/deploymentTarget: \"$IOS_VER\"/g" project.yml
          sed -i '' "s/iOS: \"26.0\"/iOS: \"$IOS_VER\"/g" project.yml
          cat project.yml | grep -E "deploymentTarget|iOS:" | head -10

      - name: XcodeGen
        working-directory: ${{ matrix.dir }}
        run: |
          brew install xcodegen --quiet 2>/dev/null || true
          xcodegen generate

      - name: Simulator seç ve başlat
        run: |
          # Mevcut en büyük iPhone simülatörünü bul (Pro Max tercih)
          UDID=$(xcrun simctl list devices available --json | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          best=None; best_score=0
          for runtime,devs in d['devices'].items():
              if 'iOS' not in runtime: continue
              # Runtime versiyonunu çıkar
              try:
                  ver_str=runtime.split('iOS-')[1].replace('-','.') if 'iOS-' in runtime else '0'
                  ver=tuple(int(x) for x in ver_str.split('.')[:2])
              except: ver=(0,0)
              for dev in devs:
                  if not dev.get('isAvailable'): continue
                  name=dev.get('name','')
                  if 'iPhone' not in name: continue
                  score=ver[0]*100+ver[1]
                  if 'Pro Max' in name: score+=10
                  elif 'Pro' in name: score+=5
                  if score>best_score: best_score=score; best=dev['udid']
          print(best or '')
          ")
          if [ -z "$UDID" ]; then echo "❌ Simulator bulunamadı"; exit 1; fi
          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV
          # Cihaz adını da kaydet
          NAME=$(xcrun simctl list devices --json | python3 -c "
          import json,sys
          d=json.load(sys.stdin)
          for _,devs in d['devices'].items():
              for dev in devs:
                  if dev.get('udid')=='$UDID': print(dev.get('name','')); exit()
          ")
          echo "SIMULATOR_NAME=$NAME" >> $GITHUB_ENV
          echo "Seçilen: $NAME ($UDID)"
          xcrun simctl boot "$UDID" 2>/dev/null || true
          xcrun simctl bootstatus "$UDID" -b

      - name: Build (Simulator)
        working-directory: ${{ matrix.dir }}
        run: |
          set -o pipefail
          xcodebuild build \
            -scheme "${{ matrix.target }}" \
            -destination "id=${{ env.SIMULATOR_UDID }}" \
            -derivedDataPath /tmp/DerivedData/${{ matrix.app }} \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO \
            IPHONEOS_DEPLOYMENT_TARGET="${{ env.IOS_RUNTIME }}" \
            2>&1 | xcpretty --simple 2>/dev/null || \
          xcodebuild build \
            -scheme "${{ matrix.target }}" \
            -destination "id=${{ env.SIMULATOR_UDID }}" \
            -derivedDataPath /tmp/DerivedData/${{ matrix.app }} \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO \
            IPHONEOS_DEPLOYMENT_TARGET="${{ env.IOS_RUNTIME }}" \
            2>&1 | tail -20

      - name: UITest çalıştır ve screenshots al
        working-directory: ${{ matrix.dir }}
        run: |
          OUT=/tmp/ss_raw/${{ matrix.app }}
          RESULT=/tmp/ss_results/${{ matrix.app }}
          mkdir -p "$OUT" "$RESULT"

          set +e
          xcodebuild test \
            -scheme "${{ matrix.target }}" \
            -destination "id=${{ env.SIMULATOR_UDID }}" \
            -derivedDataPath /tmp/DerivedData/${{ matrix.app }} \
            -only-testing:"${{ matrix.test_target }}/ScreenshotTests/testAppScreenshots" \
            -resultBundlePath "$RESULT/test.xcresult" \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO \
            IPHONEOS_DEPLOYMENT_TARGET="${{ env.IOS_RUNTIME }}" \
            2>&1 | tail -30
          TEST_EXIT=$?
          set -e

          echo "Test exit: $TEST_EXIT"

          # xcresult'tan attachment'ları çıkar (yeni sözdizimi: get object)
          if [ -d "$RESULT/test.xcresult" ]; then
            python3 - "$RESULT/test.xcresult" "$OUT" << 'PYEOF'
          import subprocess, json, sys, os

          xcresult, outdir = sys.argv[1], sys.argv[2]

          # Yeni xcresulttool sözdizimi: get object
          try:
              raw = subprocess.check_output(
                  ["xcrun", "xcresulttool", "get", "object",
                   "--path", xcresult, "--format", "json"],
                  timeout=60, stderr=subprocess.DEVNULL
              )
          except subprocess.CalledProcessError:
              # Eski sözdizimini dene
              try:
                  raw = subprocess.check_output(
                      ["xcrun", "xcresulttool", "get",
                       "--path", xcresult, "--format", "json"],
                      timeout=60, stderr=subprocess.DEVNULL
                  )
              except Exception as e:
                  print(f"xcresulttool hata: {e}"); sys.exit(0)

          try:
              data = json.loads(raw)
          except Exception as e:
              print(f"JSON parse hata: {e}"); sys.exit(0)

          attachments = []
          def find_att(obj, depth=0):
              if depth > 15: return
              if isinstance(obj, dict):
                  t = obj.get("_type", {}).get("_name", "")
                  if t == "ActionTestAttachment":
                      name = obj.get("name", {})
                      name = name.get("_value", "screen") if isinstance(name, dict) else str(name)
                      ref = obj.get("payloadRef", {})
                      if isinstance(ref, dict):
                          ident = ref.get("id", {})
                          ident = ident.get("_value", "") if isinstance(ident, dict) else str(ident)
                      else:
                          ident = ""
                      if ident:
                          attachments.append((name, ident))
                  for v in obj.values():
                      find_att(v, depth+1)
              elif isinstance(obj, list):
                  for v in obj:
                      find_att(v, depth+1)

          find_att(data)
          print(f"Bulunan attachment sayısı: {len(attachments)}")

          for name, ident in attachments:
              try:
                  img_data = subprocess.check_output(
                      ["xcrun", "xcresulttool", "get", "attachment",
                       "--path", xcresult, "--id", ident],
                      timeout=30, stderr=subprocess.DEVNULL
                  )
              except subprocess.CalledProcessError:
                  try:
                      img_data = subprocess.check_output(
                          ["xcrun", "xcresulttool", "get",
                           "--path", xcresult, "--id", ident],
                          timeout=30, stderr=subprocess.DEVNULL
                      )
                  except Exception as e:
                      print(f"  ⚠ {name}: {e}"); continue
              fname = f"{name}.png" if not name.endswith(".png") else name
              with open(os.path.join(outdir, fname), "wb") as f:
                  f.write(img_data)
              print(f"  ✅ {fname} ({len(img_data):,} bytes)")
          PYEOF
          fi

          # Fallback: test başarısızsa simülatörden direkt screenshot al
          if [ -z "$(ls -A $OUT 2>/dev/null)" ]; then
            echo "⚠ xcresult boş, simctl screenshot fallback deniyor..."
            # App install + launch
            APP_PATH=$(find /tmp/DerivedData/${{ matrix.app }} -name "*.app" -not -path "*Tests*" | head -1)
            if [ -n "$APP_PATH" ]; then
              xcrun simctl install "${{ env.SIMULATOR_UDID }}" "$APP_PATH" 2>/dev/null || true
              BUNDLE_ID=$(defaults read "$APP_PATH/Info" CFBundleIdentifier 2>/dev/null || echo "")
              if [ -n "$BUNDLE_ID" ]; then
                xcrun simctl launch "${{ env.SIMULATOR_UDID }}" "$BUNDLE_ID" 2>/dev/null || true
                sleep 5
                xcrun simctl io "${{ env.SIMULATOR_UDID }}" screenshot "$OUT/01_ana_ekran.png"
                sleep 2
                xcrun simctl io "${{ env.SIMULATOR_UDID }}" screenshot "$OUT/02_scroll.png"
                sleep 2
                xcrun simctl io "${{ env.SIMULATOR_UDID }}" screenshot "$OUT/03_detay.png"
                echo "simctl screenshot: $(ls $OUT/*.png 2>/dev/null | wc -l) dosya"
              fi
            fi
          fi

          echo "Final screenshot sayısı: $(ls -A $OUT 2>/dev/null | wc -l)"
          ls -la "$OUT/" 2>/dev/null || echo "Dizin boş"

      - name: Artifact yükle
        uses: actions/upload-artifact@v4
        with:
          name: raw-screenshots-${{ matrix.app }}
          path: /tmp/ss_raw/${{ matrix.app }}/
          if-no-files-found: warn
          retention-days: 1

  # ─── Ubuntu: FLUX ile cilala + ASC'ye yükle ───────────────────────────────
  flux-composite-upload:
    needs: simulator-screenshots
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python bağımlılıkları
        run: pip install Pillow requests cryptography

      - name: Tüm screenshot artifact'larını indir
        uses: actions/download-artifact@v4
        with:
          pattern: raw-screenshots-*
          path: /tmp/raw_ss/
          merge-multiple: false

      - name: Screenshot'ları listele
        run: find /tmp/raw_ss -name "*.png" 2>/dev/null | sort || echo "Hiç PNG yok"

      - name: FLUX backgrounds üret + composite
        env:
          HUGGINGFACE_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
          APPS_FILTER: ${{ github.event.inputs.apps }}
        run: |
          mkdir -p /tmp/final_ss
          python3 - << 'PYEOF'
          import os, time, requests, json
          from pathlib import Path
          from PIL import Image, ImageDraw, ImageFont, ImageFilter

          HF_TOKEN = os.environ.get("HUGGINGFACE_TOKEN", "")
          APPS_FILTER = os.environ.get("APPS_FILTER","all") or "all"
          RAW_DIR  = Path("/tmp/raw_ss")
          OUT_DIR  = Path("/tmp/final_ss")
          OUT_DIR.mkdir(exist_ok=True)

          SIZES = {"6.7": (1290, 2796), "6.5": (1242, 2688)}

          APPS = {
              "rv": {
                  "name": "RealVirtuality AI",
                  "accent": (124, 92, 255),
                  "accent2": (34, 211, 238),
                  "bg": (10, 11, 20),
                  "flux_prompt": "dark cosmic space background with purple violet nebula glow, cyan light particles, premium gradient, no text, abstract, ultra detailed",
                  "captions": {
                      "01_ana_ekran":    {"tr": "Yapay Zeka ile Yaratın",        "en": "Create with AI"},
                      "02_kategoriler":  {"tr": "Her Araç Elinizin Altında",     "en": "Every AI Tool At Hand"},
                      "03_arac_detay":   {"tr": "Güçlü AI Araçları",             "en": "Powerful AI Tools"},
                      "04_kredi_iap":    {"tr": "Kredi Satın Alın",              "en": "Get Credits"},
                      "05_ayarlar":      {"tr": "Kişiselleştirin",               "en": "Personalize"},
                      "06_ana_tam":      {"tr": "Tam Deneyim",                   "en": "Full Experience"},
                  }
              },
              "business": {
                  "name": "NickDegs Business",
                  "accent": (74, 134, 255),
                  "accent2": (255, 180, 60),
                  "bg": (8, 12, 22),
                  "flux_prompt": "dark navy blue professional background, golden amber gradient accents, premium bokeh, no text, abstract luxury",
                  "captions": {
                      "01_hosgeldiniz":  {"tr": "Profesyonel Yönetim",      "en": "Professional Management"},
                      "02_genel_gorunum":{"tr": "Her Şey Tek Yerden",       "en": "Everything in One Place"},
                      "03_hesabim":      {"tr": "Abonelik Yönetimi",        "en": "Manage Your Plan"},
                      "04_kesfet":       {"tr": "Keşfedin",                 "en": "Explore"},
                      "05_ozellikler":   {"tr": "Güçlü Özellikler",         "en": "Powerful Features"},
                      "06_ana_sayfa":    {"tr": "Kolayca Başlayın",         "en": "Get Started Easily"},
                  }
              },
              "panel": {
                  "name": "NickDegs Dashboard",
                  "accent": (41, 121, 216),
                  "accent2": (100, 200, 255),
                  "bg": (7, 10, 20),
                  "flux_prompt": "dark blue server data center background, glowing network nodes, premium digital infrastructure, no text, abstract professional",
                  "captions": {
                      "01_login":          {"tr": "Güvenli Giriş",                "en": "Secure Login"},
                      "02_login_form":     {"tr": "Hızlı Erişim",                 "en": "Quick Access"},
                      "03_advanced_login": {"tr": "Gelişmiş Yönetim",             "en": "Advanced Management"},
                      "04_state":          {"tr": "Anlık Durum",                  "en": "Live Status"},
                      "05_hub_or_error":   {"tr": "Tam Kontrol",                  "en": "Full Control"},
                  }
              }
          }

          def load_font(size, bold=True):
              for p in ["/usr/share/fonts/truetype/noto/NotoSans-Bold.ttf",
                        "/usr/share/fonts/truetype/noto/NotoSans-Regular.ttf",
                        "/usr/share/fonts/truetype/dejavu/DejaVuSans-Bold.ttf",
                        "/usr/share/fonts/truetype/liberation/LiberationSans-Bold.ttf"]:
                  if os.path.exists(p):
                      try: return ImageFont.truetype(p, size)
                      except: pass
              return ImageFont.load_default(size=size)

          def flux_bg(prompt, w, h, token):
              if not token: return None
              url = "https://api-inference.huggingface.co/models/black-forest-labs/FLUX.1-schnell"
              try:
                  r = requests.post(url,
                      headers={"Authorization": f"Bearer {token}"},
                      json={"inputs": prompt, "parameters": {"width": min(w,1024), "height": min(h,1024), "num_inference_steps": 4}},
                      timeout=120)
                  if r.status_code == 200:
                      import io
                      return Image.open(io.BytesIO(r.content)).convert("RGB")
                  print(f"  FLUX {r.status_code}: {r.text[:80]}")
              except Exception as e:
                  print(f"  FLUX hata: {e}")
              return None

          def gradient_bg(w, h, c1, accent):
              img = Image.new("RGB", (w, h))
              draw = ImageDraw.Draw(img)
              c2 = tuple(min(255, int(c*0.4)) for c in accent)
              for y in range(h):
                  t = y/h
                  col = tuple(int(c1[i]+(c2[i]-c1[i])*t) for i in range(3))
                  draw.line([(0,y),(w,y)], fill=col)
              return img

          def composite(bg_base, shot_path, w, h, cfg, cap_tr, cap_en, lang):
              bg = bg_base.resize((w, h), Image.LANCZOS).filter(ImageFilter.GaussianBlur(3))
              # Karart
              dark = Image.new("RGB", (w, h), cfg["bg"])
              bg = Image.blend(bg, dark, 0.45)
              draw = ImageDraw.Draw(bg)
              accent = cfg["accent"]

              # Üst başlık
              cap = cap_tr if lang == "tr" else cap_en
              fnt = load_font(int(w * 0.057))
              bb = fnt.getbbox(cap)
              draw.text(((w-(bb[2]-bb[0]))//2, int(h*0.032)), cap, font=fnt, fill=(255,255,255))

              # Alt app adı
              sfnt = load_font(int(w * 0.031), False)
              nm = cfg["name"]
              bb2 = sfnt.getbbox(nm)
              draw.text(((w-(bb2[2]-bb2[0]))//2, int(h*0.918)), nm, font=sfnt, fill=(160,170,200))

              # Telefon çerçevesi
              pw = int(w * 0.84); ph = int(h * 0.635)
              px = (w-pw)//2;    py = int(h * 0.192)
              pr = int(pw * 0.083)

              # Glow
              for gi in range(35,0,-7):
                  alpha = int((35-gi)/35 * 22)
                  draw.rounded_rectangle([px-gi,py-gi,px+pw+gi,py+ph+gi],
                      radius=pr+gi, outline=(*accent, 0), fill=(*accent, alpha), width=0)

              # Frame + ekran
              draw.rounded_rectangle([px,py,px+pw,py+ph], radius=pr, fill=(17,21,35), outline=(48,62,95), width=int(5*w/1320))
              m = int(pw*0.034)
              sx,sy,sw,sh = px+m, py+m, pw-2*m, ph-2*m
              sr = max(pr-m,10)
              draw.rounded_rectangle([sx,sy,sx+sw,sy+sh], radius=sr, fill=(8,10,20))

              # Gerçek screenshot
              try:
                  shot = Image.open(shot_path).convert("RGB")
                  ratio = min(sw/shot.width, sh/shot.height)
                  nw,nh = int(shot.width*ratio), int(shot.height*ratio)
                  shot = shot.resize((nw,nh), Image.LANCZOS)
                  mask = Image.new("L",(nw,nh),0)
                  ImageDraw.Draw(mask).rounded_rectangle([0,0,nw,nh],radius=sr,fill=255)
                  bg.paste(shot, (sx+(sw-nw)//2, sy+(sh-nh)//2), mask)
              except Exception as e:
                  print(f"    shot err: {e}")

              # Dynamic island + home bar
              diw=int(sw*0.26); dih=int(22*w/1320)
              draw.rounded_rectangle([sx+(sw-diw)//2,sy+int(10*w/1320),sx+(sw-diw)//2+diw,sy+int(10*w/1320)+dih],
                  radius=dih//2, fill=(6,8,16))
              hiw=int(sw*0.33)
              draw.rounded_rectangle([sx+(sw-hiw)//2,sy+sh-14,sx+(sw-hiw)//2+hiw,sy+sh-10], radius=2, fill=(75,85,105))

              return bg

          flux_cache = {}

          for app_key, cfg in APPS.items():
              if APPS_FILTER not in ("all", app_key):
                  print(f"⏭ {app_key} (filtre: {APPS_FILTER}) — atlandı"); continue
              raw_dir = None
              for candidate in [RAW_DIR/f"raw-screenshots-{app_key}", RAW_DIR/app_key]:
                  if candidate.exists():
                      raw_dir = candidate; break
              if not raw_dir:
                  print(f"⏭ {app_key} raw dir yok")
                  continue

              pngs = sorted(raw_dir.glob("*.png"))
              if not pngs:
                  print(f"⏭ {app_key} PNG yok")
                  continue

              print(f"\n📱 {cfg['name']} — {len(pngs)} screenshot")

              for size_label, (tw,th) in SIZES.items():
                  ck = f"{app_key}_{size_label}"
                  if ck not in flux_cache:
                      print(f"  🎨 FLUX {size_label}...", end=" ", flush=True)
                      result = flux_bg(cfg["flux_prompt"], tw, th, HF_TOKEN)
                      if result:
                          flux_cache[ck] = result
                          print("✅")
                      else:
                          flux_cache[ck] = gradient_bg(tw, th, cfg["bg"], cfg["accent"])
                          print("gradient fallback")

                  bg_base = flux_cache[ck]
                  for lang in ["tr", "en"]:
                      lang_asc = "tr-TR" if lang=="tr" else "en-US"
                      out_dir = OUT_DIR/app_key/lang_asc/size_label
                      out_dir.mkdir(parents=True, exist_ok=True)
                      for shot in pngs:
                          stem = shot.stem
                          cap = cfg["captions"].get(stem, {"tr":stem,"en":stem})
                          print(f"  ⚙ {lang_asc}/{size_label}/{stem}", end="... ", flush=True)
                          try:
                              r = composite(bg_base.copy(), shot, tw, th, cfg, cap["tr"], cap["en"], lang)
                              r.save(str(out_dir/f"{stem}.png"), "PNG")
                              print("✅")
                          except Exception as e:
                              print(f"❌ {e}")

          import subprocess
          result = subprocess.run(["find", str(OUT_DIR), "-name","*.png"], capture_output=True, text=True)
          count = len(result.stdout.strip().split('\n')) if result.stdout.strip() else 0
          print(f"\n📁 Toplam {count} final screenshot üretildi")
          PYEOF

      - name: Final screenshot artifact
        uses: actions/upload-artifact@v4
        with:
          name: final-screenshots
          path: /tmp/final_ss/
          if-no-files-found: warn
          retention-days: 7

      - name: ASC'ye yükle
        env:
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8_BASE64 }}
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          SS_DIR: /tmp/final_ss
        run: |
          # Base64 ise decode et
          if echo "$ASC_KEY_P8" | grep -qE "^[A-Za-z0-9+/=]{100}"; then
            export ASC_KEY_P8=$(echo "$ASC_KEY_P8" | base64 -d)
          fi
          python3 scripts/upload_screenshots.py || true

      - name: ASC yedek key
        if: failure()
        env:
          ASC_KEY_P8: ${{ secrets.APPLE_ASC_API_KEY }}
          ASC_KEY_ID: ${{ secrets.APPLE_ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APPLE_ASC_ISSUER_ID }}
          SS_DIR: /tmp/final_ss
        run: |
          if echo "$ASC_KEY_P8" | grep -qE "^[A-Za-z0-9+/=]{100}"; then
            export ASC_KEY_P8=$(echo "$ASC_KEY_P8" | base64 -d)
          fi
          python3 scripts/upload_screenshots.py
