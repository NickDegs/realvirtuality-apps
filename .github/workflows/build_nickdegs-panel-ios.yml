name: Build NickDegs Panel (iOS Native)
on:
  push:
    branches: [main]
    paths: ["NickDegsPanel-iOS/**", ".github/workflows/build_nickdegs-panel-ios.yml"]
  workflow_dispatch:
    inputs:
      media_internal:
        description: "IPTV/Medya modülünü AÇ — SADECE TestFlight internal (App Store'a GÖNDERİLMEZ, ban önleme)"
        type: boolean
        default: false
      submit_review:
        description: "App Store incelemeye gönder? (yalnızca 'true' yazınca gönderir)"
        default: "false"
#  schedule:  (2026-07-01 kapatıldı — sürpriz TestFlight build önleme, elle re-enable)
#    - cron: '0 6 1 * *'  # ayda 1 oto-rebuild → TestFlight süresi dolmasın
jobs:
  ios-native:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Xcode seç
        run: |
          BEST=$(ls /Applications/ | grep -E "^Xcode_[0-9]" | sort -V | tail -1)
          sudo xcode-select -s "/Applications/$BEST/Contents/Developer"; xcodebuild -version
      - name: XcodeGen + benzersiz build no
        working-directory: NickDegsPanel-iOS
        run: |
          brew install xcodegen && xcodegen generate
          BN=$(date +%s)
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BN" NickDegsPanel/Info.plist 2>/dev/null \
            || /usr/libexec/PlistBuddy -c "Add :CFBundleVersion string $BN" NickDegsPanel/Info.plist
          echo "CFBundleVersion (literal) → $BN"
      - name: Sertifika + ASC anahtarı
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "${{ secrets.APPLE_ASC_API_KEY }}" > ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_ASC_KEY_ID }}.p8
          chmod 600 ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_ASC_KEY_ID }}.p8
          echo "${{ secrets.APPLE_DIST_P12_BASE64 }}" | base64 -d > /tmp/dist.p12
          security create-keychain -p "ci-keychain" ci-build.keychain-db
          security default-keychain -s ci-build.keychain-db
          security unlock-keychain -p "ci-keychain" ci-build.keychain-db
          security import /tmp/dist.p12 -k ci-build.keychain-db -P "${{ secrets.APPLE_P12_PASSWORD }}" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "ci-keychain" ci-build.keychain-db
          security list-keychain -d user -s ci-build.keychain-db login.keychain-db
          rm /tmp/dist.p12
      - name: Arşivle + TestFlight
        working-directory: NickDegsPanel-iOS
        run: |
          cat > ExportOptions.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>app-store</string>
            <key>destination</key><string>upload</string>
            <key>teamID</key><string>SZF4T3P583</string>
            <key>signingStyle</key><string>automatic</string>
            <key>uploadSymbols</key><true/>
          </dict></plist>
          PLIST
          MEDIA_FLAG=""
          if [ "${{ github.event.inputs.media_internal }}" = "true" ]; then
            MEDIA_FLAG='SWIFT_ACTIVE_COMPILATION_CONDITIONS=IPTV_MODULE'
            echo "⚠️ IPTV_MODULE AÇIK — bu build SADECE TestFlight internal; App Store gönderimi ATLANACAK."
          fi
          xcodebuild -project NickDegsPanel.xcodeproj -scheme NickDegsPanel \
            -destination 'generic/platform=iOS' -configuration Release -archivePath ND.xcarchive \
            DEVELOPMENT_TEAM=SZF4T3P583 CURRENT_PROJECT_VERSION=$(date +%s) \
            TARGETED_DEVICE_FAMILY=1 CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" ONLY_ACTIVE_ARCH=NO $MEDIA_FLAG archive
          xcodebuild -exportArchive -archivePath ND.xcarchive -exportOptionsPlist ExportOptions.plist -exportPath ./ipa-out \
            -allowProvisioningUpdates \
            -authenticationKeyPath ~/.appstoreconnect/private_keys/AuthKey_${{ secrets.APPLE_ASC_KEY_ID }}.p8 \
            -authenticationKeyID ${{ secrets.APPLE_ASC_KEY_ID }} \
            -authenticationKeyIssuerID ${{ secrets.APPLE_ASC_ISSUER_ID }}
      - name: Build'i beta gruplarına ata (TestFlight'ta görünsün)
        if: success() && github.event.inputs.media_internal != 'true'
        env:
          ASC_KEY_PATH: ${{ github.workspace }}/.asc_key.p8
          ASC_KEY_ID: ${{ secrets.APPLE_ASC_KEY_ID }}
          ASC_ISSUER: ${{ secrets.APPLE_ASC_ISSUER_ID }}
          ASC_APP_ID: "6782606941"
        run: |
          echo "${{ secrets.APPLE_ASC_API_KEY }}" > "$ASC_KEY_PATH"
          python3 scripts/assign_beta.py
          rm -f "$ASC_KEY_PATH"
      - name: App Store incelemeye gönder
        if: success() && github.event_name == 'workflow_dispatch' && github.event.inputs.submit_review == 'true' && github.event.inputs.media_internal != 'true'
        env:
          ASC_KEY_PATH: ${{ github.workspace }}/.asc_key.p8
          ASC_KEY_ID: ${{ secrets.APPLE_ASC_KEY_ID }}
          ASC_ISSUER: ${{ secrets.APPLE_ASC_ISSUER_ID }}
          ASC_APP_ID: "6782606941"
          WHATS_NEW: "New: Dashboard now shows only panels relevant to your business type. Restaurant owners see orders and menus; salons see appointments; law firms see case management."
          REVIEW_NOTES: |
            This is the NickDegs Dashboard app — a native management panel for business owners who subscribe via the NickDegs Business app (nickdegs.com).

            The app does NOT have In-App Purchase. Access is via phone number SMS login (account created automatically after purchase in the NickDegs Business app).

            What's new in this build:
            - Sector-based navigation: each business type sees only the panels relevant to their sector (restaurant: orders/menu/QR; salon/clinic: appointments/customers; law firm: cases/documents/deadlines; etc.)
            - Admin account sees all panels including system management — regular business users see only their sector
            - New native screens for law firm sector: case tracking, document vault, deadline management

            To test the app:
            1. Launch the app. Enter phone number +905346065072 and tap "SMS Kodu Gönder".
            2. Enter the received SMS code and tap "Doğrula & Giriş".
            3. The dashboard loads with panels appropriate for the test account's business type.

            The backend is live at nickdegs.com. All data is fetched via authenticated JSON APIs — no WebView or Safari is used anywhere in the app.
        run: |
          echo "${{ secrets.APPLE_ASC_API_KEY }}" > "$ASC_KEY_PATH"
          python3 scripts/submit_to_review.py
          rm -f "$ASC_KEY_PATH"
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nickdegs-panel-ipa
          path: NickDegsPanel-iOS/ipa-out/*.ipa
