<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Yemek Tarifleri</title>
<style>
:root{
  --bg:#0d0906;--bg1:#161009;--bg2:#1e1510;--bg3:#271c14;
  --acc:#e8681a;--text:#f5e6d3;--sub:#9a7a5c;--dim:#3d2a1c;
  --r:14px;--r2:20px;
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden}
#app{height:100%;display:flex;flex-direction:column;overflow:hidden}

/* NAV */
#nav{display:flex;align-items:center;gap:10px;padding:0 16px;
  padding-top:calc(var(--st) + 10px);padding-bottom:10px;
  background:var(--bg);border-bottom:1px solid var(--bg3);flex-shrink:0}
#nav-back{font-size:22px;color:var(--sub);cursor:pointer;display:none}
#nav-title{flex:1;font-size:18px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.nav-btn{background:none;border:none;color:var(--sub);font-size:22px;cursor:pointer;padding:4px;line-height:1}

/* SEARCH */
#search-wrap{padding:10px 16px;background:var(--bg);flex-shrink:0;display:none}
#search-row{display:flex;gap:8px;align-items:center}
#search-input{flex:1;background:var(--bg2);border:1px solid var(--bg3);border-radius:10px;
  color:var(--text);font-size:15px;padding:10px 14px;outline:none;-webkit-appearance:none}
#search-input::placeholder{color:var(--sub)}
#mode-btn{background:var(--bg2);border:1px solid var(--bg3);border-radius:10px;
  color:var(--acc);font-size:13px;padding:10px 12px;cursor:pointer;white-space:nowrap;flex-shrink:0}

/* CHIPS */
#chips-wrap{display:none;gap:8px;overflow-x:auto;padding:8px 0 8px 16px;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;background:var(--bg1);flex-shrink:0}
#chips-wrap::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;background:var(--bg2);border:1px solid var(--bg3);border-radius:20px;
  padding:6px 14px;font-size:13px;color:var(--sub);cursor:pointer;white-space:nowrap}
.chip.active{background:var(--acc);border-color:var(--acc);color:#fff}
.chip:last-child{margin-right:16px}

/* CONTENT */
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* HOME */
.hero{margin:16px;background:linear-gradient(135deg,var(--bg2),var(--bg3));border-radius:var(--r2);padding:20px}
.hero-title{font-size:22px;font-weight:700;line-height:1.3;margin-bottom:4px}
.hero-sub{font-size:13px;color:var(--sub);margin-bottom:14px}
.hero-search{display:flex;gap:8px}
.hero-input{flex:1;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);
  border-radius:10px;color:var(--text);font-size:14px;padding:10px 14px;outline:none;-webkit-appearance:none}
.hero-input::placeholder{color:var(--sub)}
.hero-btn{background:var(--acc);border:none;border-radius:10px;color:#fff;
  padding:10px 16px;font-size:14px;font-weight:600;cursor:pointer;white-space:nowrap}

.section{padding:16px}
.sec-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.sec-title{font-size:16px;font-weight:700}
.sec-link{font-size:13px;color:var(--acc);cursor:pointer}

.cat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.cat-card{background:var(--bg2);border-radius:var(--r);overflow:hidden;cursor:pointer;
  position:relative;aspect-ratio:16/9;transition:transform .15s}
.cat-card:active{transform:scale(.96)}
.cat-card img{width:100%;height:100%;object-fit:cover;opacity:.75}
.cat-card-icon{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:42px}
.cat-label{position:absolute;bottom:0;left:0;right:0;padding:8px 10px;
  background:linear-gradient(to top,rgba(13,9,6,.9),transparent);font-size:14px;font-weight:600}

/* CUISINE GRID */
.cuis-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:0 16px 4px}
.cuis-card{background:var(--bg2);border-radius:var(--r);padding:14px 8px;
  display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;
  transition:transform .15s;border:1px solid var(--bg3)}
.cuis-card:active{transform:scale(.94)}
.cuis-flag{font-size:28px;line-height:1}
.cuis-name{font-size:12px;font-weight:600;text-align:center;line-height:1.3;color:var(--text)}

.hscroll{display:flex;gap:10px;overflow-x:auto;padding:0 16px 4px;
  -webkit-overflow-scrolling:touch;scrollbar-width:none}
.hscroll::-webkit-scrollbar{display:none}
.feat{flex-shrink:0;width:150px;background:var(--bg2);border-radius:var(--r);
  overflow:hidden;cursor:pointer;transition:transform .15s}
.feat:active{transform:scale(.96)}
.feat img{width:100%;height:95px;object-fit:cover}
.feat-name{padding:8px;font-size:12px;font-weight:600;line-height:1.3;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* CUISINE CHIPS (horizontal scroll) */
.cuis-hscroll{display:flex;gap:8px;overflow-x:auto;padding:0 16px 4px;
  -webkit-overflow-scrolling:touch;scrollbar-width:none}
.cuis-hscroll::-webkit-scrollbar{display:none}
.cuis-chip{flex-shrink:0;background:var(--bg2);border:1px solid var(--bg3);border-radius:20px;
  padding:8px 14px;font-size:13px;color:var(--text);cursor:pointer;white-space:nowrap;
  display:flex;align-items:center;gap:6px}
.cuis-chip:active{background:var(--bg3)}

/* RECIPE GRID */
.rgrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:12px 16px 20px}
.rcard{background:var(--bg2);border-radius:var(--r);overflow:hidden;cursor:pointer;transition:transform .15s}
.rcard:active{transform:scale(.96)}
.rcard img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block}
.rcard-body{padding:10px}
.rcard-name{font-size:13px;font-weight:600;line-height:1.3;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rcard-meta{font-size:11px;color:var(--sub);margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* DETAIL */
#detail{position:fixed;inset:0;background:var(--bg);z-index:100;
  transform:translateX(100%);transition:transform .28s ease;
  overflow-y:auto;-webkit-overflow-scrolling:touch}
#detail.open{transform:none}
#dhead{position:sticky;top:0;z-index:10;background:var(--bg);
  display:flex;align-items:center;gap:12px;padding:16px;
  padding-top:calc(var(--st) + 16px);border-bottom:1px solid var(--bg2)}
#dtitle{flex:1;font-size:16px;font-weight:700;
  display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
#dfav{background:none;border:none;font-size:24px;cursor:pointer;padding:4px}
#dimg{width:100%;aspect-ratio:16/9;object-fit:cover;display:block}
#dbody{padding:16px}
.dmeta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.dmeta-tag{background:var(--bg2);border-radius:8px;padding:4px 10px;font-size:12px;color:var(--sub)}
.dsec{font-size:15px;font-weight:700;margin-bottom:10px;color:var(--acc)}
.ing-list{list-style:none;display:flex;flex-direction:column;gap:8px;margin-bottom:24px}
.ing-item{display:flex;align-items:center;gap:10px;background:var(--bg2);
  border-radius:10px;padding:10px 12px;cursor:pointer}
.ing-item input[type=checkbox]{accent-color:var(--acc);width:16px;height:16px;flex-shrink:0}
.ing-name{font-size:14px;flex:1}
.ing-meas{font-size:12px;color:var(--sub);flex-shrink:0}
.instr{font-size:14px;line-height:1.75;color:var(--text);white-space:pre-line}
.yt-btn{display:flex;align-items:center;justify-content:center;gap:8px;
  background:var(--acc);color:#fff;border:none;border-radius:12px;
  padding:14px;font-size:15px;font-weight:600;cursor:pointer;width:100%;margin-top:20px}

/* BOTTOM NAV */
#bnav{display:flex;padding-bottom:calc(var(--sb) + 4px);
  background:var(--bg1);border-top:1px solid var(--bg3);flex-shrink:0}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:10px 4px;cursor:pointer;color:var(--dim);background:none;border:none;transition:color .15s}
.bni.active{color:var(--acc)}
.bni-icon{font-size:22px;line-height:1}
.bni-label{font-size:10px;font-weight:500}

/* SHEETS */
.sheet-bg{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.55);
  align-items:flex-end;display:none}
.sheet-bg.open{display:flex}
.sheet{width:100%;background:var(--bg1);border-radius:20px 20px 0 0;
  padding:16px 0;padding-bottom:calc(var(--sb) + 20px);max-height:65vh;overflow-y:auto}
.sheet-handle{width:36px;height:4px;background:var(--dim);border-radius:2px;margin:0 auto 12px}
.sheet-title{text-align:center;font-size:14px;font-weight:600;color:var(--sub);margin-bottom:8px}
.sitem{display:flex;align-items:center;gap:12px;padding:14px 20px;cursor:pointer;transition:background .1s}
.sitem:active{background:var(--bg2)}
.sitem.active{color:var(--acc)}
.scheck{color:var(--acc);font-size:18px;margin-left:auto;opacity:0}
.sitem.active .scheck{opacity:1}

/* STATES */
.spin-wrap{display:flex;align-items:center;justify-content:center;padding:48px;gap:8px;color:var(--sub)}
.spinner{width:20px;height:20px;border:2px solid var(--bg3);border-top-color:var(--acc);
  border-radius:50%;animation:sp .6s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:60px 20px;color:var(--sub);text-align:center;gap:12px}
.empty-icon{font-size:48px}
.empty-text{font-size:14px;line-height:1.6;max-width:220px}
</style>
</head>

<div id="app">
  <div id="nav">
    <span id="nav-back" onclick="navBack()">←</span>
    <span id="nav-title">Yemek Tarifleri</span>
    <button class="nav-btn" onclick="openSheet('lang')">🌐</button>
  </div>
  <div id="search-wrap">
    <div id="search-row">
      <input id="search-input" type="search" autocomplete="off" autocorrect="off" spellcheck="false"
        placeholder="Ara..." oninput="onSI(this.value)" onkeydown="onSK(event)">
      <button id="mode-btn" onclick="openSheet('mode')">📝</button>
    </div>
  </div>
  <div id="chips-wrap"></div>
  <div id="content"></div>
  <div id="bnav">
    <button class="bni active" id="bn-home" onclick="showHome()">
      <span class="bni-icon">🏠</span><span class="bni-label" id="bl-home">Ana Sayfa</span>
    </button>
    <button class="bni" id="bn-cat" onclick="showCategories()">
      <span class="bni-icon">🍽️</span><span class="bni-label" id="bl-cat">Kategoriler</span>
    </button>
    <button class="bni" id="bn-cuis" onclick="showCuisinesTab()">
      <span class="bni-icon">🌍</span><span class="bni-label" id="bl-cuis">Mutfaklar</span>
    </button>
    <button class="bni" id="bn-search" onclick="showSearchTab()">
      <span class="bni-icon">🔍</span><span class="bni-label" id="bl-search">Ara</span>
    </button>
    <button class="bni" id="bn-fav" onclick="showFavs()">
      <span class="bni-icon">❤️</span><span class="bni-label" id="bl-fav">Favoriler</span>
    </button>
  </div>
</div>

<div id="detail">
  <div id="dhead">
    <button class="nav-btn" onclick="closeDetail()">←</button>
    <span id="dtitle"></span>
    <button id="dfav" onclick="toggleFavD()">♡</button>
  </div>
  <img id="dimg" src="" alt="" loading="lazy">
  <div id="dbody"></div>
</div>

<div id="sheet-lang" class="sheet-bg" onclick="if(event.target===this)closeSheet('lang')">
  <div class="sheet"><div class="sheet-handle"></div>
    <div class="sheet-title" id="sheet-lang-title">Dil</div>
    <div id="lang-list"></div>
  </div>
</div>

<div id="sheet-mode" class="sheet-bg" onclick="if(event.target===this)closeSheet('mode')">
  <div class="sheet"><div class="sheet-handle"></div>
    <div id="mode-list"></div>
  </div>
</div>

const TTL=86400000;

// ===== HELPERS =====
const t=k=>(T[lang]||T.tr)[k]||(T.tr)[k]||k;
const cn=c=>(T[lang]||T.tr).catNames[c]||(T.tr).catNames[c]||c;
const cuisineName=area=>{const c=CUISINES.find(x=>x.area===area);return c?(c.names[lang]||c.names.en||area):area};
const cuisineFlag=area=>{const c=CUISINES.find(x=>x.area===area);return c?c.flag:'🌍'};
const isFav=id=>!!favs[id];
function saveFav(id,name,thumb,type){
  if(favs[id])delete favs[id];
  else favs[id]={id,name,thumb,type,ts:Date.now()};
  localStorage.setItem('favs2',JSON.stringify(favs));
}
function cGet(k){try{const d=JSON.parse(localStorage.getItem('c_'+k));if(d&&Date.now()-d.t<TTL)return d.v}catch(e){}return null}
function cSet(k,v){try{localStorage.setItem('c_'+k,JSON.stringify({t:Date.now(),v}))}catch(e){}}
async function jFetch(url){
  const c=cGet(url);if(c)return c;
  const r=await fetch(url);const d=await r.json();cSet(url,d);return d;
}

// ===== API =====
async function getCats(){
  if(mealCats.length)return mealCats;
  const d=await jFetch(MAPI+'categories.php');
  mealCats=d.categories||[];return mealCats;
}
const normM=m=>({id:'f_'+m.idMeal,rid:m.idMeal,name:m.strMeal,thumb:m.strMealThumb,cat:m.strCategory||'',area:m.strArea||'',type:'food'});
const normD=d=>({id:'d_'+d.idDrink,rid:d.idDrink,name:d.strDrink,thumb:d.strDrinkThumb,cat:d.strCategory||'',area:'',type:'drink'});
async function getMealsByCat(c){const d=await jFetch(MAPI+'filter.php?c='+encodeURIComponent(c));return(d.meals||[]).map(normM)}
async function getMealsByArea(a){const d=await jFetch(MAPI+'filter.php?a='+encodeURIComponent(a));return(d.meals||[]).map(normM)}
async function searchMeals(q){const d=await jFetch(MAPI+'search.php?s='+encodeURIComponent(q));return(d.meals||[]).map(normM)}
async function searchByIngr(q){const d=await jFetch(MAPI+'filter.php?i='+encodeURIComponent(q));return(d.meals||[]).map(normM)}
async function lookupMeal(id){const d=await jFetch(MAPI+'lookup.php?i='+id);return d.meals?d.meals[0]:null}
async function getDrinksByCat(c){const d=await jFetch(CAPI+'filter.php?c='+encodeURIComponent(c));return(d.drinks||[]).map(normD)}
async function searchDrinks(q){const d=await jFetch(CAPI+'search.php?s='+encodeURIComponent(q));return(d.drinks||[]).map(normD)}
async function lookupDrink(id){const d=await jFetch(CAPI+'lookup.php?i='+id);return d.drinks?d.drinks[0]:null}
async function getDrinkCats(){const d=await jFetch(CAPI+'list.php?c=list');return d.drinks||[]}

// ===== RENDER UTILS =====
const spin=()=>`<div class="spin-wrap"><div class="spinner"></div><span>${t('loading')}</span></div>`;
const empty=(icon,txt)=>`<div class="empty"><div class="empty-icon">${icon}</div><div class="empty-text">${txt}</div></div>`;
function rcard(r){
  const fav=isFav(r.id)?'❤️ ':'';
  const sub=[r.cat&&cn(r.cat),r.area&&cuisineFlag(r.area)+' '+cuisineName(r.area)].filter(Boolean).join(' · ');
  return`<div class="rcard" onclick="openDetail('${r.rid}','${r.type}')">
    <img src="${r.thumb}/preview" alt="" loading="lazy" onerror="this.src='${r.thumb}'">
    <div class="rcard-body"><div class="rcard-name">${fav}${r.name}</div>
    <div class="rcard-meta">${sub}</div></div></div>`;
}
function rgrid(list){
  if(!list||!list.length)return empty('🔍',t('noRes'));
  return`<div class="rgrid">${list.map(rcard).join('')}</div><div style="height:20px"></div>`;
}
function cuisineGrid(){
  return`<div class="cuis-grid">${CUISINES.map(c=>
    `<div class="cuis-card" onclick="filterArea('${c.area}')">
      <div class="cuis-flag">${c.flag}</div>
      <div class="cuis-name">${c.names[lang]||c.names.en}</div>
    </div>`).join('')}</div><div style="height:20px"></div>`;
}
function cuisineHScroll(){
  return`<div class="cuis-hscroll">${CUISINES.map(c=>
    `<div class="cuis-chip" onclick="filterArea('${c.area}')">${c.flag} ${c.names[lang]||c.names.en}</div>`
  ).join('')}</div>`;
}

// ===== CHIP RENDER =====
async function renderChips(active){
  const wrap=document.getElementById('chips-wrap');
  const cats=await getCats();
  const L=T[lang]||T.tr;
  const all=[
    {k:null,label:L.catNames['All']||'Tümü'},
    ...cats.map(c=>({k:c.strCategory,label:cn(c.strCategory)})),
    {k:'Drinks',label:cn('Drinks')}
  ];
  wrap.innerHTML=all.map(c=>
    `<div class="chip${c.k===active?' active':''}" onclick="chipClick(${c.k===null?'null':"'"+c.k+"'"})">${c.label}</div>`
  ).join('');
}

async function chipClick(cat){
  activeCat=cat;
  clearSearchInput();
  const content=document.getElementById('content');
  content.innerHTML=spin();
  await renderChips(cat);
  try{
    let results;
    if(cat===null){
      const[tr,des,ch]=await Promise.all([getMealsByArea('Turkish'),getMealsByCat('Dessert'),getMealsByCat('Chicken')]);
      const seen=new Set();
      results=[...tr,...des,...ch].filter(r=>{if(seen.has(r.id))return false;seen.add(r.id);return true;});
    }else if(cat==='Drinks'){
      results=await getDrinksByCat('Cocktail');
    }else{
      results=await getMealsByCat(cat);
    }
    content.innerHTML=rgrid(results);
  }catch(e){content.innerHTML=empty('⚠️',t('noRes'))}
}

function onSI(val){
  clearTimeout(sTimer);
  if(!val.trim())return;
  sTimer=setTimeout(()=>doSearch(val),500);
}
function onSK(e){if(e.key==='Enter'){clearTimeout(sTimer);doSearch(e.target.value)}}

async function doSearch(q){
  q=q.trim();if(!q)return;
  view='browse';
  setNav('🔍 '+q,true,'search');
  setSearchWrap(true);
  updateModeBtn();
  await renderChips(activeCat);
  const content=document.getElementById('content');
  content.innerHTML=spin();
  try{
    let results;
    if(searchMode==='ingr'){
      results=await searchByIngr(q);
    }else if(searchMode==='cuis'){
      const[byArea,byName]=await Promise.all([
        getMealsByArea(q).catch(()=>[]),
        searchMeals(q).catch(()=>[])
      ]);
      const seen=new Set();
      results=[...byArea,...byName].filter(r=>{if(seen.has(r.id))return false;seen.add(r.id);return true;});
    }else{
      const[food,drinks]=await Promise.all([searchMeals(q).catch(()=>[]),searchDrinks(q).catch(()=>[])]);
      results=[...food,...drinks];
    }
    content.innerHTML=rgrid(results);
  }catch(e){content.innerHTML=empty('⚠️',t('noRes'))}
}

function updateModeBtn(){
  const btn=document.getElementById('mode-btn');if(!btn)return;
  const icons={name:'📝',ingr:'🥕',cuis:'🌍'};
  const labs={name:t('byName'),ingr:t('byIngr'),cuis:t('byCuis')};
  btn.textContent=icons[searchMode]+' '+labs[searchMode];
}

  const items=list.map(f=>({id:f.id,rid:f.id.substring(2),name:f.name,thumb:f.thumb,cat:'',area:'',type:f.type||'food'}));
  content.innerHTML=rgrid(items)+'<div style="height:20px"></div>';
}

// ===== DETAIL =====
async function openDetail(id,type){
  type=type||'food';
  const overlay=document.getElementById('detail');
  document.getElementById('dtitle').textContent=t('loading');
  document.getElementById('dbody').innerHTML=spin();
  document.getElementById('dimg').src='';
  overlay.classList.add('open');
  try{
    let m;
    if(type==='drink') m=await lookupDrink(id);
    else m=await lookupMeal(id);
    if(!m){document.getElementById('dbody').innerHTML=empty('⚠️','Yüklenemedi');return}
    currentRecipe={...m,_type:type};
    const name=m.strMeal||m.strDrink;
    const thumb=m.strMealThumb||m.strDrinkThumb;
    const cat=m.strCategory||'';
    const area=m.strArea||'';
    const alc=m.strAlcoholic||'';
    const instr=m.strInstructions||'';
    const yt=m.strYoutube||m.strVideo||'';
    const src=m.strSource||'';
    const rid=type==='drink'?'d_'+id:'f_'+id;
    document.getElementById('dtitle').textContent=name;
    const dimg=document.getElementById('dimg');
    dimg.src=thumb;dimg.alt=name;
    const dfav=document.getElementById('dfav');
    dfav.textContent=isFav(rid)?'❤️':'♡';
    dfav.dataset.rid=rid;dfav.dataset.name=name;dfav.dataset.thumb=thumb;dfav.dataset.type=type;
    const ings=[];
    for(let i=1;i<=20;i++){
      const ing=m['strIngredient'+i],meas=m['strMeasure'+i];
      if(ing&&ing.trim())ings.push({ing:ing.trim(),meas:(meas||'').trim()});
    }
    const areaDisplay=area?`<span class="dmeta-tag" style="cursor:pointer" onclick="closeDetail();filterArea('${area}')">${cuisineFlag(area)} ${cuisineName(area)}</span>`:'';
    document.getElementById('dbody').innerHTML=`
      <div class="dmeta">
        ${cat?`<span class="dmeta-tag">🏷️ ${cn(cat)}</span>`:''}
        ${areaDisplay}
        ${alc&&alc!=='Unknown'?`<span class="dmeta-tag">🍸 ${alc}</span>`:''}
      </div>
      <div class="dsec">${t('ingrs')}</div>
      <ul class="ing-list">${ings.map(x=>`
        <li class="ing-item" onclick="this.querySelector('input').click()">
          <input type="checkbox" onclick="event.stopPropagation()">
          <span class="ing-name">${x.ing}</span>
          ${x.meas?`<span class="ing-meas">${x.meas}</span>`:''}
        </li>`).join('')}</ul>
      <div class="dsec">${t('howto')}</div>
      <div class="instr">${instr.replace(/\r\n/g,'\n').replace(/\r/g,'\n').trim()}</div>
      ${src?`<div style="margin-top:16px;font-size:12px;color:var(--sub)">${t('source')}: <a href="${src}" target="_blank" style="color:var(--acc)">${src.replace(/^https?:\/\//,'').substring(0,50)}</a></div>`:''}
      ${yt?`<button class="yt-btn" onclick="window.open('${yt}','_blank')">▶ ${t('watchVid')}</button>`:''}
      <div style="height:50px"></div>`;
  }catch(e){document.getElementById('dbody').innerHTML=empty('⚠️','Yüklenemedi')}
}
function closeDetail(){document.getElementById('detail').classList.remove('open')}
function toggleFavD(){
  const btn=document.getElementById('dfav');
  const{rid,name,thumb,type}=btn.dataset;
  saveFav(rid,name,thumb,type);
  btn.textContent=isFav(rid)?'❤️':'♡';
  if(view==='favorites')showFavs();
}

// ===== SHEETS =====
function openSheet(id){
  if(id==='lang'){
    const L=T[lang]||T.tr;
    document.getElementById('sheet-lang-title').textContent=L.lang;
    document.getElementById('lang-list').innerHTML=Object.entries(T).map(([code,l])=>
      `<div class="sitem${code===lang?' active':''}" onclick="setLang('${code}')">
        <span style="font-size:24px">${l.flag}</span>
        <div style="flex:1"><div style="font-size:16px;font-weight:600">${l.nativeName}</div>
        <div style="font-size:12px;color:var(--sub)">${l.appName}</div></div>
        <span class="scheck">✓</span></div>`
    ).join('');
  }else{
    document.getElementById('mode-list').innerHTML=[
      {m:'name',icon:'📝',label:t('byName')},
      {m:'ingr',icon:'🥕',label:t('byIngr')},
      {m:'cuis',icon:'🌍',label:t('byCuis')}
    ].map(x=>`<div class="sitem${searchMode===x.m?' active':''}" onclick="selectMode('${x.m}')">
      <span style="font-size:20px">${x.icon}</span>
      <span style="font-size:16px">${x.label}</span>
      <span class="scheck">✓</span></div>`).join('');
  }
  document.getElementById('sheet-'+id).classList.add('open');
}
function closeSheet(id){document.getElementById('sheet-'+id).classList.remove('open')}
function setLang(code){
  lang=code;localStorage.setItem('lang',code);
  document.documentElement.lang=code;
  closeSheet('lang');
  const L=T[lang]||T.tr;
  document.getElementById('bl-home').textContent=L.home;
  document.getElementById('bl-cat').textContent=L.cats;
  document.getElementById('bl-cuis').textContent=L.cuis;
  document.getElementById('bl-search').textContent=L.searchTab;
  document.getElementById('bl-fav').textContent=L.favs;
  updateModeBtn();
  if(view==='home')showHome();
  else if(view==='favorites')showFavs();
  else if(view==='cuisines')showCuisinesTab();
  else{renderChips(activeCat);document.getElementById('nav-title').textContent=T[code].appName}
}
function selectMode(m){
  searchMode=m;closeSheet('mode');updateModeBtn();
  const inp=document.getElementById('search-input');
  if(inp&&inp.value.trim())doSearch(inp.value.trim());
}

// ===== INIT =====
window.addEventListener('DOMContentLoaded',()=>{
  document.documentElement.lang=lang;
  const L=T[lang]||T.tr;
  document.getElementById('bl-home').textContent=L.home;
  document.getElementById('bl-cat').textContent=L.cats;
  document.getElementById('bl-cuis').textContent=L.cuis;
  document.getElementById('bl-search').textContent=L.searchTab;
  document.getElementById('bl-fav').textContent=L.favs;
  showHome();
});
</script>
