<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Yemek Tarifleri</title>
<style>
:root{
  --bg0:#0d0906;--bg1:#161009;--bg2:#1e1510;
  --ac:#f97316;--ac2:#fbbf24;--ac3:#ef4444;
  --txt:#f5f0ea;--txt2:#c0a880;--mut:#806048;
  --glass:rgba(255,255,255,.07);--glass-bd:rgba(255,255,255,.12);
  --r:20px;--ok:#34d399;
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
  --th:62px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg0)}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",system-ui,sans-serif;
  color:var(--txt);-webkit-font-smoothing:antialiased}

/* ── LAYOUT ── */
#app{position:fixed;inset:0;display:flex;flex-direction:column}
#pages{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding-top:calc(var(--st)+58px);padding-bottom:calc(var(--th)+var(--sb)+16px);
  opacity:0;pointer-events:none;transition:opacity .18s}
.page.active{opacity:1;pointer-events:auto}

/* ── TOPBAR ── */
#topbar{position:fixed;top:0;left:0;right:0;z-index:30;padding-top:var(--st);
  background:linear-gradient(to bottom,var(--bg0) 75%,transparent)}
.tb{height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 16px}
.brand{display:flex;align-items:center;gap:9px}
.b-ic{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-size:19px;
  background:linear-gradient(135deg,var(--ac),var(--ac2))}
.b-nm{font-size:15px;font-weight:700;letter-spacing:-.2px}
.tb-r{display:flex;gap:6px}
.ibtn{width:36px;height:36px;border-radius:50%;border:1px solid var(--glass-bd);background:var(--glass);
  color:var(--txt);font-size:15px;cursor:pointer;display:grid;place-items:center;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}

/* ── TABS ── */
#tabbar{position:fixed;bottom:0;left:0;right:0;z-index:30;padding-bottom:var(--sb);
  background:rgba(13,9,6,.9);backdrop-filter:blur(32px) saturate(200%);
  -webkit-backdrop-filter:blur(32px) saturate(200%);border-top:1px solid var(--glass-bd)}
.tabs{display:flex;height:var(--th)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;cursor:pointer;opacity:.4;transition:.15s;font-size:10px;font-weight:600;letter-spacing:.2px}
.tab.sel{opacity:1;color:var(--ac)}
.tab-ic{font-size:22px;line-height:1}

/* ── BG FX ── */
.bgfx{position:fixed;inset:0;z-index:-2;overflow:hidden;pointer-events:none}
.bgfx::before,.bgfx::after{content:"";position:absolute;width:60vw;height:60vw;
  border-radius:50%;filter:blur(90px);opacity:.2}
.bgfx::before{background:var(--ac);top:-20vw;right:-12vw}
.bgfx::after{background:#c2410c;bottom:-25vw;left:-18vw}

/* ── HERO BANNER ── */
.hero{margin:0 16px 16px;border-radius:var(--r);overflow:hidden;cursor:pointer;
  position:relative;min-height:200px;transition:transform .12s}
.hero:active{transform:scale(.98)}
.hero img{width:100%;height:220px;object-fit:cover;display:block}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.75) 0%,transparent 50%)}
.hero-body{position:absolute;bottom:0;left:0;right:0;padding:16px}
.hero-badge{display:inline-flex;align-items:center;gap:5px;background:var(--ac);
  color:#0d0906;border-radius:8px;padding:3px 9px;font-size:11px;font-weight:800;margin-bottom:8px}
.hero-title{font-size:22px;font-weight:900;letter-spacing:-.4px;line-height:1.2}
.hero-meta{font-size:12px;opacity:.7;margin-top:4px}

/* ── CATEGORY CHIPS ── */
.chip-row{display:flex;gap:8px;overflow-x:auto;padding:0 16px 14px;scrollbar-width:none}
.chip-row::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:700;
  cursor:pointer;border:1px solid var(--glass-bd);background:var(--glass);
  transition:.15s;white-space:nowrap}
.chip.sel{background:var(--ac);border-color:var(--ac);color:#0d0906}

/* ── SECTION ── */
.sh{display:flex;align-items:center;justify-content:space-between;padding:4px 16px 10px}
.st2{font-size:17px;font-weight:800;letter-spacing:-.3px}
.cnt{font-size:12px;color:var(--mut)}

/* ── RECIPE GRID ── */
.rg{display:grid;grid-template-columns:1fr 1fr;gap:11px;padding:0 16px 12px}
.rc{border-radius:16px;overflow:hidden;cursor:pointer;background:var(--glass);
  border:1px solid var(--glass-bd);transition:transform .12s;position:relative}
.rc:active{transform:scale(.95)}
.rc .rc-img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;background:var(--bg1)}
.rc .rc-ph{width:100%;aspect-ratio:4/3;display:grid;place-items:center;font-size:38px;background:var(--bg1)}
.rc-inf{padding:9px 9px 11px}
.rc-nm{font-size:13px;font-weight:700;line-height:1.3;margin-bottom:3px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rc-mt{font-size:11px;color:var(--mut);display:flex;gap:6px;flex-wrap:wrap}
.fav-dot{position:absolute;top:6px;right:7px;font-size:14px;text-shadow:0 1px 4px rgba(0,0,0,.6)}

/* ── RECIPE ROWS ── */
.rl{padding:0 16px;display:flex;flex-direction:column;gap:9px}
.rr{display:flex;gap:11px;align-items:center;background:var(--glass);border:1px solid var(--glass-bd);
  border-radius:15px;padding:11px;cursor:pointer;transition:transform .12s;overflow:hidden}
.rr:active{transform:scale(.97)}
.rr .rr-img{width:68px;height:68px;border-radius:11px;object-fit:cover;flex-shrink:0;background:var(--bg1);display:block}
.rr .rr-ph{width:68px;height:68px;border-radius:11px;flex-shrink:0;background:var(--bg1);display:grid;place-items:center;font-size:28px}
.rr-inf{flex:1;min-width:0}
.rr-nm{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rr-cat{font-size:11px;color:var(--mut);margin-top:2px}
.rr-tm{font-size:11px;color:var(--mut);margin-top:3px}

/* ── DETAIL (slide) ── */
.sp{position:fixed;inset:0;z-index:50;background:var(--bg0);overflow-y:auto;
  -webkit-overflow-scrolling:touch;transform:translateX(100%);
  transition:transform .3s cubic-bezier(.2,.9,.2,1)}
.sp.open{transform:translateX(0)}

.d-hero-img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:var(--bg1)}
.d-hero-ph{width:100%;aspect-ratio:16/9;display:grid;place-items:center;font-size:80px;background:var(--bg1)}
.d-over{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;
  padding:calc(var(--st)+8px) 12px;z-index:5}
.d-ic{width:38px;height:38px;border-radius:50%;background:rgba(0,0,0,.52);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  display:grid;place-items:center;font-size:17px;cursor:pointer;
  border:1px solid rgba(255,255,255,.14);transition:transform .12s}
.d-ic:active{transform:scale(.87)}
.d-body{padding:14px 16px calc(44px + var(--sb))}
.d-title{font-size:25px;font-weight:900;letter-spacing:-.5px;margin-bottom:5px}
.d-desc{color:var(--txt2);font-size:13px;line-height:1.55;margin-bottom:13px}
.d-meta{display:flex;gap:9px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.d-meta::-webkit-scrollbar{display:none}
.mc{flex-shrink:0;background:var(--glass);border:1px solid var(--glass-bd);border-radius:11px;
  padding:8px 12px;font-size:11px;font-weight:600;display:flex;align-items:center;gap:5px}
.mc-lbl{opacity:.55;font-size:10px}
.d-tabs{display:flex;margin-bottom:13px;background:var(--bg1);border-radius:12px;padding:3px}
.dt{flex:1;padding:9px;text-align:center;font-size:13px;font-weight:700;cursor:pointer;
  border-radius:10px;transition:.15s;color:var(--mut)}
.dt.sel{background:var(--glass-bd);color:var(--txt)}
.ing-list{list-style:none}
.ing-list li{padding:10px 0;border-bottom:1px solid var(--glass-bd);font-size:14px;
  display:flex;align-items:flex-start;gap:9px;line-height:1.4}
.ing-list li:last-child{border-bottom:none}
.ing-list li::before{content:"·";color:var(--ac);font-size:18px;font-weight:900;flex-shrink:0;margin-top:-2px}
.step-list{list-style:none}
.si{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--glass-bd)}
.si:last-child{border-bottom:none}
.sn{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--ac),var(--ac2));
  display:grid;place-items:center;font-size:12px;font-weight:800;flex-shrink:0;margin-top:3px}
.st-txt{font-size:13px;line-height:1.6;flex:1;padding-top:4px}
.yt-btn{display:flex;align-items:center;gap:8px;background:rgba(255,0,0,.14);
  border:1px solid rgba(255,0,0,.22);border-radius:12px;padding:12px 14px;
  cursor:pointer;margin-top:14px;font-size:14px;font-weight:600;text-decoration:none;color:var(--txt)}

/* ── SKELETON ── */
.sk{background:linear-gradient(90deg,var(--bg1) 25%,rgba(255,255,255,.04) 50%,var(--bg1) 75%);
  background-size:200% 100%;animation:shim 1.4s infinite;border-radius:12px}
@keyframes shim{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── SHEET ── */
.sh-bg{position:fixed;inset:0;background:rgba(0,0,0,.58);backdrop-filter:blur(4px);
  opacity:0;pointer-events:none;transition:.22s;z-index:60}
.sh-bg.on{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:61;max-width:600px;margin:0 auto;
  transform:translateY(110%);transition:transform .28s cubic-bezier(.2,.9,.2,1);
  background:rgba(18,12,8,.96);backdrop-filter:blur(40px);
  border-top:1px solid var(--glass-bd);border-radius:28px 28px 0 0;
  padding:10px 14px calc(20px + var(--sb))}
.sheet.on{transform:translateY(0)}
.grip{width:38px;height:5px;border-radius:3px;background:rgba(255,255,255,.18);margin:8px auto 14px}
.lng-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.lng-item{padding:12px;border-radius:14px;background:var(--glass);border:1px solid var(--glass-bd);
  font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;transition:.15s}
.lng-item.sel{border-color:var(--ac);background:rgba(249,115,22,.12)}

/* ── SEARCH ── */
.srch-wrap{padding:0 16px 12px;position:relative;display:flex;align-items:center}
.srch-in{width:100%;background:var(--glass);border:1px solid var(--glass-bd);
  border-radius:14px;color:var(--txt);font-size:15px;padding:12px 12px 12px 44px;
  outline:none;-webkit-appearance:none}
.srch-in::placeholder{color:var(--mut)}
.srch-ic{position:absolute;left:28px;font-size:17px;opacity:.45;pointer-events:none}
.srch-cl{position:absolute;right:24px;font-size:14px;cursor:pointer;opacity:.5;padding:6px}

/* ── TOAST ── */
.toast{position:fixed;bottom:calc(var(--th)+var(--sb)+14px);left:50%;transform:translateX(-50%);
  background:var(--ok);color:#0d0906;padding:9px 18px;border-radius:18px;font-weight:700;
  font-size:13px;opacity:0;transition:.18s;z-index:90;white-space:nowrap;pointer-events:none}
.toast.on{opacity:1}

/* ── EMPTY ── */
.emp{text-align:center;padding:52px 20px;color:var(--mut)}
.emp .big{font-size:60px;margin-bottom:10px}
.emp h3{font-size:17px;font-weight:700;color:var(--txt);margin-bottom:5px}
.emp p{font-size:13px;line-height:1.5}

.spin{display:inline-block;width:18px;height:18px;border:2px solid var(--glass-bd);
  border-top-color:var(--ac);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.loading-row{display:flex;align-items:center;justify-content:center;gap:8px;
  padding:24px;color:var(--mut);font-size:13px}

@media(min-width:580px){.rg{grid-template-columns:repeat(3,1fr)}}
</style>
</head>
<body>
<div class="bgfx"></div>

<div id="app">
  <div id="topbar">
    <div class="tb">
      <div class="brand">
        <div class="b-ic">🍳</div>
        <div class="b-nm" id="appTitle">Yemek Tarifleri</div>
      </div>
      <div class="tb-r">
        <button class="ibtn" id="refBtn" onclick="refreshAll()">↻</button>
        <button class="ibtn" onclick="openLang()">🌐</button>
      </div>
    </div>
  </div>

  <div id="pages">
    <!-- HOME -->
    <div class="page active" id="pg-home" data-tab="home"><div id="home-cnt"></div></div>
    <!-- SEARCH -->
    <div class="page" id="pg-search" data-tab="search">
      <div class="srch-wrap">
        <span class="srch-ic">🔍</span>
        <input type="search" class="srch-in" id="srchIn" oninput="onSearch(this.value)" placeholder="">
        <span class="srch-cl" id="srchCl" onclick="clrSearch()" style="display:none">✕</span>
      </div>
      <div id="srch-res"></div>
    </div>
    <!-- FAVS -->
    <div class="page" id="pg-favs" data-tab="favs"><div id="favs-cnt"></div></div>
  </div>

  <div id="tabbar">
    <div class="tabs">
      <div class="tab sel" data-tab="home" onclick="swTab('home')"><span class="tab-ic">🏠</span><span data-k="tabHome"></span></div>
      <div class="tab" data-tab="search" onclick="swTab('search')"><span class="tab-ic">🔍</span><span data-k="tabSearch"></span></div>
      <div class="tab" data-tab="favs" onclick="swTab('favs')"><span class="tab-ic">❤️</span><span data-k="tabFavs"></span></div>
    </div>
  </div>
</div>

<!-- Recipe detail (slide) -->
<div class="sp" id="detPage">
  <div id="det-rel" style="position:relative">
    <div id="det-over" class="d-over" style="position:fixed">
      <button class="d-ic" onclick="closeSp('detPage')">‹</button>
      <button class="d-ic" id="favBtn" onclick="toggleFav()">🤍</button>
    </div>
    <div id="det-cnt"></div>
  </div>
</div>

<!-- Language sheet -->
<div class="sh-bg" id="shBg" onclick="closeLang()"></div>
<div class="sheet" id="langSh">
  <div class="grip"></div>
  <h3 style="font-size:17px;font-weight:800;margin-bottom:12px" id="langShTitle"></h3>
  <div class="lng-grid" id="lngGrid"></div>
</div>

<div class="toast" id="toast"></div>

<script>

let currentTab = 'home';

const t = k => TR[LANG][k] || k;
const esc = s => (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function toast(msg,dur=1600){const e=document.getElementById('toast');e.textContent=msg;e.classList.add('on');setTimeout(()=>e.classList.remove('on'),dur);}

// ══ CACHE ══
function cGet(key){try{const d=JSON.parse(localStorage.getItem(key)||'null');if(!d)return null;if(d.ts&&Date.now()-d.ts>TTL)return null;return d.v;}catch{return null;}}
function cSet(key,v){try{localStorage.setItem(key,JSON.stringify({v,ts:Date.now()}));}catch{}}

// ══ DATA ══
async function loadMeals(force=false){
  if(!force){const c=cGet(CK_LIST);if(c){meals=c;return;}}
  try{
    const r=await fetch(`${TMDB}/filter.php?a=Turkish`);
    if(!r.ok)throw 0;
    const d=await r.json();
    meals=d.meals||[];
    cSet(CK_LIST,meals);
  }catch{
    const c=cGet(CK_LIST);if(c)meals=c;
  }
}

async function getDetail(id){
  const ck=CK_DET+id;
  const c=cGet(ck);if(c)return c;
  const r=await fetch(`${TMDB}/lookup.php?i=${id}`);
  const d=await r.json();
  const m=d.meals?.[0];if(!m)throw 0;
  cSet(ck,m);
  return m;
}

async function searchTmdb(q){
  // TheMealDB search.php endpoint
  const r=await fetch(`${TMDB}/search.php?s=${encodeURIComponent(q)}`);
  const d=await r.json();
  return d.meals||[];
}

function setRefSpinner(on){
  const b=document.getElementById('refBtn');
  b.style.animation=on?'sp .7s linear infinite':'';
}

async function refreshAll(){
  setRefSpinner(true);
  await loadMeals(true);
  setRefSpinner(false);
  renderAll();
  toast('✓ '+t('updated'));
}

// ══ RENDER HELPERS ══
function mealThumb(m,cls,small=true){
  const url=m.strMealThumb?(small?m.strMealThumb+'/small':m.strMealThumb):null;
  if(url)return `<img class="${cls}" src="${esc(url)}" loading="lazy" onerror="this.style.opacity=0" alt="">`;
  return `<div class="${cls.replace('-img','')}-ph">🍽</div>`;
}

function getUniqCats(){
  const seen=new Set();
  return meals.map(m=>m.strCategory).filter(c=>c&&!seen.has(c)&&seen.add(c));
}

// ══ HOME ══
function renderHome(){
  const filtered = activeFilter==='all' ? meals : meals.filter(m=>m.strCategory===activeFilter);
  const cats = getUniqCats();
  const heroMeal = meals[Math.floor(Math.random()*Math.min(5,meals.length))||0];

  let html='';

  // Hero
  if(heroMeal){
    const isFav=favs.includes(heroMeal.idMeal);
    html+=`<div class="hero" onclick="openRec('${esc(heroMeal.idMeal)}')">
      <img src="${esc(heroMeal.strMealThumb)}" loading="lazy" alt="" style="width:100%;height:220px;object-fit:cover;display:block;background:var(--bg1)">
      <div class="hero-overlay"></div>
      <div class="hero-body">
        <div class="hero-badge">⭐ ${t('featured')}</div>
        <div class="hero-title">${esc(heroMeal.strMeal)}</div>
        <div class="hero-meta">🇹🇷 ${esc(heroMeal.strCategory||'Turkish')}</div>
      </div>
    </div>`;
  }

  // Category filter chips
  html+=`<div class="chip-row">
    <div class="chip ${activeFilter==='all'?'sel':''}" onclick="setFilter('all')">${t('all')}</div>
    ${cats.map(c=>`<div class="chip ${activeFilter===c?'sel':''}" onclick="setFilter('${esc(c)}')">${MEAL_CATS[c]||'🍽'} ${esc(c)}</div>`).join('')}
  </div>`;

  // Recipe count
  html+=`<div class="sh"><span class="st2">${t('recipes')}</span><span class="cnt">${filtered.length}</span></div>`;

  // Grid
  if(!filtered.length){
    if(!meals.length){
      html+=`<div style="padding:0 16px 8px">
        ${[0,1,2,3,4,5].map(()=>`<div style="display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:11px"><div class="sk" style="height:160px"></div><div class="sk" style="height:160px"></div></div>`).join('')}
      </div>`;
    } else {
      html+=`<div class="emp"><div class="big">🍽</div><h3>${t('noRes')}</h3></div>`;
    }
  } else {
    html+=`<div class="rg">${filtered.map(m=>recCard(m)).join('')}</div>`;
  }

  document.getElementById('home-cnt').innerHTML=html;
}

function setFilter(cat){
  activeFilter=cat;
  renderHome();
}

function recCard(m){
  const isFav=favs.includes(m.idMeal);
  return `<div class="rc" onclick="openRec('${esc(m.idMeal)}')">
    ${mealThumb(m,'rc-img',true)}
    ${isFav?`<div class="fav-dot">❤️</div>`:''}
    <div class="rc-inf">
      <div class="rc-nm">${esc(m.strMeal)}</div>
      <div class="rc-mt">${m.strCategory?`<span>${esc(m.strCategory)}</span>`:''}
      </div>
    </div>
  </div>`;
}

function recRow(m,showCat=true){
  return `<div class="rr" onclick="openRec('${esc(m.idMeal||m.strMeal)}')">
    ${mealThumb(m,'rr-img',true)}
    <div class="rr-inf">
      <div class="rr-nm">${esc(m.strMeal)}</div>
      ${showCat&&m.strCategory?`<div class="rr-cat">${esc(m.strCategory)}</div>`:''}
    </div>
    <span style="font-size:18px;opacity:.3">›</span>
  </div>`;
}

// ══ RECIPE DETAIL ══
function openRec(id){
  currentId=id;
  currentDet=null;
  const detPage=document.getElementById('detPage');
  document.getElementById('det-cnt').innerHTML=`<div style="height:56.25vw;background:var(--bg1)"></div><div class="d-body"><div class="loading-row"><div class="spin"></div><span>${t('loading')}</span></div></div>`;
  document.getElementById('favBtn').textContent=favs.includes(id)?'❤️':'🤍';
  detPage.classList.add('open');
  history.pushState({p:'det'},'');
  loadAndRenderDet(id,'ing');
}

async function loadAndRenderDet(id,tab){
  try{
    const m=await getDetail(id);
    currentDet=m;
    // Sync fav button
    document.getElementById('favBtn').textContent=favs.includes(m.idMeal)?'❤️':'🤍';
    renderDetContent(m,tab);
  }catch{
    document.getElementById('det-cnt').innerHTML=`<div class="emp"><div class="big">⚠️</div><h3>${t('noData')}</h3><p>${t('noDataHint')}</p></div>`;
  }
}

function renderDetContent(m,tab='ing'){
  // Build ingredients
  const ings=[];
  for(let i=1;i<=20;i++){
    const ing=(m[`strIngredient${i}`]||'').trim();
    const meas=(m[`strMeasure${i}`]||'').trim();
    if(ing) ings.push(meas?`${meas} ${ing}`:ing);
  }
  // Build steps — split by newline, filter blanks
  const steps=(m.strInstructions||'')
    .split(/\r?\n+/)
    .map(s=>s.trim())
    .filter(s=>s.length>4);

  let html=`<div>
    ${m.strMealThumb?`<img class="d-hero-img" src="${esc(m.strMealThumb)}" loading="lazy" alt="">`:`<div class="d-hero-ph">🍽</div>`}
  </div>
  <div class="d-body">
    <h1 class="d-title">${esc(m.strMeal)}</h1>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:13px">
      ${m.strCategory?`<span style="background:var(--glass);border:1px solid var(--glass-bd);border-radius:20px;padding:4px 11px;font-size:12px;font-weight:600">${esc(m.strCategory)}</span>`:''}
      <span style="background:var(--glass);border:1px solid var(--glass-bd);border-radius:20px;padding:4px 11px;font-size:12px;font-weight:600">🇹🇷 Turkish</span>
    </div>
    <div class="d-tabs">
      <div class="dt ${tab==='ing'?'sel':''}" onclick="renderDetContent(currentDet,'ing')">${t('ing')} ${ings.length?`(${ings.length})`:''}</div>
      <div class="dt ${tab==='steps'?'sel':''}" onclick="renderDetContent(currentDet,'steps')">${t('steps')} ${steps.length?`(${steps.length})`:''}</div>
    </div>`;

  if(tab==='ing'){
    html+=ings.length
      ?`<ul class="ing-list">${ings.map(i=>`<li>${esc(i)}</li>`).join('')}</ul>`
      :`<div class="emp" style="padding:24px 0"><p>—</p></div>`;
  } else {
    html+=steps.length
      ?`<ol class="step-list">${steps.map((s,i)=>`<li class="si"><div class="sn">${i+1}</div><div class="st-txt">${esc(s)}</div></li>`).join('')}</ol>`
      :`<div class="emp" style="padding:24px 0"><p>—</p></div>`;
  }

  if(m.strYoutube){
    html+=`<a class="yt-btn" href="${esc(m.strYoutube)}" target="_blank"><span style="font-size:20px">▶️</span>${t('watchYt')}</a>`;
  }

  html+='</div>';
  document.getElementById('det-cnt').innerHTML=html;
}

function toggleFav(){
  if(!currentId)return;
  const id=currentId;
  const idx=favs.indexOf(id);
  if(idx>=0){favs.splice(idx,1);toast(t('favRm'));}
  else{favs.push(id);toast(t('favAdd'));}
  localStorage.setItem(CK_FAV,JSON.stringify(favs));
  document.getElementById('favBtn').textContent=favs.includes(id)?'❤️':'🤍';
  if(currentTab==='favs')renderFavs();
  // update grid dot
  renderHome();
}

// ══ SEARCH ══
let srchTimer=null;
let srchResults=[];
function onSearch(q){
  clearTimeout(srchTimer);
  document.getElementById('srchCl').style.display=q?'':'none';
  srchTimer=setTimeout(()=>doSearch(q),280);
}
function clrSearch(){document.getElementById('srchIn').value='';document.getElementById('srchCl').style.display='none';doSearch('');}

async function doSearch(q){
  const el=document.getElementById('srch-res');
  if(!q.trim()){
    el.innerHTML=`<div class="emp" style="padding-top:40px"><div class="big">🔍</div><h3>${t('srchPh')}</h3></div>`;
    return;
  }
  // Local search first
  const ql=q.toLowerCase();
  let results=meals.filter(m=>(m.strMeal||'').toLowerCase().includes(ql));

  // If few results, also query TheMealDB search endpoint
  if(results.length<3){
    el.innerHTML=`<div class="loading-row"><div class="spin"></div></div>`;
    try{
      const api=await searchTmdb(q);
      // Merge, dedup by idMeal
      const seen=new Set(results.map(m=>m.idMeal));
      api.forEach(m=>{if(!seen.has(m.idMeal))results.push(m);});
    }catch{}
  }

  if(!results.length){
    el.innerHTML=`<div class="emp"><div class="big">🤷</div><h3>${t('noRes')}</h3><p>"${esc(q)}"</p></div>`;
    return;
  }
  el.innerHTML=`<div style="padding:0 16px 4px;color:var(--mut);font-size:12px">${results.length} ${t('recipes')}</div><div class="rl">${results.map(m=>recRow(m)).join('')}</div>`;
}

// ══ FAVS ══
function renderFavs(){
  const favMeals=meals.filter(m=>favs.includes(m.idMeal));
  if(!favMeals.length){
    document.getElementById('favs-cnt').innerHTML=`<div class="emp"><div class="big">❤️</div><h3>${t('noFavs')}</h3><p>${t('noFavsHint')}</p></div>`;
    return;
  }
  document.getElementById('favs-cnt').innerHTML=`<div class="rg">${favMeals.map(m=>recCard(m)).join('')}</div>`;
}

// ══ NAVIGATION ══
function swTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('sel',el.dataset.tab===tab));
  document.querySelectorAll('.page').forEach(el=>el.classList.toggle('active',el.id==='pg-'+tab));
  if(tab==='search')setTimeout(()=>document.getElementById('srchIn')?.focus(),200);
  if(tab==='favs')renderFavs();
}

function closeSp(id){
  document.getElementById(id).classList.remove('open');
}

window.addEventListener('popstate',()=>{
  if(document.getElementById('detPage').classList.contains('open'))
    document.getElementById('detPage').classList.remove('open');
});

// ══ LANGUAGE ══
function openLang(){
  document.getElementById('langShTitle').textContent=t('langTitle');
  document.getElementById('lngGrid').innerHTML=Object.keys(LNAMES).map(l=>`<div class="lng-item ${l===LANG?'sel':''}" onclick="setLang('${l}')"><span style="font-size:18px">${FLAGS[l]}</span>${LNAMES[l]}</div>`).join('');
  document.getElementById('shBg').classList.add('on');
  document.getElementById('langSh').classList.add('on');
}
function closeLang(){document.getElementById('shBg').classList.remove('on');document.getElementById('langSh').classList.remove('on');}
function setLang(l){LANG=l;localStorage.setItem(CK_LANG,l);closeLang();renderAll();}

// ══ RENDER ALL ══
function renderAll(){
  document.documentElement.lang=LANG;
  document.getElementById('appTitle').textContent=TR[LANG].appName;
  document.querySelectorAll('[data-k]').forEach(el=>{const k=el.dataset.k;const v=TR[LANG][k];if(v&&typeof v==='string')el.textContent=v;});
  const si=document.getElementById('srchIn');if(si)si.placeholder=t('srchPh');
  renderHome();
  if(currentTab==='favs')renderFavs();
  if(currentTab==='search')doSearch(document.getElementById('srchIn')?.value||'');
}

// ══ INIT ══
renderAll();
loadMeals().then(renderAll);
</script>
