<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Yemek &amp; Örgü</title>
<style>
:root{
  --bg0:#0d0906;--bg1:#161009;--bg2:#1e1510;
  --ac1:#f97316;--ac2:#a78bfa;--ac3:#fbbf24;
  --txt:#f5f0ea;--txt2:#c0a880;--mut:#7a5c40;
  --glass:rgba(255,255,255,.07);--glass-bd:rgba(255,255,255,.12);
  --r:20px;--ok:#34d399;
  --st:env(safe-area-inset-top,0px);--sb:env(safe-area-inset-bottom,0px);
  --th:62px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg0)}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",system-ui,sans-serif;
  color:var(--txt);-webkit-font-smoothing:antialiased}

/* ── LAYOUT ── */
#app{position:fixed;inset:0;display:flex;flex-direction:column}
#pages{flex:1;overflow:hidden;position:relative}
.page{position:absolute;inset:0;overflow-y:auto;-webkit-overflow-scrolling:touch;
  padding-top:calc(var(--st)+58px);padding-bottom:calc(var(--th)+var(--sb)+16px);
  opacity:0;pointer-events:none;transition:opacity .18s}
.page.active{opacity:1;pointer-events:auto}

/* ── TOPBAR ── */
#topbar{position:fixed;top:0;left:0;right:0;z-index:30;padding-top:var(--st);
  background:linear-gradient(to bottom,var(--bg0) 75%,transparent)}
.tb{height:58px;display:flex;align-items:center;justify-content:space-between;padding:0 16px}
.brand{display:flex;align-items:center;gap:9px;min-width:0;flex:1}
.b-ic{width:34px;height:34px;border-radius:10px;flex-shrink:0;display:grid;place-items:center;font-size:19px;
  background:linear-gradient(135deg,var(--ac1),var(--ac2))}
.b-nm{font-size:14px;font-weight:700;letter-spacing:-.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-r{display:flex;gap:6px;flex-shrink:0}
.ibtn{width:36px;height:36px;border-radius:50%;border:1px solid var(--glass-bd);background:var(--glass);
  color:var(--txt);font-size:15px;cursor:pointer;display:grid;place-items:center;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}

/* ── TABS ── */
#tabbar{position:fixed;bottom:0;left:0;right:0;z-index:30;padding-bottom:var(--sb);
  background:rgba(13,9,6,.9);backdrop-filter:blur(32px) saturate(200%);
  -webkit-backdrop-filter:blur(32px) saturate(200%);border-top:1px solid var(--glass-bd)}
.tabs{display:flex;height:var(--th)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;cursor:pointer;opacity:.4;transition:.15s;font-size:10px;font-weight:600}
.tab.sel{opacity:1;color:var(--ac1)}
.tab-ic{font-size:21px;line-height:1}

/* ── BG FX ── */
.bgfx{position:fixed;inset:0;z-index:-2;overflow:hidden;pointer-events:none}
.bgfx::before,.bgfx::after{content:"";position:absolute;width:55vw;height:55vw;
  border-radius:50%;filter:blur(90px);opacity:.18}
.bgfx::before{background:var(--ac1);top:-18vw;right:-10vw}
.bgfx::after{background:var(--ac2);bottom:-22vw;left:-15vw}

/* ── CATEGORY CARDS ── */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:8px 16px 16px}
.cat-card{border-radius:var(--r);overflow:hidden;cursor:pointer;
  position:relative;min-height:150px;display:flex;flex-direction:column;
  justify-content:flex-end;padding:16px;transition:transform .12s}
.cat-card:active{transform:scale(.96)}
.cat-card::before{content:"";position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.65) 0%,transparent 55%);z-index:1}
.cat-em{position:absolute;top:12px;right:12px;font-size:44px;opacity:.55;z-index:2;
  filter:drop-shadow(0 3px 8px rgba(0,0,0,.4))}
.cat-info{position:relative;z-index:2}
.cat-nm{font-size:17px;font-weight:800;letter-spacing:-.3px;line-height:1.2}
.cat-ct{font-size:11px;opacity:.65;margin-top:3px}
.c-yemek{background:linear-gradient(135deg,#7c2d12,#c2410c)}
.c-orgu{background:linear-gradient(135deg,#3b0764,#7c3aed)}

/* ── SECTION ── */
.sh{display:flex;align-items:center;justify-content:space-between;padding:4px 16px 10px}
.st2{font-size:17px;font-weight:800;letter-spacing:-.3px}
.cnt{font-size:12px;color:var(--mut)}

/* ── RECIPE GRID ── */
.rg{display:grid;grid-template-columns:1fr 1fr;gap:11px;padding:0 16px 14px}
.rc{border-radius:16px;overflow:hidden;cursor:pointer;background:var(--glass);
  border:1px solid var(--glass-bd);transition:transform .12s;position:relative}
.rc:active{transform:scale(.95)}
.rc .rci{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;background:var(--bg1)}
.rc .rcp{width:100%;aspect-ratio:4/3;display:grid;place-items:center;font-size:36px;background:var(--bg1)}
.rc-inf{padding:9px 9px 11px}
.rc-nm{font-size:13px;font-weight:700;line-height:1.3;margin-bottom:3px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.rc-mt{font-size:11px;color:var(--mut);display:flex;gap:6px;flex-wrap:wrap}
.fav-dot{position:absolute;top:6px;right:7px;font-size:13px}

/* ── RECIPE LIST (category page) ── */
.rl{padding:0 16px;display:flex;flex-direction:column;gap:9px}
.rr{display:flex;gap:11px;align-items:center;background:var(--glass);border:1px solid var(--glass-bd);
  border-radius:15px;padding:11px;cursor:pointer;transition:transform .12s;overflow:hidden}
.rr:active{transform:scale(.97)}
.rr img,.rr .rrp{width:68px;height:68px;border-radius:11px;object-fit:cover;flex-shrink:0;background:var(--bg1)}
.rr img{display:block}
.rrp{display:grid;place-items:center;font-size:28px}
.rr-inf{flex:1;min-width:0}
.rr-nm{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rr-sub{font-size:11px;color:var(--mut);margin-top:2px}
.rr-tm{font-size:11px;color:var(--mut);margin-top:3px;display:flex;gap:6px}

/* ── SLIDE PAGES ── */
.sp{position:fixed;inset:0;z-index:50;background:var(--bg0);overflow-y:auto;
  -webkit-overflow-scrolling:touch;transform:translateX(100%);
  transition:transform .3s cubic-bezier(.2,.9,.2,1)}
.sp.open{transform:translateX(0)}
.sp-hdr{position:sticky;top:0;z-index:5;padding:calc(var(--st)+8px) 16px 10px;
  background:linear-gradient(to bottom,var(--bg0) 80%,transparent)}
.sp-hdr-row{display:flex;align-items:center;gap:11px;margin-bottom:2px}

/* ── DETAIL ── */
.d-hero{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:var(--bg1)}
.d-hero-ph{width:100%;aspect-ratio:16/9;display:grid;place-items:center;font-size:76px;background:var(--bg1)}
.d-over{position:absolute;top:0;left:0;right:0;padding:calc(var(--st)+8px) 12px;
  display:flex;justify-content:space-between;z-index:5}
.d-ic{width:38px;height:38px;border-radius:50%;background:rgba(0,0,0,.52);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  display:grid;place-items:center;font-size:17px;cursor:pointer;
  border:1px solid rgba(255,255,255,.14);transition:transform .12s}
.d-ic:active{transform:scale(.87)}
.d-body{padding:14px 16px calc(44px + var(--sb))}
.d-title{font-size:25px;font-weight:900;letter-spacing:-.5px;margin-bottom:8px}
.d-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.dtag{padding:4px 11px;border-radius:20px;font-size:11px;font-weight:700;background:var(--glass);border:1px solid var(--glass-bd)}
.d-meta{display:flex;gap:9px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
.d-meta::-webkit-scrollbar{display:none}
.mc{flex-shrink:0;background:var(--glass);border:1px solid var(--glass-bd);border-radius:11px;
  padding:8px 12px;font-size:11px;font-weight:600;display:flex;align-items:center;gap:5px}
.mc-lbl{opacity:.55;font-size:10px}
.d-tabs{display:flex;margin-bottom:13px;background:var(--bg1);border-radius:12px;padding:3px}
.dt{flex:1;padding:9px;text-align:center;font-size:13px;font-weight:700;cursor:pointer;
  border-radius:10px;transition:.15s;color:var(--mut)}
.dt.sel{background:var(--glass-bd);color:var(--txt)}
.ing-list{list-style:none}
.ing-list li{padding:10px 0;border-bottom:1px solid var(--glass-bd);font-size:14px;
  display:flex;align-items:flex-start;gap:9px;line-height:1.4}
.ing-list li:last-child{border-bottom:none}
.ing-list li::before{content:"·";color:var(--ac1);font-size:18px;font-weight:900;flex-shrink:0;margin-top:-2px}
.step-list{list-style:none}
.si{display:flex;gap:12px;padding:11px 0;border-bottom:1px solid var(--glass-bd)}
.si:last-child{border-bottom:none}
.sn{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--ac1),var(--ac2));
  display:grid;place-items:center;font-size:12px;font-weight:800;flex-shrink:0;margin-top:3px}
.st-txt{font-size:13px;line-height:1.6;flex:1;padding-top:4px}
.yt-btn{display:flex;align-items:center;gap:8px;background:rgba(255,0,0,.14);
  border:1px solid rgba(255,0,0,.22);border-radius:12px;padding:12px 14px;
  cursor:pointer;margin-top:14px;font-size:14px;font-weight:600;color:var(--txt);text-decoration:none}

/* ── CHIP FILTER (yemek kategorileri) ── */
.chip-row{display:flex;gap:8px;overflow-x:auto;padding:0 16px 12px;scrollbar-width:none}
.chip-row::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:7px 13px;border-radius:18px;font-size:12px;font-weight:700;
  cursor:pointer;border:1px solid var(--glass-bd);background:var(--glass);
  transition:.15s;white-space:nowrap}
.chip.sel{background:var(--ac1);border-color:var(--ac1);color:#0d0906}
.chip.sel-orgu{background:var(--ac2);border-color:var(--ac2);color:#fff}

/* ── SEARCH ── */
.srch-wrap{padding:0 16px 12px;position:relative;display:flex;align-items:center}
.srch-in{width:100%;background:var(--glass);border:1px solid var(--glass-bd);
  border-radius:14px;color:var(--txt);font-size:15px;padding:12px 12px 12px 44px;
  outline:none;-webkit-appearance:none}
.srch-in::placeholder{color:var(--mut)}
.srch-ic{position:absolute;left:28px;font-size:17px;opacity:.45;pointer-events:none}
.srch-cl{position:absolute;right:24px;font-size:14px;cursor:pointer;opacity:.5;padding:6px}

/* ── SKELETON ── */
.sk{background:linear-gradient(90deg,var(--bg1) 25%,rgba(255,255,255,.04) 50%,var(--bg1) 75%);
  background-size:200% 100%;animation:shim 1.4s infinite;border-radius:12px}
@keyframes shim{0%{background-position:200% 0}100%{background-position:-200% 0}}

/* ── SHEET (dil seçimi) ── */
.sh-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);
  opacity:0;pointer-events:none;transition:.22s;z-index:60}
.sh-bg.on{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:61;max-width:600px;margin:0 auto;
  transform:translateY(110%);transition:transform .28s cubic-bezier(.2,.9,.2,1);
  background:rgba(18,12,8,.96);backdrop-filter:blur(40px);
  border-top:1px solid var(--glass-bd);border-radius:28px 28px 0 0;
  padding:10px 16px calc(20px + var(--sb))}
.sheet.on{transform:translateY(0)}
.grip{width:38px;height:5px;border-radius:3px;background:rgba(255,255,255,.18);margin:8px auto 16px}
.lng-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.lng-item{padding:13px;border-radius:14px;background:var(--glass);border:1px solid var(--glass-bd);
  font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:9px;transition:.15s}
.lng-item.sel{border-color:var(--ac1);background:rgba(249,115,22,.12)}
.lng-item .lng-native{font-size:13px;opacity:.65}

/* ── TOAST ── */
.toast{position:fixed;bottom:calc(var(--th)+var(--sb)+14px);left:50%;transform:translateX(-50%);
  background:var(--ok);color:#0d0906;padding:9px 18px;border-radius:18px;font-weight:700;
  font-size:13px;opacity:0;transition:.18s;z-index:90;white-space:nowrap;pointer-events:none}
.toast.on{opacity:1}

/* ── EMPTY ── */
.emp{text-align:center;padding:52px 20px;color:var(--mut)}
.emp .big{font-size:60px;margin-bottom:10px}
.emp h3{font-size:17px;font-weight:700;color:var(--txt);margin-bottom:5px}
.emp p{font-size:13px;line-height:1.5}

.spin{display:inline-block;width:18px;height:18px;border:2px solid var(--glass-bd);
  border-top-color:var(--ac1);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.loading-row{display:flex;align-items:center;justify-content:center;gap:8px;
  padding:24px;color:var(--mut);font-size:13px}

@media(min-width:600px){.rg{grid-template-columns:repeat(3,1fr)}.cat-grid{grid-template-columns:1fr 1fr 1fr}}
</style>
</head>
<body>
<div class="bgfx"></div>

<div id="app">
  <div id="topbar">
    <div class="tb">
      <div class="brand">
        <div class="b-ic">🍳</div>

      </div>
      <div class="tb-r">
        <button class="ibtn" id="refBtn" onclick="refreshAll()" title="">↻</button>
        <button class="ibtn" onclick="openLang()">🌐</button>
      </div>
    </div>
  </div>

  <div id="pages">
    <div class="page active" id="pg-home" data-tab="home"><div id="home-cnt"></div></div>
    <div class="page" id="pg-search" data-tab="search">
      <div class="srch-wrap">
        <span class="srch-ic">🔍</span>
        <input type="search" class="srch-in" id="srchIn" oninput="onSearch(this.value)" placeholder="">
        <span class="srch-cl" id="srchCl" onclick="clrSearch()" style="display:none">✕</span>
      </div>
      <div id="srch-res"></div>
    </div>
    <div class="page" id="pg-favs" data-tab="favs"><div id="favs-cnt"></div></div>

  <div id="tabbar">

      <div class="tab" data-tab="search" onclick="swTab('search')"><span class="tab-ic">🔍</span><span id="tSearch"></span></div>
      <div class="tab" data-tab="favs" onclick="swTab('favs')"><span class="tab-ic">❤️</span><span id="tFavs"></span></div>
    </div>
  </div>
</div>

<!-- Category page -->
<div class="sp" id="catPage"><div id="cat-cnt"></div></div>

<!-- Detail page -->
<div class="sp" id="detPage">
  <div id="det-rel" style="position:relative">
    <div class="d-over" id="det-over" style="position:fixed">

      <button class="d-ic" id="favBtn" onclick="toggleFav()">🤍</button>
    </div>
    <div id="det-cnt"></div>
  </div>
</div>

<!-- Language sheet -->
<div class="sh-bg" id="shBg" onclick="closeLang()"></div>
<div class="sheet" id="langSh">
  <div class="grip"></div>
  <div style="font-size:17px;font-weight:800;margin-bottom:14px" id="langShTitle"></div>
  <div class="lng-grid" id="lngGrid"></div>
</div>

<div class="toast" id="toast"></div>

// ══ CACHE ══
function cGet(k){try{const d=JSON.parse(localStorage.getItem(k)||'null');if(!d)return null;if(d.ts&&Date.now()-d.ts>TTL)return null;return d.v;}catch{return null;}}
function cSet(k,v){try{localStorage.setItem(k,JSON.stringify({v,ts:Date.now()}));}catch{}}

// ══ DATA ══
async function loadAll(force=false){
  setRefSpin(true);
  await Promise.allSettled([loadTmdb(force), loadCustom(force)]);
  setRefSpin(false);
  renderAll();
}

async function loadTmdb(force=false){
  if(!force){const c=cGet(CK_LIST);if(c){tmdbList=c;return;}}
  try{
    const r=await fetch(`${TMDB}/filter.php?a=Turkish`);
    if(!r.ok)throw 0;
    tmdbList=(await r.json()).meals||[];
    cSet(CK_LIST,tmdbList);
  }catch{const c=cGet(CK_LIST);if(c)tmdbList=c;}
}

async function loadCustom(force=false){
  if(!force){const c=cGet(CK_CUST);if(c){customRecs=c;return;}}
  try{
    const r=await fetch(CUSTOM_URL+'?_='+Date.now());
    if(!r.ok)throw 0;
    customRecs=(await r.json()).recipes||[];
    cSet(CK_CUST,customRecs);
  }catch{const c=cGet(CK_CUST);if(c)customRecs=c;}
}

async function getTmdbDetail(id){
  const ck=CK_DET+id;
  const c=cGet(ck);if(c)return c;
  const d=await(await fetch(`${TMDB}/lookup.php?i=${id}`)).json();
  const m=d.meals?.[0];if(!m)throw 0;
  cSet(ck,m);return m;
}

async function searchTmdb(q){
  try{const d=await(await fetch(`${TMDB}/search.php?s=${encodeURIComponent(q)}`)).json();return d.meals||[];}
  catch{return[];}
}

function setRefSpin(on){document.getElementById('refBtn').style.animation=on?'sp .7s linear infinite':'';}

function tmdbThumb(m,cls,small=true){
  const u=m.strMealThumb?(small?m.strMealThumb+'/small':m.strMealThumb):null;
  if(u)return `<img class="${cls}" src="${esc(u)}" loading="lazy" onerror="this.style.opacity=0" alt="">`;
  return `<div class="rcp">🍽</div>`;
}
function customThumb(r,cls){
  const ph={yemek:'🍲',orgu:'🧶'};
  if(r.image)return `<img class="${cls}" src="${esc(r.image)}" loading="lazy" alt="">`;
  return `<div class="rcp">${ph[r.category]||'📋'}</div>`;
}
function getUniqCats(){const s=new Set();return tmdbList.map(m=>m.strCategory).filter(c=>c&&!s.has(c)&&s.add(c));}

function openCat(key){

function renderCat(){
  const key=currentCat;
  const title=TR[LANG].cats[key]||key;
  const desc=TR[LANG].catDesc[key]||'';
  let html=`<div class="sp-hdr">
    <div class="sp-hdr-row">
      <button class="ibtn" onclick="closeSp('catPage')">‹</button>
      <div>
        <div style="font-size:20px;font-weight:900">${esc(title)}</div>
        <div style="font-size:12px;color:var(--mut);margin-top:1px">${esc(desc)}</div>
      </div>
    </div>
  </div>`;

  if(key==='yemek'){
    const cats=getUniqCats();
    const filtered=activeFilter==='all'?tmdbList:tmdbList.filter(m=>m.strCategory===activeFilter);
    html+=`<div class="chip-row">
      <div class="chip ${activeFilter==='all'?'sel':''}" onclick="setFilter('all')">${t('allFrom')}</div>
      ${cats.map(c=>`<div class="chip ${activeFilter===c?'sel':''}" onclick="setFilter('${esc(c)}')">${MEAL_CATS[c]||'🍽'} ${esc(c)}</div>`).join('')}
    </div>
    <div class="sh" style="padding-top:2px"><span class="cnt">${filtered.length} ${t('recipes')}</span></div>
    <div class="rg">${filtered.map(m=>yemekCard(m)).join('')}</div>`;
  } else {
    const recs=customRecs.filter(r=>r.category===key);
    const cats=[...new Set(recs.map(r=>(r.tags||[])[0]).filter(Boolean))];
    const filtered=activeFilter==='all'?recs:recs.filter(r=>(r.tags||[]).includes(activeFilter));
    if(cats.length>1){
      html+=`<div class="chip-row">
        <div class="chip ${activeFilter==='all'?'sel-orgu sel':''}" onclick="setFilter('all')">${t('allFrom')}</div>
        ${cats.map(c=>`<div class="chip ${activeFilter===c?'sel-orgu sel':''}" onclick="setFilter('${esc(c)}')">${esc(c)}</div>`).join('')}
      </div>`;
    }
    html+=`<div class="sh" style="padding-top:2px"><span class="cnt">${filtered.length} ${t('recipes')}</span></div>`;
    if(!filtered.length){
      html+=`<div class="emp"><div class="big">🧶</div><h3>${t('noRes')}</h3></div>`;
    } else {
      html+=`<div class="rl">${filtered.map(r=>orguRow(r)).join('')}</div><div style="height:20px"></div>`;
    }
  }
  document.getElementById('cat-cnt').innerHTML=html;
}

function setFilter(f){

}

function openRec(compositeId, src){
  currentId=compositeId; currentSrc=src; currentDet=null;
  document.getElementById('det-cnt').innerHTML=`<div style="height:56.25vw;background:var(--bg1)"></div><div class="d-body"><div class="loading-row"><div class="spin"></div><span>${t('loading')}</span></div></div>`;
  document.getElementById('favBtn').textContent=favs.includes(compositeId)?'❤️':'🤍';
  document.getElementById('detPage').classList.add('open');
  history.pushState({p:'det'},'');
  loadDet(compositeId, src, 'ing');
}

async function loadDet(compositeId, src, tab){
  try{
    if(src==='tmdb'){
      const id=compositeId.replace('tmdb_','');
      const m=await getTmdbDetail(id);
      currentDet={type:'tmdb',data:m};
    } else {
      const id=compositeId.replace('cust_','');
      const r=customRecs.find(x=>String(x.id)===id);
      if(!r)throw 0;
      currentDet={type:'custom',data:r};
    }
    document.getElementById('favBtn').textContent=favs.includes(compositeId)?'❤️':'🤍';
    renderDetContent(tab);
  }catch{
    document.getElementById('det-cnt').innerHTML=`<div class="emp"><div class="big">⚠️</div><h3>${t('noData')}</h3><p>${t('noDataHint')}</p></div>`;
  }
}

function renderDetContent(tab='ing'){
  if(!currentDet)return;
  const {type,data:d}=currentDet;
  let name,thumb,ings=[],steps=[],serv='',prepT='',cookT='',youtube='',tags=[];

  if(type==='tmdb'){
    name=d.strMeal; thumb=d.strMealThumb;
    for(let i=1;i<=20;i++){
      const ing=(d[`strIngredient${i}`]||'').trim();
      const meas=(d[`strMeasure${i}`]||'').trim();
      if(ing) ings.push(meas?`${meas} ${ing}`:ing);
    }
    steps=(d.strInstructions||'').split(/\r?\n+/).map(s=>s.trim()).filter(s=>s.length>4);
    tags=[d.strCategory,'🇹🇷 Turkish'].filter(Boolean);
    youtube=d.strYoutube||'';
  } else {
    name=d.name; thumb=d.image||null;
    ings=d.ingredients||[];
    steps=d.steps||[];
    serv=d.servings||'';
    prepT=d.prepTime?`${d.prepTime}${t('mins')}`:'';
    cookT=d.cookTime?`${d.cookTime}${t('mins')}`:'';
    tags=d.tags||[];
  }

  let html=`<div>
    ${thumb?`<img class="d-hero" src="${esc(thumb)}" loading="lazy" alt="">`
           :`<div class="d-hero-ph">${type==='tmdb'?'🍽':'🧶'}</div>`}
  </div>
  <div class="d-body">
    <h1 class="d-title">${esc(name)}</h1>
    ${tags.length?`<div class="d-tags">${tags.map(t2=>`<span class="dtag">${esc(t2)}</span>`).join('')}</div>`:''}`;

  const chips=[];
  if(prepT)chips.push(`<div class="mc"><span>🔪</span><div><div class="mc-lbl">${t('prep')}</div><div>${prepT}</div></div></div>`);
  if(cookT)chips.push(`<div class="mc"><span>⏱</span><div><div class="mc-lbl">${t('cook')}</div><div>${cookT}</div></div></div>`);
  if(serv)chips.push(`<div class="mc"><span>📐</span><div><div class="mc-lbl">${t('serv')}</div><div>${esc(serv)}</div></div></div>`);
  if(chips.length)html+=`<div class="d-meta">${chips.join('')}</div>`;

  html+=`<div class="d-tabs">
    <div class="dt ${tab==='ing'?'sel':''}" onclick="renderDetContent('ing')">${t('ing')} ${ings.length?`(${ings.length})`:''}</div>
    <div class="dt ${tab==='steps'?'sel':''}" onclick="renderDetContent('steps')">${t('steps')} ${steps.length?`(${steps.length})`:''}</div>
  </div>`;

  if(tab==='ing'){
    html+=ings.length
      ?`<ul class="ing-list">${ings.map(i=>`<li>${esc(i)}</li>`).join('')}</ul>`
      :`<div class="emp" style="padding:24px 0"><p>—</p></div>`;
  } else {
    html+=steps.length
      ?`<ol class="step-list">${steps.map((s,i)=>`<li class="si"><div class="sn">${i+1}</div><div class="st-txt">${esc(typeof s==='string'?s:s.text||'')}</div></li>`).join('')}</ol>`
      :`<div class="emp" style="padding:24px 0"><p>—</p></div>`;
  }

  if(youtube)html+=`<a class="yt-btn" href="${esc(youtube)}" target="_blank"><span style="font-size:20px">▶️</span>${t('watchYt')}</a>`;
  html+='</div>';
  document.getElementById('det-cnt').innerHTML=html;
}

function toggleFav(){
  if(!currentId)return;
  const id=currentId;
  const idx=favs.indexOf(id);
  if(idx>=0){favs.splice(idx,1);toast(t('favRm'));}
  else{favs.push(id);toast(t('favAdd'));}
  localStorage.setItem(CK_FAV,JSON.stringify(favs));
  document.getElementById('favBtn').textContent=favs.includes(id)?'❤️':'🤍';
  if(currentTab==='favs')renderFavs();
  renderHome();
}

let srchTimer=null;
function onSearch(q){
  clearTimeout(srchTimer);
  document.getElementById('srchCl').style.display=q?'':'none';
  srchTimer=setTimeout(()=>doSearch(q),280);
}
function clrSearch(){document.getElementById('srchIn').value='';document.getElementById('srchCl').style.display='none';doSearch('');}
async function doSearch(q){
  const el=document.getElementById('srch-res');
  if(!q.trim()){
    el.innerHTML=`<div class="emp" style="padding-top:40px"><div class="big">🔍</div><h3>${esc(t('srchPh'))}</h3></div>`;return;
  }
  const ql=q.toLowerCase();
  let tmdbR=tmdbList.filter(m=>(m.strMeal||'').toLowerCase().includes(ql));
  const custR=customRecs.filter(r=>(r.name||'').toLowerCase().includes(ql)||((r.ingredients||[]).some(i=>i.toLowerCase().includes(ql)))||(r.description||'').toLowerCase().includes(ql));
  if(tmdbR.length<3){el.innerHTML=`<div class="loading-row"><div class="spin"></div></div>`;const api=await searchTmdb(q);const s=new Set(tmdbR.map(m=>m.idMeal));api.forEach(m=>{if(!s.has(m.idMeal))tmdbR.push(m);});}
  const total=tmdbR.length+custR.length;
  if(!total){el.innerHTML=`<div class="emp"><div class="big">🤷</div><h3>${t('noRes')}</h3></div>`;return;}
  el.innerHTML=`<div style="padding:0 16px 8px;font-size:12px;color:var(--mut)">${total} ${t('recipes')}</div>
  <div class="rl">
    ${tmdbR.map(m=>`<div class="rr" onclick="openRec('tmdb_${m.idMeal}','tmdb')">
      ${tmdbThumb(m,'rr img',true)}
      <div class="rr-inf"><div class="rr-nm">${esc(m.strMeal)}</div><div class="rr-sub">🍳 ${TR[LANG].cats.yemek}</div></div>
      <span style="font-size:18px;opacity:.3">›</span></div>`).join('')}
    ${custR.map(r=>`<div class="rr" onclick="openRec('cust_${esc(r.id)}','custom')">
      <div class="rrp">🧶</div>
      <div class="rr-inf"><div class="rr-nm">${esc(r.name)}</div><div class="rr-sub">🧶 ${TR[LANG].cats.orgu}</div></div>
      <span style="font-size:18px;opacity:.3">›</span></div>`).join('')}
  </div>`;
}

  document.getElementById('langSh').classList.add('on');
}
function closeLang(){document.getElementById('shBg').classList.remove('on');document.getElementById('langSh').classList.remove('on');}
function setLang(l){
  LANG=l;localStorage.setItem(CK_LANG,l);
  closeLang();renderAll();
}

// ══ RENDER ALL ══
function renderAll(){
  document.documentElement.lang=LANG;
  document.getElementById('appTitle').textContent=TR[LANG].appName;
  document.getElementById('tHome').textContent=TR[LANG].tabHome;
  document.getElementById('tSearch').textContent=TR[LANG].tabSearch;
  document.getElementById('tFavs').textContent=TR[LANG].tabFavs;
  const si=document.getElementById('srchIn');if(si)si.placeholder=t('srchPh');
  renderHome();
  if(currentTab==='favs')renderFavs();
  if(currentTab==='search')doSearch(document.getElementById('srchIn')?.value||'');
  if(document.getElementById('catPage').classList.contains('open'))renderCat();
}

// ══ INIT ══
renderAll();
loadAll();
</script>
</body>
