<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Yemek Tarifleri</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
/* ─── LIQUID GLASS — iOS 26 ──────────────────────────── */
:root {
  /* ── Okunaklı sans-serif (Apple Guideline 4: net tipografi) ── */
  --font-display: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  --font-body: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  /* ── Red theme (default) — iştah açıcı ── */
  --bg-base:  #1c0608;
  --nav-bg:   rgba(32,8,10,0.72);
  --bar-bg:   rgba(28,6,8,0.52);
  --bnav-bg:  rgba(24,5,8,0.86);
  --blur:     blur(22px) saturate(180%);
  --blur-hvy: blur(36px) saturate(220%);
  --gl:       rgba(255,255,255,0.08);
  --gl-med:   rgba(255,255,255,0.13);
  --gl-str:   rgba(255,255,255,0.20);
  --gl-bdr:   rgba(255,255,255,0.16);
  --gl-top:   rgba(255,255,255,0.30);
  --acc:      #ff7133;
  --acc2:     #ffd166;
  --acc-glow: rgba(255,113,51,0.32);
  --txt:      rgba(255,255,255,0.96);
  --sub:      rgba(255,255,255,0.72);
  --dim:      rgba(255,255,255,0.10);
  --r:  18px; --r2: 26px; --r3: 32px;
  --st: env(safe-area-inset-top,0px);
  --sb: env(safe-area-inset-bottom,0px);
  --sl: env(safe-area-inset-left,0px);
  --sr: env(safe-area-inset-right,0px);
  --spring: cubic-bezier(0.34,1.56,0.64,1);
  --ease-out: cubic-bezier(0.22,1,0.36,1);
  --ease-in: cubic-bezier(0.55,0,1,0.45);
}

/* ── Purple theme ── */
body[data-theme="purple"] {
  --bg-base:  #1c1140;
  --nav-bg:   rgba(28,17,66,0.72);
  --bar-bg:   rgba(26,15,60,0.52);
  --bnav-bg:  rgba(22,12,52,0.84);
}
body[data-theme="purple"]::before {
  background:
    radial-gradient(ellipse 70% 55% at 15% 12%, rgba(160,60,255,0.28) 0%, transparent 60%),
    radial-gradient(ellipse 55% 50% at 85% 25%, rgba(100,20,200,0.22) 0%, transparent 55%),
    radial-gradient(ellipse 65% 70% at 50% 88%, rgba(200,30,150,0.20) 0%, transparent 60%),
    radial-gradient(ellipse 45% 40% at 70% 60%, rgba(130,60,220,0.14) 0%, transparent 55%);
}

/* ── Light theme ── */
body[data-theme="light"] {
  --bg-base:  #f0eaff;
  --nav-bg:   rgba(240,234,255,0.88);
  --bar-bg:   rgba(238,230,255,0.74);
  --bnav-bg:  rgba(228,218,252,0.92);
  --gl:       rgba(130,90,220,0.09);
  --gl-med:   rgba(130,90,220,0.15);
  --gl-str:   rgba(130,90,220,0.22);
  --gl-bdr:   rgba(130,90,220,0.18);
  --gl-top:   rgba(255,255,255,0.72);
  --txt:      rgba(20,10,50,0.94);
  --sub:      rgba(45,25,90,0.74);
  --dim:      rgba(70,40,120,0.10);
  --acc-glow: rgba(255,113,51,0.22);
}

/* ── Dark theme ── */
body[data-theme="dark"] {
  --bg-base:  #080418;
  --nav-bg:   rgba(8,4,24,0.80);
  --bar-bg:   rgba(8,4,24,0.60);
  --bnav-bg:  rgba(5,2,16,0.90);
  --gl:       rgba(255,255,255,0.06);
  --gl-med:   rgba(255,255,255,0.10);
  --gl-str:   rgba(255,255,255,0.16);
  --gl-bdr:   rgba(255,255,255,0.12);
  --gl-top:   rgba(255,255,255,0.22);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent }

html, body {
  height: 100%; overflow: hidden;
  background: var(--bg-base);
  color: var(--txt);
  font-family: var(--font-body);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
}

body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 70% 55% at 15% 12%, rgba(220,30,20,0.32) 0%, transparent 60%),
    radial-gradient(ellipse 55% 50% at 85% 25%, rgba(160,10,18,0.24) 0%, transparent 55%),
    radial-gradient(ellipse 65% 70% at 50% 88%, rgba(100,5,30,0.22) 0%, transparent 60%),
    radial-gradient(ellipse 45% 40% at 70% 60%, rgba(200,55,10,0.14) 0%, transparent 55%);
  transition: background 0.4s;
}
body[data-theme="light"]::before {
  background:
    radial-gradient(ellipse 70% 55% at 15% 12%, rgba(180,120,255,0.20) 0%, transparent 60%),
    radial-gradient(ellipse 55% 50% at 85% 25%, rgba(220,140,255,0.16) 0%, transparent 55%),
    radial-gradient(ellipse 65% 70% at 50% 88%, rgba(255,160,220,0.14) 0%, transparent 60%),
    radial-gradient(ellipse 45% 40% at 70% 60%, rgba(140,90,230,0.10) 0%, transparent 55%);
}
body[data-theme="dark"]::before {
  background:
    radial-gradient(ellipse 70% 55% at 15% 12%, rgba(80,20,180,0.25) 0%, transparent 60%),
    radial-gradient(ellipse 55% 50% at 85% 25%, rgba(60,10,140,0.20) 0%, transparent 55%),
    radial-gradient(ellipse 65% 70% at 50% 88%, rgba(100,10,80,0.16) 0%, transparent 60%),
    radial-gradient(ellipse 45% 40% at 70% 60%, rgba(70,20,160,0.12) 0%, transparent 55%);
}

#app { position: relative; z-index: 1; height: 100%; display: flex; flex-direction: column; overflow: hidden }

/* ═══ ANIMATIONS ════════════════════════════════════════ */
@keyframes pageIn {
  from { opacity: 0; transform: translateY(24px) scale(0.96); }
  to   { opacity: 1; transform: none; }
}
@keyframes pageSlideIn {
  from { opacity: 0; transform: translateX(40px); }
  to   { opacity: 1; transform: none; }
}
@keyframes pageSlideOut {
  from { opacity: 1; transform: none; }
  to   { opacity: 0; transform: translateX(-30px); }
}
@keyframes cardIn {
  from { opacity: 0; transform: translateY(20px) scale(0.94); }
  to   { opacity: 1; transform: none; }
}
@keyframes heroFloat {
  0%,100% { transform: translateY(0) rotate(0deg) scale(1); }
  30%     { transform: translateY(-8px) rotate(-4deg) scale(1.05); }
  60%     { transform: translateY(-5px) rotate(2deg) scale(1.02); }
}
@keyframes heroGlow {
  0%,100% { opacity: 0.32; transform: scale(1); }
  50%     { opacity: 0.52; transform: scale(1.15); }
}
@keyframes heartBeat {
  0%   { transform: scale(1); }
  20%  { transform: scale(1.45); }
  40%  { transform: scale(0.85); }
  60%  { transform: scale(1.20); }
  80%  { transform: scale(0.95); }
  100% { transform: scale(1); }
}
@keyframes sheetUp {
  from { transform: translateY(110%); opacity: 0; }
  to   { transform: none; opacity: 1; }
}
@keyframes sheetDown {
  from { transform: none; opacity: 1; }
  to   { transform: translateY(110%); opacity: 0; }
}
@keyframes bgFadeIn  { from { opacity: 0; } to { opacity: 1; } }
@keyframes bgFadeOut { from { opacity: 1; } to { opacity: 0; } }
@keyframes shimmer {
  0%   { background-position: -200% center; }
  100% { background-position:  200% center; }
}
@keyframes imgReveal {
  from { opacity: 0; filter: blur(12px) saturate(0); transform: scale(1.04); }
  to   { opacity: 1; filter: none; transform: none; }
}
@keyframes tabPop {
  0%   { transform: scale(1) translateY(0); }
  35%  { transform: scale(0.82) translateY(3px); }
  65%  { transform: scale(1.10) translateY(-2px); }
  100% { transform: scale(1) translateY(0); }
}
@keyframes pillSlide {
  from { transform: scaleX(0); opacity: 0; }
  to   { transform: none; opacity: 1; }
}
@keyframes sp { to { transform: rotate(360deg) } }
@keyframes detailIn {
  from { opacity: 0; transform: translateY(60px) scale(0.94); }
  to   { opacity: 1; transform: none; }
}
@keyframes detailOut {
  from { opacity: 1; transform: none; }
  to   { opacity: 0; transform: translateY(50px) scale(0.96); }
}
@keyframes navTitleIn {
  from { opacity: 0; transform: translateX(14px); }
  to   { opacity: 1; transform: none; }
}
@keyframes chipPop {
  0%   { transform: scale(1); }
  40%  { transform: scale(0.88); }
  75%  { transform: scale(1.08); }
  100% { transform: scale(1); }
}
@keyframes ingrIn {
  from { opacity: 0; transform: translateX(-14px); }
  to   { opacity: 1; transform: none; }
}

/* ═══ iOS 26 EXTRA ANIMATIONS ════════════════════════════════ */
@keyframes ambientPulse {
  0%,100% { transform: scale(1) translate(0,0); }
  30%     { transform: scale(1.05) translate(.8%,-1.2%); }
  60%     { transform: scale(1.04) translate(-.6%,.9%); }
}
@keyframes rippleExpand {
  to { transform: scale(4.5); opacity: 0; }
}
@keyframes glowPulse {
  0%,100% { box-shadow: 0 10px 36px rgba(0,0,0,0.48), 0 1px 0 rgba(255,255,255,0.10) inset; }
  50%     { box-shadow: 0 10px 36px rgba(0,0,0,0.48), 0 1px 0 rgba(255,255,255,0.10) inset, 0 0 0 1.5px rgba(255,113,51,0.20); }
}
@keyframes floatBadge {
  0%,100% { transform: scale(1); }
  50%     { transform: scale(1.06); }
}
body::before { animation: ambientPulse 20s ease-in-out infinite; }
.ripple { position:absolute; border-radius:50%; background:rgba(255,255,255,0.15);
  transform:scale(0); opacity:1; pointer-events:none; z-index:1;
  animation:rippleExpand .55s var(--ease-out) forwards; }
#nav { transition: padding-top .3s var(--ease-out), padding-bottom .3s var(--ease-out), background .3s; }
#nav.compact { padding-top: calc(var(--st) + 6px); padding-bottom: 6px; }
#bnav { animation: glowPulse 4.5s ease-in-out 2s infinite; }
.instr-step { transition: opacity .44s var(--ease-out), transform .44s var(--ease-out); }
.instr-step.in { opacity: 1 !important; transform: none !important; }
.ing-cb.done { animation: floatBadge 2.8s ease-in-out infinite; }
#dimg { will-change: transform; }

/* Page transitions */
.page-enter { animation: pageIn .38s var(--ease-out) both; }
.page-slide { animation: pageSlideIn .32s var(--ease-out) both; }

/* ─── NAV ──────────────────────────────────────────────── */
#nav {
  display: flex; align-items: center; gap: 10px;
  padding: calc(var(--st) + 14px) 16px 14px;
  background: var(--nav-bg);
  -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur);
  border-bottom: 1px solid var(--gl-bdr);
  flex-shrink: 0; position: relative; z-index: 10;
  transition: padding .3s var(--ease-out);
}
#nav::after {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent 0%, var(--gl-top) 40%, var(--gl-top) 60%, transparent 100%);
}
#nav-back {
  font-size: 22px; color: var(--sub); cursor: pointer; display: none; line-height: 1;
  transition: opacity .2s, transform .2s var(--spring);
}
#nav-back:active { transform: scale(0.82) translateX(-3px) }
#nav-title {
  flex: 1; font-size: 19px; font-weight: 800; letter-spacing: -.5px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
#nav-title.animate { animation: navTitleIn .28s var(--ease-out) both; }
.nav-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--gl); border: 1px solid var(--gl-bdr);
  -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px);
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; color: var(--sub); cursor: pointer;
  transition: transform .18s var(--spring), background .18s;
}
.nav-btn:active { transform: scale(0.85); background: var(--gl-med); }

/* ─── SEARCH ───────────────────────────────────────────── */
#search-wrap {
  padding: 10px 16px;
  background: var(--bar-bg);
  -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur);
  border-bottom: 1px solid var(--gl-bdr);
  flex-shrink: 0; display: none;
  overflow: hidden;
}
#search-wrap.reveal { animation: pageIn .28s var(--ease-out) both; }
#search-row { display: flex; gap: 8px; align-items: center }
#search-input {
  flex: 1; background: var(--gl); border: 1px solid var(--gl-bdr);
  -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px);
  border-radius: 14px; color: var(--txt); font-size: 16px; font-weight: 500;
  padding: 11px 16px; outline: none; -webkit-appearance: none;
  transition: border-color .2s, box-shadow .2s;
}
#search-input:focus {
  border-color: rgba(255,113,51,0.45);
  box-shadow: 0 0 0 3px rgba(255,113,51,0.12);
}
#search-input::placeholder { color: var(--sub) }
#mode-btn {
  background: var(--gl); border: 1px solid var(--gl-bdr);
  -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px);
  border-radius: 14px; color: var(--acc); font-size: 13px; font-weight: 600;
  padding: 11px 14px; cursor: pointer; white-space: nowrap; flex-shrink: 0;
  transition: transform .18s var(--spring), background .18s;
}
#mode-btn:active { transform: scale(0.92); background: var(--gl-med); }

/* ─── CHIPS ────────────────────────────────────────────── */
#chips-wrap {
  display: none; gap: 8px; overflow-x: auto;
  padding: 10px 0 10px 16px;
  -webkit-overflow-scrolling: touch; scrollbar-width: none;
  background: var(--bar-bg);
  -webkit-backdrop-filter: blur(16px); backdrop-filter: blur(16px);
  flex-shrink: 0;
}
#chips-wrap::-webkit-scrollbar { display: none }
.chip {
  flex-shrink: 0; background: var(--gl); border: 1px solid var(--gl-bdr);
  border-radius: 24px; padding: 7px 16px; font-size: 13px; font-weight: 500;
  color: var(--sub); cursor: pointer; white-space: nowrap;
  transition: transform .18s var(--spring), background .22s, color .22s, box-shadow .22s;
  will-change: transform;
}
.chip.active {
  background: linear-gradient(135deg, var(--acc) 0%, #e03800 100%);
  border-color: transparent; color: #fff;
  box-shadow: 0 4px 18px var(--acc-glow);
}
.chip.pop { animation: chipPop .32s var(--spring) both; }
.chip:active { transform: scale(0.90) !important; }
.chip:last-child { margin-right: 16px }

/* ─── CONTENT ──────────────────────────────────────────── */
#content {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding-bottom: calc(82px + var(--sb) + 20px);
  will-change: scroll-position;
}
#content.page-enter { animation: pageIn .38s var(--ease-out) both; }

/* ─── HERO ─────────────────────────────────────────────── */
.hero {
  margin: 16px;
  background: linear-gradient(145deg,
    rgba(255,90,20,0.22) 0%,
    rgba(180,20,10,0.18) 45%,
    rgba(90,10,60,0.22) 100%);
  -webkit-backdrop-filter: var(--blur-hvy); backdrop-filter: var(--blur-hvy);
  border: 1px solid rgba(255,130,60,0.22);
  border-radius: var(--r3); padding: 24px 20px;
  position: relative; overflow: hidden;
}
.hero::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,200,100,0.55), transparent);
}
.hero::after {
  content: ''; position: absolute; top: -60px; right: -60px;
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(255,120,40,0.16) 0%, transparent 70%);
  pointer-events: none;
  animation: heroGlow 4s ease-in-out infinite;
}
.hero-emoji {
  font-size: 44px; display: block; margin-bottom: 12px;
  filter: drop-shadow(0 4px 14px rgba(255,100,0,.35));
  animation: heroFloat 5s ease-in-out infinite;
  display: inline-block;
}
.hero-title { font-size: 27px; font-weight: 800; line-height: 1.16; letter-spacing: -.8px; margin-bottom: 6px }
.hero-sub { font-size: 14px; color: rgba(255,255,255,0.58); margin-bottom: 20px; line-height: 1.5; letter-spacing: .15px }
body[data-theme="light"] .hero-sub { color: rgba(60,30,100,0.62) }
body[data-theme="light"] .hero-input::placeholder { color: rgba(60,30,100,0.40) }
body[data-theme="light"] .hero-input { color: var(--txt); border-color: rgba(120,80,200,0.22); background: rgba(255,255,255,0.45) }
.hero-search { display: flex; gap: 8px }
.hero-input {
  flex: 1; min-width: 0; background: rgba(255,255,255,0.10); border: 1px solid rgba(255,255,255,0.20);
  border-radius: 16px; color: var(--txt); font-size: 16px; font-weight: 500;
  padding: 13px 16px; outline: none; -webkit-appearance: none;
  transition: border-color .2s, box-shadow .2s;
}
.hero-input:focus {
  border-color: rgba(255,113,51,0.50);
  box-shadow: 0 0 0 3px rgba(255,113,51,0.14);
}
.hero-input::placeholder { color: rgba(255,255,255,0.38) }
.hero-btn {
  background: linear-gradient(135deg, var(--acc) 0%, #e03800 100%);
  border: none; border-radius: 16px; color: #fff;
  padding: 13px 20px; font-size: 14px; font-weight: 700;
  cursor: pointer; white-space: nowrap;
  box-shadow: 0 5px 22px var(--acc-glow);
  transition: transform .2s var(--spring), box-shadow .2s;
}
.hero-btn:active { transform: scale(0.92); box-shadow: 0 3px 14px var(--acc-glow); }

/* ─── SECTION ──────────────────────────────────────────── */
.section { padding: 16px }
.sec-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px }
.sec-title { font-size: 18px; font-weight: 800; letter-spacing: -.4px }
.sec-link {
  font-size: 13px; color: var(--acc); font-weight: 600; cursor: pointer;
  transition: opacity .18s;
}
.sec-link:active { opacity: 0.65 }

/* ─── CATEGORY GRID ────────────────────────────────────── */
.cat-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 12px }
.cat-card {
  background: var(--gl); border: 1px solid var(--gl-bdr);
  -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur);
  border-radius: var(--r2); overflow: hidden; cursor: pointer;
  position: relative; aspect-ratio: 16/9;
  transition: transform .22s var(--spring), box-shadow .22s;
  will-change: transform;
}
.cat-card:active { transform: scale(.92); box-shadow: 0 8px 28px rgba(0,0,0,0.4); }
.cat-card img { width: 100%; height: 100%; object-fit: cover; opacity: .65; animation: imgReveal .5s var(--ease-out) both; }
.cat-card-icon { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 40px }
.cat-label {
  position: absolute; bottom: 0; left: 0; right: 0; padding: 10px 12px;
  background: linear-gradient(to top, rgba(0,0,0,.80), transparent);
  font-size: 14px; font-weight: 700; letter-spacing: -.1px;
}

/* Shimmer placeholder for images loading */
.img-shimmer {
  background: linear-gradient(90deg,
    rgba(255,255,255,0.04) 0%,
    rgba(255,255,255,0.10) 40%,
    rgba(255,255,255,0.04) 80%);
  background-size: 200% auto;
  animation: shimmer 1.6s linear infinite;
}

/* ─── CUISINE GRID ─────────────────────────────────────── */
.cuis-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; padding: 0 16px 4px }
.cuis-card {
  background: var(--gl); border: 1px solid var(--gl-bdr);
  -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur);
  border-radius: var(--r2); padding: 16px 8px;
  display: flex; flex-direction: column; align-items: center; gap: 7px;
  cursor: pointer; transition: transform .22s var(--spring), box-shadow .22s;
  will-change: transform;
}
.cuis-card:active { transform: scale(.88); box-shadow: 0 6px 22px rgba(0,0,0,0.36); }
.cuis-flag { font-size: 30px; line-height: 1; transition: transform .3s var(--spring); }
.cuis-card:active .cuis-flag { transform: scale(1.18) rotate(8deg); }
.cuis-name { font-size: 11.5px; font-weight: 700; text-align: center; line-height: 1.3 }

/* ─── HSCROLL (Featured) ───────────────────────────────── */
.hscroll { display: flex; gap: 12px; overflow-x: auto; padding: 0 16px 4px; -webkit-overflow-scrolling: touch; scrollbar-width: none }
.hscroll::-webkit-scrollbar { display: none }
.feat {
  flex-shrink: 0; width: 148px;
  background: var(--gl); border: 1px solid var(--gl-bdr);
  -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur);
  border-radius: var(--r2); overflow: hidden; cursor: pointer;
  transition: transform .22s var(--spring), box-shadow .22s;
  will-change: transform;
}
.feat:active { transform: scale(.92); box-shadow: 0 8px 28px rgba(0,0,0,0.4); }
.feat img {
  width: 100%; height: 94px; object-fit: cover; display: block;
  animation: imgReveal .5s var(--ease-out) both;
}
.feat-name { padding: 10px 10px 12px; font-size: 12.5px; font-weight: 700; line-height: 1.4; letter-spacing: -.1px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden }

/* ─── CUISINE HSCROLL ──────────────────────────────────── */
.cuis-hscroll { display: flex; gap: 8px; overflow-x: auto; padding: 0 16px 4px; -webkit-overflow-scrolling: touch; scrollbar-width: none }
.cuis-hscroll::-webkit-scrollbar { display: none }
.cuis-chip {
  flex-shrink: 0; background: var(--gl); border: 1px solid var(--gl-bdr);
  -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px);
  border-radius: 24px; padding: 8px 16px; font-size: 13px; font-weight: 500;
  cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 6px;
  transition: transform .2s var(--spring), background .18s;
}
.cuis-chip:active { transform: scale(0.90); background: var(--gl-med); }

/* ─── RECIPE GRID ──────────────────────────────────────── */
.rgrid { display: grid; grid-template-columns: repeat(2,1fr); gap: 12px; padding: 12px 16px 20px }
.rcard {
  background: var(--gl); border: 1px solid var(--gl-bdr);
  -webkit-backdrop-filter: var(--blur); backdrop-filter: var(--blur);
  border-radius: var(--r2); overflow: hidden; cursor: pointer;
  transition: transform .22s var(--spring), box-shadow .22s;
  will-change: transform;
  opacity: 0; /* start hidden — JS animates in */
}
.rcard.visible {
  animation: cardIn .44s var(--spring) both;
}
.rcard:active { transform: scale(.92) !important; box-shadow: 0 8px 28px rgba(0,0,0,0.40); }
.rcard img {
  width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block;
  background: var(--gl); /* placeholder bg while loading */
  transition: filter .4s, opacity .4s;
  filter: blur(8px) saturate(0.5);
  opacity: 0.5;
}
.rcard img.loaded {
  filter: none;
  opacity: 1;
}
.rcard-body { padding: 10px 12px 14px }
.rcard-name { font-size: 14px; font-weight: 700; line-height: 1.4; letter-spacing: -.1px;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden }
.rcard-meta { font-size: 11.5px; color: var(--sub); margin-top: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: .1px }

/* ─── DETAIL ───────────────────────────────────────────── */
#detail {
  position: fixed; inset: 0;
  background: rgba(10,4,0,0.88);
  -webkit-backdrop-filter: var(--blur-hvy); backdrop-filter: var(--blur-hvy);
  z-index: 100;
  display: none;
  overflow-y: auto; -webkit-overflow-scrolling: touch;
}
#detail.open {
  display: block;
  animation: detailIn .42s var(--spring) both;
}
#detail.closing {
  animation: detailOut .28s var(--ease-in) both;
}
#dhead {
  position: sticky; top: 0; z-index: 10;
  background: rgba(10,4,0,0.70);
  -webkit-backdrop-filter: blur(28px) saturate(220%); backdrop-filter: blur(28px) saturate(220%);
  display: flex; align-items: center; gap: 12px;
  padding: calc(var(--st) + 16px) 16px 14px;
  border-bottom: 1px solid var(--gl-bdr);
}
#dtitle { flex: 1; font-size: 17px; font-weight: 800; letter-spacing: -.4px;
  display: -webkit-box; -webkit-line-clamp: 1; -webkit-box-orient: vertical; overflow: hidden }
#dfav {
  background: none; border: none; font-size: 24px; cursor: pointer; padding: 4px;
  transition: transform .2s var(--spring);
}
#dfav:active { transform: scale(0.80); }
#dfav.beat { animation: heartBeat .5s var(--spring) both; }
#dimg {
  width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block;
  transition: filter .6s var(--ease-out), opacity .6s;
  filter: blur(16px) saturate(0.4);
  opacity: 0.5;
}
#dimg.loaded { filter: none; opacity: 1; }
#dbody { padding: 18px 16px 60px }
/* ── Light tema düzeltmesi (2026-07 kullanıcı bildirimi): tarif detayı/başlık/sheet
   sabit koyu arka planlıydı → açık temada koyu yazı koyu zeminde OKUNMUYORDU. Açık yapıldı. ── */
body[data-theme="light"] #detail { background: rgba(240,234,255,0.95) }
body[data-theme="light"] #dhead  { background: rgba(240,234,255,0.82); border-bottom-color: rgba(130,90,220,0.18) }
body[data-theme="light"] .sheet  { background: rgba(245,241,255,0.96); border-color: rgba(130,90,220,0.18) }
.dmeta { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px }
.dmeta-tag {
  background: var(--gl); border: 1px solid var(--gl-bdr);
  -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px);
  border-radius: 10px; padding: 5px 12px; font-size: 12.5px; font-weight: 500; color: var(--sub);
  transition: transform .18s var(--spring), background .18s;
}
.dmeta-tag:active { transform: scale(0.92); background: var(--gl-med); }
.dsec { font-size: 16px; font-weight: 800; margin-bottom: 12px; color: var(--acc2); letter-spacing: -.3px }
.ing-list { list-style: none; display: flex; flex-direction: column; gap: 8px; margin-bottom: 26px }
.ing-item {
  display: flex; align-items: center; gap: 10px;
  background: var(--gl); border: 1px solid var(--gl-bdr);
  -webkit-backdrop-filter: blur(14px); backdrop-filter: blur(14px);
  border-radius: 14px; padding: 12px 14px; cursor: pointer;
  transition: transform .2s var(--spring), background .2s;
  opacity: 0;
}
.ing-item.visible { animation: ingrIn .38s var(--ease-out) both; }
.ing-item.checked { background: rgba(255,113,51,0.12); border-color: rgba(255,113,51,0.28); }
.ing-item:active { transform: scale(0.96); background: var(--gl-med); }
.ing-item input[type=checkbox] { accent-color: var(--acc); width: 16px; height: 16px; flex-shrink: 0 }
.ing-name { font-size: 15px; font-weight: 500; flex: 1; line-height: 1.3 }
.ing-meas { font-size: 13px; color: var(--sub); flex-shrink: 0; font-weight: 500 }
.instr { font-size: 15px; color: rgba(255,255,255,0.83) }
.instr-step {
  display: flex; gap: 12px; align-items: flex-start;
  margin-bottom: 16px; line-height: 1.85; letter-spacing: .1px;
}
.instr-step:last-child { margin-bottom: 0 }
.step-num {
  flex-shrink: 0; width: 26px; height: 26px;
  background: linear-gradient(135deg, var(--acc) 0%, #e03800 100%);
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 800; color: #fff; margin-top: 2px;
  box-shadow: 0 3px 10px var(--acc-glow);
}
body[data-theme="light"] .instr-step { color: rgba(20,10,50,0.82) }
body[data-theme="light"] .step-num { box-shadow: 0 3px 10px rgba(255,113,51,0.28) }
.yt-btn {
  display: flex; align-items: center; justify-content: center; gap: 8px;
  background: linear-gradient(135deg, #ff2525 0%, #ff6b35 100%);
  border: none; border-radius: 18px; color: #fff;
  padding: 17px; font-size: 15px; font-weight: 700;
  cursor: pointer; width: 100%; margin-top: 22px;
  box-shadow: 0 6px 26px rgba(255,40,40,0.38);
  transition: transform .22s var(--spring), box-shadow .22s;
}
.yt-btn:active { transform: scale(0.95); box-shadow: 0 3px 14px rgba(255,40,40,0.30); }

/* ─── FLOATING TAB BAR — iOS 26 pill ──────────────────── */
#bnav {
  position: fixed;
  bottom: calc(var(--sb) + 14px);
  left: max(18px, var(--sl));
  right: max(18px, var(--sr));
  z-index: 50;
  background: var(--bnav-bg);
  -webkit-backdrop-filter: blur(36px) saturate(260%); backdrop-filter: blur(36px) saturate(260%);
  border: 1px solid rgba(255,255,255,0.17);
  border-radius: 30px;
  display: flex; padding: 8px 4px;
  box-shadow: 0 10px 36px rgba(0,0,0,0.48), 0 1px 0 rgba(255,255,255,0.10) inset;
}
.bni {
  flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px;
  padding: 8px 4px; cursor: pointer; color: var(--sub);
  background: none; border: none;
  border-radius: 24px; position: relative;
  transition: color .22s;
  -webkit-tap-highlight-color: transparent;
}
.bni.active { color: var(--acc) }
.bni.active::before {
  content: ''; position: absolute; inset: 0; border-radius: 24px;
  background: linear-gradient(135deg, rgba(255,113,51,0.20) 0%, rgba(255,80,20,0.08) 100%);
  border: 1px solid rgba(255,113,51,0.22);
  animation: pillSlide .28s var(--spring) both;
}
.bni-icon {
  font-size: 22px; line-height: 1; position: relative;
  transition: transform .25s var(--spring);
}
.bni.pop .bni-icon { animation: tabPop .38s var(--spring) both; }
.bni-label { font-size: 10.5px; font-weight: 700; letter-spacing: .05px; position: relative;
  transition: color .22s, opacity .22s; }
.bni:not(.active) .bni-label { opacity: 0.65; }

/* ─── SHEETS ───────────────────────────────────────────── */
.sheet-bg {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,0.55);
  -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);
  align-items: flex-end; display: none;
}
.sheet-bg.open {
  display: flex;
  animation: bgFadeIn .25s var(--ease-out) both;
}
.sheet-bg.closing {
  animation: bgFadeOut .2s var(--ease-in) both;
}
.sheet {
  width: 100%;
  background: rgba(16,7,0,0.90);
  -webkit-backdrop-filter: blur(36px) saturate(220%); backdrop-filter: blur(36px) saturate(220%);
  border: 1px solid rgba(255,255,255,0.16); border-bottom: none;
  border-radius: 28px 28px 0 0;
  padding: 0 0 calc(var(--sb) + 24px); max-height: 65vh; overflow-y: auto;
  animation: sheetUp .38s var(--spring) both;
}
.sheet-bg.closing .sheet { animation: sheetDown .22s var(--ease-in) both; }
.sheet-handle {
  width: 36px; height: 4px; background: var(--dim); border-radius: 2px;
  margin: 14px auto 12px;
  cursor: grab;
}
.sheet-title { text-align: center; font-size: 14px; font-weight: 600; color: var(--sub); margin-bottom: 6px }
.sitem {
  display: flex; align-items: center; gap: 14px; padding: 14px 20px;
  cursor: pointer; transition: background .12s, transform .18s var(--spring);
}
.sitem:active { background: var(--gl); transform: scale(0.98); }
.sitem.active { color: var(--acc) }
.scheck { color: var(--acc); font-size: 18px; margin-left: auto; opacity: 0; transition: opacity .2s, transform .2s var(--spring); }
.sitem.active .scheck { opacity: 1; transform: scale(1.1); }

/* ─── STATES ───────────────────────────────────────────── */
.spin-wrap { display: flex; align-items: center; justify-content: center; padding: 64px; gap: 10px; color: var(--sub) }
.spinner { width: 22px; height: 22px; border: 2.5px solid var(--dim); border-top-color: var(--acc); border-radius: 50%; animation: sp .7s linear infinite }
.empty { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 72px 20px; color: var(--sub); text-align: center; gap: 14px; animation: pageIn .38s var(--ease-out) both; }
.empty-icon { font-size: 52px; filter: drop-shadow(0 4px 14px rgba(255,100,0,.25)) }
.empty-text { font-size: 14px; line-height: 1.7; max-width: 220px }

/* ── RTL ── */
[dir=rtl] .sitem,[dir=rtl] .rcard-info{direction:rtl;text-align:right}
[dir=rtl] #bnav{flex-direction:row-reverse}
[dir=rtl] .hscroll{direction:rtl}

/* ── IAP / PREMIUM ── */
#shoplist-ov{position:fixed;inset:0;z-index:300;background:var(--bg-base);display:none;flex-direction:column}
#shoplist-ov.open{display:flex}
#shoplist-head{display:flex;align-items:center;gap:10px;padding:calc(var(--st) + 12px) 16px 12px;background:var(--nav-bg);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);border-bottom:1px solid var(--gl-bdr)}
#shoplist-title{flex:1;font-size:16px;font-weight:700;text-align:center}
#shop-items-wrap{flex:1;overflow-y:auto;padding:8px 16px}
.shop-item{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--dim);cursor:pointer;transition:opacity .2s}
.shop-item.done{opacity:0.45}
.shop-item.done .shop-item-name{text-decoration:line-through}
.shop-cb{width:22px;height:22px;border-radius:50%;border:2.5px solid var(--gl-bdr);background:transparent;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;transition:all .2s var(--spring);flex-shrink:0}
.shop-item.done .shop-cb{background:var(--acc);border-color:var(--acc)}
.shop-item-info{flex:1}
.shop-item-name{font-size:14px;color:var(--txt);transition:color .2s}
.shop-item-meas{font-size:12px;color:var(--sub);margin-top:2px}
.shop-del{background:none;border:none;color:var(--sub);font-size:16px;cursor:pointer;padding:6px;flex-shrink:0}
.shop-del:active{color:#ff4444}
.shop-add-btn{background:none;border:1.5px solid var(--acc);border-radius:16px;padding:4px 8px;font-size:12px;font-weight:700;color:var(--acc);cursor:pointer;margin-left:auto;flex-shrink:0;transition:all .15s var(--spring)}
.shop-add-btn.added{background:var(--acc);color:#fff;border-color:transparent}
.shop-add-btn:active{transform:scale(0.9)}
.prem-product{padding:18px 20px}
.prem-product+.prem-product{border-top:1px solid var(--dim)}
.prem-product-name{font-size:16px;font-weight:700;color:var(--txt)}
.prem-product-desc{font-size:12px;color:var(--sub);margin-top:4px;line-height:1.5}
.prem-product-foot{display:flex;align-items:center;justify-content:space-between;margin-top:12px}
.prem-product-price{font-size:20px;font-weight:800;color:var(--acc)}
.prem-buy-btn{background:linear-gradient(135deg,var(--acc),var(--acc2));border:none;border-radius:22px;padding:10px 24px;font-size:14px;font-weight:700;color:#fff;cursor:pointer;transition:transform .18s var(--spring)}
.prem-buy-btn:active{transform:scale(0.94)}
.prem-buy-btn[disabled]{background:rgba(255,255,255,0.12);color:var(--sub);cursor:default}
.restore-row{padding:14px 20px;text-align:center}
.restore-link{background:none;border:none;color:var(--sub);font-size:12px;cursor:pointer;text-decoration:underline}
.restore-btn-main{display:block;width:100%;background:rgba(255,255,255,0.10);border:1.5px solid var(--acc);border-radius:16px;padding:13px 18px;color:var(--acc);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .18s}
.restore-btn-main:active{opacity:.6}

/* ─── PREMIUM ÖZELLİKLER ─────────────────────────────── */
.prem-best{position:relative;border:1.5px solid var(--acc);border-radius:18px;margin:6px 12px;background:linear-gradient(135deg,rgba(255,255,255,0.06),rgba(255,255,255,0.02))}
.prem-best+.prem-product{border-top:none}
.prem-badge{position:absolute;top:-10px;left:20px;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff;font-size:10px;font-weight:800;letter-spacing:.5px;padding:3px 10px;border-radius:10px}
/* Porsiyon */
.portion-row{display:flex;gap:8px;flex-wrap:wrap;margin:0 0 12px}
.portion-opt{background:var(--gl-med,rgba(255,255,255,0.08));border:1.5px solid var(--gl-bdr);border-radius:14px;padding:7px 14px;font-size:14px;font-weight:700;color:var(--txt);cursor:pointer;transition:all .15s var(--spring)}
.portion-opt.active{background:var(--acc);border-color:transparent;color:#fff}
.portion-opt:active{transform:scale(.92)}
.portion-locked{width:100%;text-align:left;background:rgba(255,255,255,0.06);border:1.5px dashed var(--gl-bdr);border-radius:14px;padding:11px 14px;font-size:13px;font-weight:600;color:var(--sub);cursor:pointer}
/* Detay özellik butonları */
.feat-btn-row{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap}
.feat-btn{flex:1;min-width:140px;background:rgba(255,255,255,0.08);border:1.5px solid var(--acc);border-radius:16px;padding:13px;font-size:14px;font-weight:700;color:var(--acc);cursor:pointer;font-family:inherit;transition:transform .15s var(--spring)}
.feat-btn:active{transform:scale(.96)}
/* Pişirme Modu */
#cook-ov{position:fixed;inset:0;z-index:400;background:var(--bg-base);display:none;flex-direction:column}
#cook-ov.open{display:flex}
#cook-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:calc(var(--st) + 12px) 16px 12px;background:var(--nav-bg);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);border-bottom:1px solid var(--gl-bdr);font-weight:700}
#cook-body{flex:1;overflow-y:auto;padding:28px 24px;display:flex;flex-direction:column}
.cook-prog{font-size:14px;font-weight:700;color:var(--sub);text-align:center}
.cook-bar{height:6px;border-radius:6px;background:var(--dim);margin:12px 0 28px;overflow:hidden}
.cook-bar-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:6px;transition:width .3s var(--spring)}
.cook-step-text{font-size:23px;line-height:1.55;color:var(--txt);font-weight:600;flex:1}
#cook-timer-wrap{margin-top:24px;text-align:center}
.cook-timer-btn{background:rgba(255,255,255,0.10);border:1.5px solid var(--acc);border-radius:18px;padding:14px 22px;font-size:16px;font-weight:700;color:var(--acc);cursor:pointer;font-family:inherit}
.cook-timer-btn.cancel{border-color:var(--sub);color:var(--sub);margin-top:12px;display:inline-block}
.cook-countdown{font-size:54px;font-weight:800;color:var(--acc);font-variant-numeric:tabular-nums}
.cook-countdown.done{font-size:30px;color:#ff7043}
#cook-nav{display:flex;gap:12px;padding:14px 20px calc(var(--st) + 16px);background:var(--nav-bg);border-top:1px solid var(--gl-bdr)}
.cook-nav-btn{background:rgba(255,255,255,0.10);border:none;border-radius:20px;padding:16px;font-size:18px;font-weight:800;color:var(--txt);cursor:pointer;flex:0 0 70px}
.cook-nav-btn.primary{flex:1;background:linear-gradient(135deg,var(--acc),var(--acc2));color:#fff}
.cook-nav-btn[disabled]{opacity:.35}
.cook-nav-btn:active{transform:scale(.96)}
/* Menü Planı */
#plan-ov{position:fixed;inset:0;z-index:300;background:var(--bg-base);display:none;flex-direction:column}
#plan-ov.open{display:flex}
#plan-ov-title{flex:1;font-size:16px;font-weight:700;text-align:center}
#plan-body{flex:1;overflow-y:auto;padding:12px 16px}
.plan-day{margin-bottom:18px}
.plan-day-h{font-size:15px;font-weight:800;color:var(--acc);margin-bottom:8px}
.plan-item{display:flex;align-items:center;gap:12px;padding:8px;border-radius:14px;background:rgba(255,255,255,0.05);margin-bottom:8px;cursor:pointer}
.plan-item img{width:46px;height:46px;border-radius:10px;object-fit:cover;flex-shrink:0}
.plan-item span{flex:1;font-size:14px;color:var(--txt)}
.plan-del{background:none;border:none;color:var(--sub);font-size:15px;cursor:pointer;padding:6px}
.plan-empty{font-size:13px;color:var(--sub);padding:6px 2px}
.plan-entry{display:block;width:100%;background:rgba(255,255,255,0.07);border:1.5px solid var(--acc);border-radius:16px;padding:14px;color:var(--acc);font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:14px}
.plan-day-pick{display:flex;align-items:center;justify-content:space-between;width:100%;background:rgba(255,255,255,0.05);border:none;border-radius:14px;padding:14px 16px;font-size:15px;font-weight:600;color:var(--txt);cursor:pointer;margin-bottom:8px;font-family:inherit}
.plan-day-count{background:var(--acc);color:#fff;font-size:12px;font-weight:800;min-width:22px;height:22px;border-radius:11px;display:inline-flex;align-items:center;justify-content:center;padding:0 6px}
.plan-view-link{width:100%;background:none;border:none;color:var(--acc);font-size:14px;font-weight:700;padding:12px;cursor:pointer;font-family:inherit;margin-top:4px}
/* Toast */
#toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%) translateY(20px);background:rgba(20,20,25,0.95);color:#fff;padding:12px 22px;border-radius:22px;font-size:14px;font-weight:600;z-index:500;opacity:0;pointer-events:none;transition:all .25s var(--spring);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px)}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ─── AUTH SHEET ───────────────────────────────────────── */
#profile-btn.signed-in { color: #4ade80 }
.auth-login { padding: 20px 20px 8px }
.auth-login-title { font-size: 22px; font-weight: 800; color: var(--txt); text-align: center; margin-bottom: 6px }
.auth-login-sub { font-size: 13px; color: var(--sub); text-align: center; margin-bottom: 24px; line-height: 1.5 }
.auth-btn {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%; padding: 16px; border-radius: 22px;
  border: 1.5px solid var(--gl-bdr); font-size: 15px; font-weight: 700;
  cursor: pointer; margin-bottom: 12px; font-family: inherit;
  transition: transform .18s var(--spring), background .18s;
}
.auth-btn:active { transform: scale(0.95) }
.auth-btn-apple { background: #fff; color: #000; border-color: transparent }
.auth-btn-google { background: var(--gl); color: var(--txt) }
.auth-btn-icon { flex-shrink: 0 }
.auth-user { display: flex; flex-direction: column; align-items: center; padding: 24px 20px 12px }
.auth-avatar { width: 72px; height: 72px; border-radius: 50%; object-fit: cover; margin-bottom: 14px; border: 2px solid var(--gl-bdr) }
.auth-avatar-ph { width: 72px; height: 72px; border-radius: 50%; background: var(--acc); display: flex; align-items: center; justify-content: center; font-size: 30px; margin-bottom: 14px }

// ===== TYPOGRAPHY HELPERS =====
function capFirst(s) {
  if (!s) return s;
  return s.charAt(0).toUpperCase() + s.slice(1);
}

function ensurePunct(s) {
  if (!s) return s;
  return /[.!?。！？…]$/.test(s.trim()) ? s.trim() : s.trim() + '.';
}

function formatInstructions(text) {
  if (!text) return '';
  text = text.replace(/\r\n/g, '\n').replace(/\r/g, '\n').trim();

  // Split into steps: numbered (1. 2. STEP 1:), blank-line paragraphs, or sentence breaks
  let steps = [];

  // Already numbered: "1." "1)" "Step 1:" "STEP 1:"
  const numberedRe = /^(?:\d+[.):\s]|step\s*\d+[:.\s])/i;
  const byNumber = text.split(/\n(?=\s*(?:\d+[.):\s]|step\s*\d+[:.\s]))/i)
    .map(s => s.replace(/^\s*(?:\d+[.):\s]+|step\s*\d+[:.\s]+)/i, '').replace(/\n/g, ' ').trim())
    .filter(s => s.length > 2);

  if (byNumber.length >= 2 && numberedRe.test(text)) {
    steps = byNumber;
  } else {
    // Split by double newlines first
    const byPara = text.split(/\n{2,}/).map(p => p.replace(/\n/g, ' ').trim()).filter(p => p.length > 2);
    if (byPara.length >= 2) {
      steps = byPara;
    } else {
      // Split by single newlines
      const byLine = text.split(/\n/).map(s => s.trim()).filter(s => s.length > 2);
      if (byLine.length >= 2) {
        steps = byLine;
      } else {
        // Split long single block by ". " followed by capital letter
        const parts = [];
        let cur = '';
        for (let i = 0; i < text.length; i++) {
          cur += text[i];
          if ((text[i] === '.' || text[i] === '!') && i + 2 < text.length && text[i+1] === ' ' && text[i+2] === text[i+2].toUpperCase() && text[i+2].trim()) {
            parts.push(cur.trim()); cur = '';
          }
        }
        if (cur.trim()) parts.push(cur.trim());
        steps = parts.length >= 2 ? parts : [text];
      }
    }
  }

  return steps.map((s, i) => {
    const clean = ensurePunct(capFirst(s));
    return `<p class="instr-step"><span class="step-num">${i + 1}</span><span>${clean}</span></p>`;
  }).join('');
}

// ===== TRANSLATION ENGINE =====
const XLANG={en:'en',tr:'tr',es:'es',zh:'zh-CN',ru:'ru',de:'de',fr:'fr',it:'it',pt:'pt-BR',ja:'ja',ko:'ko',ar:'ar',hi:'hi',nl:'nl',pl:'pl',sv:'sv'};
function _xhash(s){let h=5381;for(let i=0;i<s.length;i++)h=((h<<5)+h)^s.charCodeAt(i);return(h>>>0).toString(36)}
function _xkey(t,l){return'xl3_'+l+'_'+_xhash(t.substring(0,120))}
async function xlate(text,toLang){
  if(!text||!text.trim()||toLang==='en')return text;
  const key=_xkey(text,toLang);
  const hit=localStorage.getItem(key);
  if(hit)return hit;
  try{
    const lc=XLANG[toLang]||toLang;
    const chunks=[];
    if(text.length>450){
      const sents=text.match(/[^.!?\n]+[.!?\n]*/g)||[text];
      let buf='';
      for(const s of sents){if(buf.length+s.length>420){chunks.push(buf.trim());buf=s;}else buf+=s;}
      if(buf.trim())chunks.push(buf.trim());
    }else chunks.push(text);
    const parts=await Promise.all(chunks.map(async ch=>{
      // Google bedava çeviri ucu — anahtarsız, MyMemory'den kat kat doğru (yemek isimleri için)
      const r=await fetch('https://translate.googleapis.com/translate_a/single?client=gtx&sl=en&tl='+lc+'&dt=t&q='+encodeURIComponent(ch));
      const d=await r.json();
      return (Array.isArray(d)&&Array.isArray(d[0]))?d[0].map(seg=>(seg&&seg[0])||'').join(''):ch;
    }));
    const result=parts.join(' ');
    localStorage.setItem(key,result);
    return result;
  }catch(e){return text}
}
async function xlateList(texts,toLang){
  if(toLang==='en')return texts;
  return Promise.all(texts.map(t=>xlate(t,toLang)));
}
async function xlateRecipeNames(meals){
  if(lang==='en')return meals;
  const names=await xlateList(meals.map(m=>m.name),lang);
  return meals.map((m,i)=>({...m,name:names[i]}));
}

var _detailIngs=[], _portionMult=1;
const _UNI_FRAC={'½':0.5,'¼':0.25,'¾':0.75,'⅓':1/3,'⅔':2/3,'⅛':0.125,'⅜':0.375,'⅝':0.625,'⅞':0.875,'⅙':1/6,'⅚':5/6,'⅕':0.2,'⅖':0.4,'⅗':0.6,'⅘':0.8};
function _parseQty(s){
  s=s.trim();
  let m=s.match(/^(\d+)\s*([½¼¾⅓⅔⅛⅜⅝⅞⅙⅚⅕⅖⅗⅘])/);
  if(m)return{val:parseInt(m[1])+_UNI_FRAC[m[2]],rest:s.slice(m[0].length)};
  m=s.match(/^([½¼¾⅓⅔⅛⅜⅝⅞⅙⅚⅕⅖⅗⅘])/);
  if(m)return{val:_UNI_FRAC[m[1]],rest:s.slice(m[0].length)};
  m=s.match(/^(\d+)\s+(\d+)\/(\d+)/);
  if(m)return{val:parseInt(m[1])+parseInt(m[2])/parseInt(m[3]),rest:s.slice(m[0].length)};
  m=s.match(/^(\d+)\/(\d+)/);
  if(m)return{val:parseInt(m[1])/parseInt(m[2]),rest:s.slice(m[0].length)};
  m=s.match(/^(\d+(?:[.,]\d+)?)/);
  if(m)return{val:parseFloat(m[1].replace(',','.')),rest:s.slice(m[0].length)};
  return null;
}
function _fmtQty(v){
  if(!isFinite(v))return'';
  const whole=Math.floor(v+1e-9), frac=v-whole;
  const map=[[0,''],[0.125,'⅛'],[0.25,'¼'],[1/3,'⅓'],[0.5,'½'],[2/3,'⅔'],[0.75,'¾'],[0.875,'⅞']];
  let bestSym='',bd=1;
  for(const[f,sym] of map){const d=Math.abs(frac-f);if(d<bd){bd=d;bestSym=sym;}}
  if(bd<0.05)return bestSym===''?String(whole):(whole?whole+' ':'')+bestSym;
  return String(Math.round(v*100)/100);
}
function scaleMeasure(meas,mult){
  if(!meas||mult===1)return meas||'';
  const p=_parseQty(meas); if(!p)return meas;
  return _fmtQty(p.val*mult)+p.rest;
}
function portionRowHTML(){
  const TRd=lang==='tr';
  if(!hasFeature('portions'))
    return `<button class="portion-locked" onclick="openSheet('premium')">🔒 ${TRd?'Porsiyon Ayarlayıcı — malzemeleri kişiye göre ölçekle':'Portion Scaler — scale by servings'}</button>`;
  return [0.5,1,2,3,4].map(m=>`<button class="portion-opt${m===_portionMult?' active':''}" onclick="setPortion(${m})">${m===0.5?'½×':m+'×'}</button>`).join('');
}
function renderIngList(){

    </li>`;}).join('');

var _cookSteps=[],_cookIdx=0,_cookTimer=null,_cookRemain=0;
function openCookMode(){
  if(!hasFeature('cookmode')){openSheet('premium');return;}
  _cookSteps=[...document.querySelectorAll('#dbody .instr .instr-step')].map(p=>{
    const sp=p.querySelectorAll('span'); return((sp[1]||sp[0])?.textContent||'').trim();
  }).filter(Boolean);
  if(!_cookSteps.length){alert(lang==='tr'?'Bu tarifte adım bulunamadı.':'No steps found.');return;}
  _cookIdx=0;
  document.getElementById('cook-head-title').textContent=lang==='tr'?'Pişirme Modu':'Cooking Mode';
  document.getElementById('cook-ov').classList.add('open');
  renderCookStep();
}
function closeCookMode(){_stopTimer();document.getElementById('cook-ov').classList.remove('open');}
function _detectMins(txt){
  let m=txt.match(/(\d+)\s*(hours?|hrs?|saat)/i); if(m)return parseInt(m[1])*60;
  m=txt.match(/(\d+)\s*(minutes?|mins?|dakika|dk)\b/i); if(m)return parseInt(m[1]);
  return 0;
}
function renderCookStep(){
  const TRd=lang==='tr', total=_cookSteps.length, txt=_cookSteps[_cookIdx], mins=_detectMins(txt);
  document.getElementById('cook-body').innerHTML=`
    <div class="cook-prog">${TRd?'Adım':'Step'} ${_cookIdx+1} / ${total}</div>
    <div class="cook-bar"><div class="cook-bar-fill" style="width:${(_cookIdx+1)/total*100}%"></div></div>
    <div class="cook-step-text">${txt}</div>
    <div id="cook-timer-wrap">${mins?`<button class="cook-timer-btn" onclick="startStepTimer(${mins})">⏱️ ${mins} ${TRd?'dk — zamanlayıcı':'min — timer'}</button>`:''}</div>`;
  document.getElementById('cook-prev').disabled=_cookIdx===0;
  document.getElementById('cook-next').textContent=_cookIdx===total-1?(TRd?'Bitir ✓':'Finish ✓'):(TRd?'Sonraki →':'Next →');
}
function cookNav(d){
  _stopTimer();
  if(d>0&&_cookIdx===_cookSteps.length-1){closeCookMode();return;}
  _cookIdx=Math.max(0,Math.min(_cookSteps.length-1,_cookIdx+d));
  renderCookStep();
}
function startStepTimer(mins){_stopTimer();_cookRemain=mins*60;_tickTimer();_cookTimer=setInterval(_tickTimer,1000);}
function _tickTimer(){
  const w=document.getElementById('cook-timer-wrap'); if(!w)return;
  if(_cookRemain<=0){
    _stopTimer();
    try{navigator.vibrate&&navigator.vibrate([400,150,400,150,400]);}catch(e){}
    try{const{Haptics}=window.Capacitor?.Plugins||{};Haptics&&Haptics.vibrate();}catch(e){}
    w.innerHTML=`<div class="cook-countdown done">⏰ ${lang==='tr'?'Süre doldu!':"Time's up!"}</div>`;
    return;
  }
  const mm=Math.floor(_cookRemain/60), ss=_cookRemain%60;
  w.innerHTML=`<div class="cook-countdown">${mm}:${String(ss).padStart(2,'0')}</div><button class="cook-timer-btn cancel" onclick="_stopTimer();renderCookStep()">${lang==='tr'?'Durdur':'Stop'}</button>`;
  _cookRemain--;
}
function _stopTimer(){if(_cookTimer){clearInterval(_cookTimer);_cookTimer=null;}}

const PB_BASE = 'https://realvirtuality.app/tarifler-auth';
const PB_COLLECTION = 'user_favs';
const SYNC_BASE = 'https://realvirtuality.app/tarifler-sync'; // güvenli doğrulama servisi
const APPLE_BUNDLE = 'com.nickdegs.tarifler';

let authUser = null; // { uid, provider, email, name, photo, syncSession }

function _esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Apple token doğrulama (Apple public keys ile JWT verify) ─────────────
async function _verifyAppleToken(identityToken) {
  try {
    const parts = identityToken.split('.');
    const payload = JSON.parse(atob(parts[1].replace(/-/g,'+').replace(/_/g,'/')));
    if (payload.iss !== 'https://appleid.apple.com') return null;
    if (payload.aud !== APPLE_BUNDLE) return null;
    if (payload.exp < Date.now() / 1000) return null;
    return {
      uid: 'apple_' + payload.sub,
      provider: 'apple',
      email: payload.email || '',
      appleId: payload.sub
    };
  } catch(e) { return null; }
}

// ─── Google token doğrulama (Google tokeninfo endpoint) ──────────────────
async function _verifyGoogleToken(idToken) {
  try {
    const r = await fetch(`https://oauth2.googleapis.com/tokeninfo?id_token=${idToken}`);
    const d = await r.json();
    if (d.error) return null;
    const VALID_AUDS = [
      '442086254689-isbdks63cqksfe355g2q2q18eegqdtt4.apps.googleusercontent.com',
      '442086254689-rr7dl320im2cg0g43u44r74atfo11tbe.apps.googleusercontent.com'
    ];
    if (d.aud && !VALID_AUDS.includes(d.aud)) return null;
    if (d.iss && d.iss !== 'https://accounts.google.com' && d.iss !== 'accounts.google.com') return null;
    return {
      uid: 'google_' + d.sub,
      provider: 'google',
      email: d.email || '',
      name: d.name || '',
      photo: d.picture || '',
      googleSub: d.sub
    };
  } catch(e) { return null; }
}

// ─── Bulut kimlik doğrulama (server-side token verify) ───────────────────
// Sağlayıcı token'ını (Apple/Google idToken veya PB email token) güvenli
// servise gönderir; servis doğrular, uid türetir, oturum (session) döndürür.
async function _cloudAuth(provider, token) {
  try {
    const r = await fetch(`${SYNC_BASE}/auth`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ provider, token })
    });
    if (!r.ok) { console.warn('cloudAuth', r.status); return null; }
    return await r.json(); // { session, uid, favs, profile }
  } catch(e) { console.warn('cloudAuth:', e); return null; }
}

// ─── Cloud favorileri merge et ────────────────────────────────────────────
function _mergeFavs(cloudFavs) {
  let changed = false;
  Object.entries(cloudFavs || {}).forEach(([id, fav]) => {
    if (!favs[id] || (fav.ts || 0) > (favs[id].ts || 0)) {
      favs[id] = fav; changed = true;
    }
  });
  if (changed) {
    localStorage.setItem('favs2', JSON.stringify(favs));
    if (view === 'fav') showFavs();
  }
}

// ─── Giriş tamamlama ─────────────────────────────────────────────────────
// İmzasız payload çözücü — YALNIZCA lokal kimlik/görüntü için (sub/email).
// Güvenlik: bulut YAZMA hâlâ sunucu-doğrulamalı session gerektirir.
function _decodeJwt(t) {
  try { const p = t.split('.')[1]; return JSON.parse(atob(p.replace(/-/g,'+').replace(/_/g,'/'))); }
  catch(e) { return {}; }
}

async function _completeSignIn(provider, token, displayName, photoUrl) {
  // 1) GİRİŞ her durumda başarılı — yalnızca native sağlayıcıya dayanır, buluta DEĞİL.
  const p = _decodeJwt(token);
  authUser = {
    uid: provider + ':' + (p.sub || p.user || ('local_' + Date.now())),
    provider,
    email: p.email || '',
    name: displayName || p.name || p.email || 'Kullanıcı',
    photo: photoUrl || p.picture || '',
    syncSession: null
  };
  localStorage.setItem('auth_user', JSON.stringify(authUser));
  updateProfileBtn();
  closeSheet('auth');
  // 2) Bulut favori senkronu — arka planda, best-effort. Giriş ASLA buna bağlı değil.
  _cloudAuth(provider, token).then(res => {
    if (res && res.session) {
      authUser.syncSession = res.session;
      if (!authUser.email && res.profile?.email) authUser.email = res.profile.email;
      localStorage.setItem('auth_user', JSON.stringify(authUser));
      _mergeFavs(res.favs);
    }
  }).catch(() => {});
  return true;
}

// ─── Apple Sign-In ────────────────────────────────────────────────────────
async function signInApple() {
  const plugin = window.Capacitor?.Plugins?.SignInWithApple;
  if (!plugin) {
    alert('Apple ile giriş sadece iOS cihazda desteklenir.');
    return;
  }
  try {
    const result = await plugin.authorize();
    const cred = result.response || result;
    const identityToken = cred.identityToken || cred.authorization?.id_token || '';
    if (!identityToken) { console.warn('Apple identityToken yok'); return; }
    const name = [cred.fullName?.givenName, cred.fullName?.familyName].filter(Boolean).join(' ') || '';
    await _completeSignIn('apple', identityToken, name, '');
  } catch(e) {
    if (e.code !== '1001') console.warn('Apple sign-in:', e);
  }
}

// ─── Google Sign-In ───────────────────────────────────────────────────────
async function signInGoogle() {
  const plugin = window.Capacitor?.Plugins?.GoogleAuth;
  if (!plugin) {
    alert('Google ile giriş sadece iOS/Android cihazda desteklenir.');
    return;
  }
  try {
    const result = await plugin.signIn();
    const idToken = result.authentication?.idToken || '';
    if (!idToken) { console.warn('Google idToken yok'); return; }
    await _completeSignIn(
      'google', idToken,
      result.displayName || result.name || '',
      result.imageUrl || result.photo || ''
    );
  } catch(e) {
    if (e.code !== 12501) console.warn('Google sign-in:', e);
  }
}

// ===== PLAY INTEGRITY (Android korsan/crack koruması) =====
// SADECE Android. iOS/web → hiç dokunmaz. Backend: realvirtuality.app/integrity
// enforce SUNUCUDAN gelir (strict.sh on/off) → build almadan rapor↔engelleme.
const INTEGRITY_BASE='https://realvirtuality.app/integrity';
function _isAndroid(){ try{return window.Capacitor?.getPlatform?.()==='android';}catch(e){return false;} }
function _nowSec(){ return Math.floor(Date.now()/1000); }
function _graceValid(){ try{const g=JSON.parse(localStorage.getItem('ta_grace')||'null'); return !!(g&&g.exp&&g.exp>_nowSec());}catch(e){return false;} }
async function _integrityVerify(canBlockOnError){
  const{PlayIntegrity}=window.Capacitor?.Plugins||{};
  if(!PlayIntegrity) return;                 // plugin yok → fail-open
  try{
    const nr=await fetch(INTEGRITY_BASE+'/nonce',{method:'POST'});
    const nonce=(await nr.json()).nonce;
    const{token}=await PlayIntegrity.requestIntegrityToken({nonce,googleCloudProjectNumber:0});
    const vr=await fetch(INTEGRITY_BASE+'/verify',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token})});
    const res=await vr.json();
    localStorage.setItem('ta_enf',res.enforce?'1':'0');
    if(res.allow){
      localStorage.setItem('ta_grace',JSON.stringify({exp:_nowSec()+(res.ttl||604800)}));
      localStorage.removeItem('ta_block');
      const ov=document.getElementById('ta-block-ov'); if(ov) ov.remove();
    }else if(res.enforce){                   // korsan/crack verdict + engelleme açık
      localStorage.setItem('ta_block','1'); localStorage.removeItem('ta_grace'); _showIntegrityBlock();
    }
  }catch(e){                                 // ağ/plugin hatası
    if(canBlockOnError && !_graceValid() && localStorage.getItem('ta_enf')==='1') _showIntegrityBlock(true);
  }
}
function initIntegrity(){
  try{
    if(!_isAndroid()) return;                 // iOS / web → dokunma
    if(localStorage.getItem('ta_block')==='1' && !_graceValid()){ _showIntegrityBlock(); _integrityVerify(false); return; }
    if(_graceValid()){ _integrityVerify(false); return; }   // offline izin + arka planda tazele
    _integrityVerify(true);
  }catch(e){}
}
function _showIntegrityBlock(offline){
  if(document.getElementById('ta-block-ov')) return;
  const ov=document.createElement('div'); ov.id='ta-block-ov';
  ov.style.cssText='position:fixed;inset:0;z-index:2147483647;background:#0d0906;color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px;font-family:system-ui,sans-serif';

            :'<button id="ta-block-store" style="margin-top:24px;padding:12px 28px;border:0;border-radius:14px;background:#e23744;color:#fff;font-size:16px;font-weight:700">Google Play’den indir</button>');
  document.body.appendChild(ov);

async function initAdMob(){
  // ATT prompt'u app AKTİF değilken (launch/splash) çağrılırsa iOS sessizce yutar →
  // yeterince bekle ki uygulama foreground-active olsun (Guideline 2.1 fix)
  await new Promise(r=>setTimeout(r,1500));
  try{
    if(!window.Capacitor||!window.Capacitor.isNativePlatform())return;
    const{AdMob}=window.Capacitor.Plugins;
    if(!AdMob)return;
    // ATT iznini AÇIKÇA iste — reklam/izleme verisi toplanMADAN önce, app aktifken.
    // App Privacy'de "tracking" beyanı zaten var → prompt + beyan tutarlı.
    try{
      const s=await AdMob.trackingAuthorizationStatus();
      if(!s || s.status==='notDetermined'){ await AdMob.requestTrackingAuthorization(); }
    }catch(e){ try{ await AdMob.requestTrackingAuthorization(); }catch(_){} }
    await AdMob.initialize({initializeForTesting:false});
    // UMP Consent (GDPR/EEA)
    try{
      const ci=await AdMob.requestConsentInfo({});
      if(ci&&(ci.status==='REQUIRED'||ci.status==='UNKNOWN')){
        await AdMob.showConsentForm();
      }
    }catch(e){}
    if(!isNoAds()){
      await AdMob.showBanner({
        adId:bannerAdId(),
        adSize:'BANNER',
        position:'BOTTOM_CENTER',
        isTesting:false
      });
      window._adBannerShown=true;
    }
  }catch(e){console.warn('AdMob init:',e);}
}

// ===== iOS 26 SMOOTH ANIMATION ENGINE =====

// ── Ripple press effect on a card/button ──────────────────────────────────
function addRipple(el) {
  if (el._rippleInit) return;
  el._rippleInit = true;
  el.style.overflow = 'hidden';
  el.style.position = 'relative';
  el.addEventListener('pointerdown', (e) => {
    const rect = el.getBoundingClientRect();
    const r = document.createElement('span');
    r.className = 'ripple';
    const size = Math.max(rect.width, rect.height) * 1.2;
    r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
    el.appendChild(r);
    r.addEventListener('animationend', () => r.remove(), { once: true });
  }, { passive: true });
}

function attachRipples() {
  document.querySelectorAll('.rcard, .cat-card, .cuis-card, .feat').forEach(addRipple);
}

// ── IntersectionObserver — cards animate as they scroll into view ─────────
let _cardObs = null;
function getCardObserver() {
  if (_cardObs) return _cardObs;
  _cardObs = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      entry.target.classList.add('visible');
      _cardObs.unobserve(entry.target);
    });
  }, { threshold: 0.08, rootMargin: '0px 0px -30px 0px' });
  return _cardObs;
}

function staggerCardsIO() {
  const obs = getCardObserver();
  requestAnimationFrame(() => {
    const cards = document.querySelectorAll('#content .rcard, #content .cat-card, #content .cuis-card, #content .feat');
    cards.forEach((el, i) => {
      el.style.animationDelay = (i * 42) + 'ms';
      obs.observe(el);
    });
    setTimeout(attachRipples, 80);
  });
}

// ── IntersectionObserver — step instructions animate in on scroll ─────────
let _stepObs = null;
function observeInstrSteps() {
  if (_stepObs) _stepObs.disconnect();
  _stepObs = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      entry.target.classList.add('in');
      _stepObs.unobserve(entry.target);
    });
  }, { threshold: 0.12 });
  requestAnimationFrame(() => {
    document.querySelectorAll('#dbody .instr-step').forEach((el, i) => {
      el.style.opacity = '0';
      el.style.transform = 'translateX(-16px)';
      el.style.transitionDelay = (i * 65) + 'ms';
      _stepObs.observe(el);
    });
  });
}

// ── Scroll-linked nav compression ─────────────────────────────────────────
function initNavScroll() {
  const content = document.getElementById('content');
  const nav = document.getElementById('nav');
  if (!content || !nav) return;
  let raf = false;
  content.addEventListener('scroll', () => {
    if (raf) return;
    raf = true;
    requestAnimationFrame(() => {
      nav.classList.toggle('compact', content.scrollTop > 52);
      raf = false;
    });
  }, { passive: true });
}

// ── Detail image parallax on scroll ──────────────────────────────────────
function initDetailParallax() {
  const detail = document.getElementById('detail');
  const dimg = document.getElementById('dimg');
  if (!detail || !dimg) return;
  let raf = false;
  detail.addEventListener('scroll', () => {
    if (raf) return;
    raf = true;
    requestAnimationFrame(() => {
      const y = detail.scrollTop;
      const pull = Math.min(y * 0.30, 80);
      dimg.style.transform = pull > 0 ? `translateY(${pull}px) scale(${1 + y * 0.00008})` : '';
      raf = false;
    });
  }, { passive: true });
}

// ── Swipe-down to dismiss detail ─────────────────────────────────────────
function initSwipeDismiss() {
  const detail = document.getElementById('detail');
  if (!detail) return;
  let sy = 0, sScroll = 0;
  detail.addEventListener('touchstart', (e) => {
    sy = e.touches[0].clientY;
    sScroll = detail.scrollTop;
  }, { passive: true });
  detail.addEventListener('touchmove', (e) => {
    if (sScroll > 4) return;
    const dy = e.touches[0].clientY - sy;
    if (dy > 0) {
      const pull = Math.min(dy * 0.42, 140);
      detail.style.transform = `translateY(${pull}px)`;
      detail.style.transition = 'none';
    }
  }, { passive: true });
  detail.addEventListener('touchend', (e) => {
    const dy = e.changedTouches[0].clientY - sy;
    detail.style.transition = 'transform .36s var(--spring)';
    if (sScroll <= 4 && dy > 90) {
      detail.style.transform = 'translateY(105%)';
      setTimeout(() => {
        detail.style.transform = '';
        detail.style.transition = '';
        closeDetail();
      }, 340);
    } else {
      detail.style.transform = '';
    }
  }, { passive: true });
}

// ── Spring-scale on bni tab tap ───────────────────────────────────────────
function initTabSpring() {
  document.querySelectorAll('.bni').forEach(btn => {
    btn.addEventListener('pointerdown', () => {
      btn.style.transition = 'transform .12s var(--spring)';
      btn.style.transform = 'scale(0.88)';
    }, { passive: true });
    btn.addEventListener('pointerup', () => {
      btn.style.transform = '';
    }, { passive: true });
    btn.addEventListener('pointercancel', () => {
      btn.style.transform = '';
    }, { passive: true });
  });
}

// ── Sheet drag-to-dismiss ─────────────────────────────────────────────────
function initSheetDrag(sheetBgId) {
  const bg = document.getElementById(sheetBgId);
  if (!bg) return;
  const sheet = bg.querySelector('.sheet');
  if (!sheet) return;
  let sy = 0;
  sheet.addEventListener('touchstart', (e) => {
    sy = e.touches[0].clientY;
  }, { passive: true });
  sheet.addEventListener('touchmove', (e) => {
    const dy = e.touches[0].clientY - sy;
    if (dy > 0) {
      sheet.style.transform = `translateY(${Math.min(dy * 0.5, 120)}px)`;
      sheet.style.transition = 'none';
    }
  }, { passive: true });
  sheet.addEventListener('touchend', (e) => {
    const dy = e.changedTouches[0].clientY - sy;
    sheet.style.transition = 'transform .32s var(--spring)';
    sheet.style.transform = '';
    if (dy > 70) {
      const id = sheetBgId.replace('sheet-', '');
      closeSheet(id);
    }
  }, { passive: true });
}

// ── Master iOS 26 init ────────────────────────────────────────────────────
function initiOS26() {
  initDetailParallax();
  initSwipeDismiss();
  initNavScroll();
  initTabSpring();
  ['sheet-lang', 'sheet-mode', 'sheet-premium'].forEach(initSheetDrag);
}
