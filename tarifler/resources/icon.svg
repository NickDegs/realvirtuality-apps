<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <radialGradient id="bg1" cx="35%" cy="28%" r="75%">
      <stop offset="0%" stop-color="#ff6a1a"/>
      <stop offset="45%" stop-color="#c41a08"/>
      <stop offset="100%" stop-color="#5c0a14"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(255,150,60,0.22)"/>
      <stop offset="100%" stop-color="rgba(255,150,60,0)"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(120,10,60,0.18)"/>
      <stop offset="100%" stop-color="rgba(120,10,60,0)"/>
    </radialGradient>
    <linearGradient id="glassFill" x1="0%" y1="0%" x2="60%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.22)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.04)"/>
    </linearGradient>
    <linearGradient id="plateGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.55)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.20)"/>
    </linearGradient>
    <linearGradient id="cutlery" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.95)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.65)"/>
    </linearGradient>
    <linearGradient id="shineTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.45)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <filter id="softBlur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <filter id="plateBlur">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <clipPath id="iconClip">
      <rect width="1024" height="1024" rx="224"/>
    </clipPath>
  </defs>

  <g clip-path="url(#iconClip)">
    <!-- Base background -->
    <rect width="1024" height="1024" fill="url(#bg1)"/>

    <!-- Ambient glow blobs -->
    <ellipse cx="320" cy="300" rx="340" ry="280" fill="url(#glow1)"/>
    <ellipse cx="720" cy="760" rx="280" ry="240" fill="url(#glow2)"/>

    <!-- Glass card -->
    <rect x="148" y="148" width="728" height="728" rx="96"
          fill="url(#glassFill)"
          stroke="rgba(255,255,255,0.28)" stroke-width="1.5"/>

    <!-- Glass card inner shine (top edge specular) -->
    <rect x="148" y="148" width="728" height="100" rx="96"
          fill="url(#shineTop)" opacity="0.7"/>

    <!-- Plate shadow -->
    <ellipse cx="512" cy="606" rx="215" ry="26" fill="rgba(0,0,0,0.25)" filter="url(#softBlur)"/>

    <!-- Plate rim -->
    <ellipse cx="512" cy="585" rx="210" ry="22"
             fill="none" stroke="rgba(255,255,255,0.18)" stroke-width="14"/>
    <!-- Plate surface -->
    <ellipse cx="512" cy="575" rx="195" ry="16"
             fill="url(#plateGrad)"/>
    <!-- Plate inner ring -->
    <ellipse cx="512" cy="572" rx="155" ry="11"
             fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="3"/>

    <!-- Fork (left) -->
    <g fill="url(#cutlery)">
      <!-- Handle -->
      <rect x="384" y="460" width="14" height="130" rx="7"/>
      <!-- Neck -->
      <rect x="388" y="380" width="6" height="84" rx="3"/>
      <!-- Tines -->
      <rect x="376" y="290" width="6" height="100" rx="3"/>
      <rect x="386" y="285" width="6" height="105" rx="3"/>
      <rect x="396" y="285" width="6" height="105" rx="3"/>
      <rect x="406" y="290" width="6" height="100" rx="3"/>
    </g>

    <!-- Spoon (center) -->
    <g fill="url(#cutlery)">
      <!-- Handle -->
      <rect x="505" y="460" width="14" height="128" rx="7"/>
      <!-- Neck -->
      <rect x="508" y="380" width="8" height="84" rx="4"/>
      <!-- Bowl -->
      <ellipse cx="512" cy="322" rx="28" ry="36" fill="url(#cutlery)"/>
      <ellipse cx="510" cy="318" rx="16" ry="22" fill="rgba(255,200,150,0.3)"/>
    </g>

    <!-- Knife (right) -->
    <g fill="url(#cutlery)">
      <!-- Handle -->
      <rect x="624" y="460" width="14" height="130" rx="7"/>
      <!-- Blade -->
      <path d="M624,288 L638,288 L638,462 L624,462 Z" rx="4" fill="url(#cutlery)"/>
      <!-- Blade edge highlight -->
      <path d="M624,288 Q616,330 616,380 L624,380 Z" fill="rgba(255,255,255,0.45)"/>
      <!-- Blade tip -->
      <path d="M624,288 Q631,268 638,288 Z" fill="rgba(255,255,255,0.8)"/>
    </g>

    <!-- Steam lines above plate -->
    <g stroke="rgba(255,255,255,0.42)" stroke-width="6" fill="none" stroke-linecap="round">
      <path d="M440,530 Q432,505 440,480 Q448,455 440,430"/>
      <path d="M512,524 Q504,498 512,472 Q520,446 512,420"/>
      <path d="M584,530 Q592,505 584,480 Q576,455 584,430"/>
    </g>

    <!-- Glass card border highlight -->
    <rect x="148" y="148" width="728" height="728" rx="96"
          fill="none" stroke="rgba(255,255,255,0.32)" stroke-width="1"/>
  </g>
</svg>
