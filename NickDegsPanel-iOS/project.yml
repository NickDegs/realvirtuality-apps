name: NickDegsPanel
options:
  bundleIdPrefix: com.nickdegs
  deploymentTarget:
    iOS: "26.0"
settings:
  base:
    MARKETING_VERSION: "1.1"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_BUNDLE_IDENTIFIER: com.nickdegs.dashboard
    TARGETED_DEVICE_FAMILY: "1"
targets:
  NickDegsPanel:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"
        PRODUCT_BUNDLE_IDENTIFIER: com.nickdegs.dashboard
        CODE_SIGN_ENTITLEMENTS: NickDegsPanel/NickDegsPanel.entitlements
    sources: [NickDegsPanel]
    info:
      path: NickDegsPanel/Info.plist
      properties:
        CFBundleDisplayName: NickDegs Dashboard
        CFBundleShortVersionString: "1.1"
        # Business app'ten (com.nickdegs.business) gelen otomatik giriş deep-link'i:
        # nickdegs-panel://login?t=<token> — bu şema kayıtlı olmazsa iOS app'i açamaz.
        CFBundleURLTypes:
          - CFBundleURLName: com.nickdegs.dashboard.panel
            CFBundleURLSchemes:
              - nickdegs-panel
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        ITSAppUsesNonExemptEncryption: false
  NickDegsPanelUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "26.0"
    sources: [NickDegsPanelUITests]
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - target: NickDegsPanel
