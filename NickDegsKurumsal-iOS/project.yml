name: NickDegsBusiness
options:
  bundleIdPrefix: com.nickdegs
  deploymentTarget:
    iOS: "26.0"
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    PRODUCT_BUNDLE_IDENTIFIER: com.nickdegs.business
    TARGETED_DEVICE_FAMILY: "1"            # 1 = sadece iPhone
targets:
  NickDegsBusiness:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"
        PRODUCT_BUNDLE_IDENTIFIER: com.nickdegs.business
        CODE_SIGN_ENTITLEMENTS: NickDegsKurumsal/NickDegsKurumsal.entitlements
    sources: [NickDegsKurumsal]
    info:
      path: NickDegsKurumsal/Info.plist
      properties:
        CFBundleDisplayName: NickDegs Business
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        ITSAppUsesNonExemptEncryption: false
  NickDegsBusinessUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "26.0"
    sources: [NickDegsKurumsalUITests]
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: NickDegsBusiness
